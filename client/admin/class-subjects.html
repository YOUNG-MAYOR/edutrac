<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTrack NG — Assign Class Subjects</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <style>
    .section-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px;}
    .section-tab{padding:11px 22px;font-size:13px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--ink-3);transition:var(--transition);}
    .section-tab:hover{color:var(--ink);}
    .section-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
    .class-subject-grid{display:grid;grid-template-columns:280px 1fr;gap:20px;min-height:400px;}
    @media(max-width:700px){.class-subject-grid{grid-template-columns:1fr;}}
    .class-list-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
    .class-list-panel__header{background:var(--surface-2);padding:12px 16px;font-weight:700;font-size:13px;border-bottom:1px solid var(--border);}
    .class-list-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px;transition:var(--transition);}
    .class-list-item:last-child{border-bottom:none;}
    .class-list-item:hover{background:var(--primary-light);}
    .class-list-item.active{background:var(--primary-light);border-left:3px solid var(--primary);}
    .class-list-item__name{font-weight:600;font-size:14px;}
    .class-list-item__count{font-size:11px;color:var(--ink-3);margin-top:2px;}
    .subject-assign-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
    .subject-assign-panel__header{background:var(--ink);color:white;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
    .subject-item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);transition:background .1s;}
    .subject-item:hover{background:var(--surface-2);}
    .subject-item:last-child{border-bottom:none;}
    .subject-item__check{width:18px;height:18px;accent-color:var(--primary);cursor:pointer;flex-shrink:0;}
    .subject-item__name{flex:1;font-size:14px;font-weight:500;}
    .subject-item__code{font-size:11px;color:var(--ink-4);}
    .subject-search{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface-2);}
    .subject-search input{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;outline:none;}
    .subject-search input:focus{border-color:var(--primary);}
    .save-strip{padding:14px 16px;background:var(--surface-2);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .save-strip__info{font-size:13px;color:var(--ink-3);}
    .senior-notice{background:var(--warning-light);border:1px solid var(--warning);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;color:#92400e;margin-bottom:16px;}
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>
<script src="../js/layout.js"></script>
<script>
let currentUser, currentTerm;
let allClasses=[], allSubjects=[];
let classSubjectMap={};   // classId→Set of subjectIds currently assigned
let selectedClassId='';
let activeSection='JUNIOR';
let saving=false;

const SECTIONS=[
  {key:'NURSERY', label:'Nursery',  icon:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/></svg></span>'},
  {key:'PRIMARY', label:'Primary',  icon:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>'},
  {key:'JUNIOR',  label:'Junior',   icon:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg></span>'},
];

function getSection(cls){
  const s=(cls.section||'').toUpperCase();
  if(s) return s;
  const t=(cls.level||cls.name||'').toLowerCase();
  if(/senior|sss/.test(t)||/^ss[s]?\s*[123]/i.test(cls.name)) return 'SENIOR';
  if(/junior|jss/.test(t)||/^jss/i.test(cls.name)) return 'JUNIOR';
  if(/primary|pry/.test(t)||/^p[1-6]$|^pry/i.test(cls.name)) return 'PRIMARY';
  if(/nurs|kg/.test(t)) return 'NURSERY';
  return 'JUNIOR';
}

(async()=>{
  currentUser = await initAdminLayout('class-subjects','Assign Class Subjects');
  if(!currentUser) return;

  document.getElementById('topbarActions').innerHTML=`<button class="btn btn--primary" id="saveBtn" onclick="saveAssignments()" style="display:none;"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg></span> Save Changes</button>`;

  // Fetch current term first so termId is available for the parallel queries
  const { data: currentTermRow } = await db.from('terms')
    .select('*').eq('school_id',currentUser.school_id).eq('is_current',true).maybeSingle();
  const termId = currentTermRow?.id || '';

  const [classR, subjectR, csR] = await Promise.all([
    db.from('classes').select('id,name,level,section,combination_id').eq('school_id',currentUser.school_id).order('name'),
    db.from('subjects').select('id,name,code').eq('school_id',currentUser.school_id).order('name'),
    db.from('class_subjects').select('class_id,subject_id').eq('school_id',currentUser.school_id).eq('term_id', termId)
  ]);

  const termR = { data: currentTermRow };

  currentTerm=termR.data;
  allClasses=classR.data||[];
  allSubjects=subjectR.data||[];

  // Build current assignments map
  (csR.data||[]).forEach(cs=>{
    if(!classSubjectMap[cs.class_id]) classSubjectMap[cs.class_id]=new Set();
    classSubjectMap[cs.class_id].add(cs.subject_id);
  });

  renderPage();
})();

function renderPage(){
  const sectionClasses=allClasses.filter(c=>getSection(c)===activeSection);
  document.getElementById('pageBody').innerHTML=`
    <div class="page-header">
      <div><h1 class="page-title">Assign Class Subjects</h1>
      <p class="page-subtitle">Assign subjects to each class for the current term: <strong>${currentTerm?.name||'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>️ No active term'}</strong></p></div>
    </div>

    <div class="senior-notice">
      ℹ️ <strong>Senior Section</strong> subjects are controlled by <strong>Subject Combinations</strong> (Science / Arts / Commerce) — go to <a href="classes.html" style="color:#92400e;font-weight:700;text-decoration:underline;">Classes → Edit Class</a> to assign combinations. This page manages <strong>Nursery, Primary and Junior</strong> sections only.
    </div>

    <div class="section-tabs">
      ${SECTIONS.map(s=>`<div class="section-tab ${activeSection===s.key?'active':''}" onclick="setSection('${s.key}')">${s.icon} ${s.label}</div>`).join('')}
    </div>

    ${!currentTerm?`<div class="card"><div class="et-empty"><div class="et-empty__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span></div><p>No active term. Please set a current term in Settings first.</p></div></div>`:`
    <div class="class-subject-grid">
      <!-- Class list -->
      <div class="class-list-panel">
        <div class="class-list-panel__header">${SECTIONS.find(s=>s.key===activeSection)?.icon} ${activeSection} Classes <span style="color:var(--ink-4);font-weight:400;">(${sectionClasses.length})</span></div>
        ${sectionClasses.length===0?`<div style="padding:24px 16px;text-align:center;color:var(--ink-3);font-size:13px;">No ${activeSection.toLowerCase()} classes found.<br>Add classes in <a href="classes.html">Classes</a>.</div>`:
          sectionClasses.map(cls=>{
            const count=(classSubjectMap[cls.id]||new Set()).size;
            return `<div class="class-list-item ${selectedClassId===cls.id?'active':''}" onclick="selectClass('${cls.id}')">
              <div>
                <div class="class-list-item__name">${cls.name}</div>
                <div class="class-list-item__count">${count} subject${count!==1?'s':''} assigned</div>
              </div>
              ${count===0?'<span style="font-size:10px;background:#fee2e2;color:#991b1b;padding:2px 6px;border-radius:8px;font-weight:700;">None</span>':''}
            </div>`;
          }).join('')
        }
      </div>

      <!-- Subject assignment panel -->
      <div class="subject-assign-panel">
        ${selectedClassId?renderSubjectPanel():renderEmptyPanel()}
      </div>
    </div>`}
  `;
}

function setSection(key){
  activeSection=key;
  selectedClassId='';
  renderPage();
}

function selectClass(classId){
  selectedClassId=classId;
  renderPage();
  // Show save button
  document.getElementById('saveBtn').style.display='inline-flex';
}

function renderEmptyPanel(){
  return `<div style="display:flex;align-items:center;justify-content:center;height:300px;flex-direction:column;gap:12px;color:var(--ink-3);">
    <div style="font-size:48px;">←</div>
    <div style="font-size:14px;font-weight:600;">Select a class to assign subjects</div>
  </div>`;
}

function renderSubjectPanel(){
  const cls=allClasses.find(c=>c.id===selectedClassId);
  const assigned=classSubjectMap[selectedClassId]||new Set();
  return `
    <div class="subject-assign-panel__header">
      <div>
        <div style="font-weight:700;font-size:15px;">${cls?.name}</div>
        <div style="font-size:11px;color:#9ca3af;margin-top:2px;">${assigned.size} of ${allSubjects.length} subjects assigned</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn--sm" style="background:rgba(255,255,255,.15);color:white;" onclick="selectAllSubjects()">Select All</button>
        <button class="btn btn--sm" style="background:rgba(255,255,255,.15);color:white;" onclick="clearAllSubjects()">Clear All</button>
      </div>
    </div>
    <div class="subject-search">
      <input type="text" id="subSearch" placeholder="Search subjects…" oninput="filterSubjects(this.value)">
    </div>
    <div id="subjectList" style="max-height:420px;overflow-y:auto;">
      ${renderSubjectItems(allSubjects, assigned)}
    </div>
    <div class="save-strip">
      <span class="save-strip__info" id="assignCount">${assigned.size} subject${assigned.size!==1?'s':''} assigned</span>
      <button class="btn btn--primary" onclick="saveAssignments()"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg></span> Save for ${cls?.name}</button>
    </div>
  `;
}

function renderSubjectItems(subjects, assigned){
  if(!subjects.length) return '<div style="padding:20px;text-align:center;color:var(--ink-3);font-size:13px;">No subjects found</div>';
  return subjects.map(s=>`
    <div class="subject-item">
      <input type="checkbox" class="subject-item__check" id="sub-${s.id}" value="${s.id}"
        ${assigned.has(s.id)?'checked':''}
        onchange="onSubjectToggle('${s.id}',this.checked)">
      <label for="sub-${s.id}" style="flex:1;cursor:pointer;display:flex;align-items:center;gap:8px;">
        <span class="subject-item__name">${s.name}</span>
        ${s.code?`<span class="subject-item__code">${s.code}</span>`:''}
      </label>
    </div>`).join('');
}

function filterSubjects(q){
  const lower=q.toLowerCase();
  const filtered=allSubjects.filter(s=>s.name.toLowerCase().includes(lower)||(s.code||'').toLowerCase().includes(lower));
  const assigned=classSubjectMap[selectedClassId]||new Set();
  document.getElementById('subjectList').innerHTML=renderSubjectItems(filtered,assigned);
}

function onSubjectToggle(subjectId, checked){
  if(!selectedClassId) return;
  if(!classSubjectMap[selectedClassId]) classSubjectMap[selectedClassId]=new Set();
  if(checked) classSubjectMap[selectedClassId].add(subjectId);
  else classSubjectMap[selectedClassId].delete(subjectId);
  // Update count
  const count=classSubjectMap[selectedClassId].size;
  const countEl=document.getElementById('assignCount');
  if(countEl) countEl.textContent=count+' subject'+(count!==1?'s':'')+' assigned';
  // Update class list count
  const cls=allClasses.find(c=>c.id===selectedClassId);
  document.querySelectorAll('.class-list-item').forEach(item=>{
    if(item.onclick?.toString().includes(selectedClassId)){
      const countEl=item.querySelector('.class-list-item__count');
      if(countEl) countEl.textContent=count+' subject'+(count!==1?'s':'')+' assigned';
    }
  });
}

function selectAllSubjects(){
  if(!selectedClassId) return;
  if(!classSubjectMap[selectedClassId]) classSubjectMap[selectedClassId]=new Set();
  allSubjects.forEach(s=>classSubjectMap[selectedClassId].add(s.id));
  document.querySelectorAll('.subject-item__check').forEach(cb=>cb.checked=true);
  const count=classSubjectMap[selectedClassId].size;
  const countEl=document.getElementById('assignCount');
  if(countEl) countEl.textContent=count+' subject'+(count!==1?'s':'')+' assigned';
}

function clearAllSubjects(){
  if(!selectedClassId) return;
  classSubjectMap[selectedClassId]=new Set();
  document.querySelectorAll('.subject-item__check').forEach(cb=>cb.checked=false);
  const countEl=document.getElementById('assignCount');
  if(countEl) countEl.textContent='0 subjects assigned';
}

async function saveAssignments(){
  if(!selectedClassId||!currentTerm||saving) return;
  saving=true;
  const btn=document.querySelector('.subject-assign-panel .btn--primary, #saveBtn');
  if(btn){btn.textContent='Saving…';btn.disabled=true;}

  const newSubjectIds=[...((classSubjectMap[selectedClassId]||new Set()))];

  // Delete existing class_subjects for this class + term
  const {error:delErr} = await db.from('class_subjects')
    .delete()
    .eq('class_id', selectedClassId)
    .eq('term_id', currentTerm.id)
    .eq('school_id', currentUser.school_id);

  if(delErr){ toast('Error clearing old assignments: '+delErr.message,'error'); saving=false; if(btn){btn.innerHTML = '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg></span> Save';btn.disabled=false;} return; }

  // Insert new assignments
  if(newSubjectIds.length>0){
    const rows=newSubjectIds.map(sid=>({
      school_id: currentUser.school_id,
      class_id:  selectedClassId,
      subject_id: sid,
      term_id:   currentTerm.id,
    }));
    const {error:insErr} = await db.from('class_subjects').insert(rows);
    if(insErr){ toast('Error saving: '+insErr.message,'error'); saving=false; if(btn){btn.innerHTML = '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg></span> Save';btn.disabled=false;} return; }
  }

  const cls=allClasses.find(c=>c.id===selectedClassId);
  toast('<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span> '+newSubjectIds.length+' subjects assigned to '+cls?.name,'success');
  saving=false;
  if(btn){btn.innerHTML = '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg></span> Save for '+cls?.name;btn.disabled=false;}
  // Refresh class list count
  renderPage();
  selectClass(selectedClassId);
}
</script>

<script src="../js/ai-assistant.js" defer></script>
</body>
</html>
