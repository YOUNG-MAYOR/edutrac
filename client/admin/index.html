<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a6e3f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EduTrack NG">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>EduTrack NG — Admin Dashboard</title>
  <link rel="stylesheet" href="../assets/css/global.css">
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>
<script src="../js/layout.js"></script>
<script>
(async () => {
  const user = await initAdminLayout('dashboard', 'Dashboard');
  if (!user) return;
  const sid = user.school_id;
  const body = document.getElementById('pageBody');

  body.innerHTML = `
    <div class="page-header">
      <h1>Good ${getGreeting()}, ${user.full_name.split(' ')[0]} <span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span></h1>
      <p id="termLabel">Loading current term…</p>
    </div>
    <div class="stat-grid" id="statGrid">
      ${[1,2,3,4].map(() => `<div class="stat-card"><div class="et-spinner" style="margin:auto"></div></div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;" id="midSection">
      <div class="card" id="recentStudents"><div class="card__header"><span class="card__title">Recent Students</span></div><div class="et-loader"><div class="et-spinner"></div></div></div>
      <div class="card" id="feeSnapshot"><div class="card__header"><span class="card__title">Fee Collection</span></div><div class="et-loader"><div class="et-spinner"></div></div></div>
    </div>
    <div class="card" id="quickActions">
      <div class="card__header"><span class="card__title">Quick Actions</span></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;padding-top:4px;">
        <a href="students.html?action=add" class="btn btn--primary"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span> Add Student</a>
        <a href="attendance.html" class="btn btn--secondary"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg></span> Take Attendance</a>
        <a href="results.html" class="btn btn--secondary"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></span> Enter Scores</a>
        <a href="fees.html?action=pay" class="btn btn--secondary"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span> Record Payment</a>
        <a href="staff.html?action=add" class="btn btn--secondary"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/><line x1="14" y1="10" x2="18" y2="14"/></svg></span> Add Staff</a>
      </div>
    </div>
  `;

  // Responsive grid
  const midSection = document.getElementById('midSection');
  if (window.innerWidth < 768) midSection.style.gridTemplateColumns = '1fr';

  // Load stats in parallel
  const [students, staff, termData, payments] = await Promise.all([
    db.from('students').select('id', {count:'exact',head:true}).eq('school_id', sid).eq('is_active', true),
    db.from('users').select('id', {count:'exact',head:true}).eq('school_id', sid).eq('role','teacher').eq('is_active',true),
    db.from('terms').select('*').eq('school_id', sid).eq('is_current', true).maybeSingle(),
    db.from('payments').select('amount_paid').eq('school_id', sid)
  ]);

  const currentTerm = termData.data;
  document.getElementById('termLabel').textContent = currentTerm
    ? `${currentTerm.name} Term · ${currentTerm.academic_year_id ? '' : ''}Current Term`
    : 'No current term set — configure in Settings';

  const totalPaid = (payments.data || []).reduce((s, p) => s + Number(p.amount_paid), 0);

  document.getElementById('statGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-card__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></span></div>
      <div class="stat-card__value" style="color:var(--primary)">${students.count ?? 0}</div>
      <div class="stat-card__label">Total Students</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/><line x1="14" y1="10" x2="18" y2="14"/></svg></span></div>
      <div class="stat-card__value" style="color:var(--info)">${staff.count ?? 0}</div>
      <div class="stat-card__label">Active Teachers</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span></div>
      <div class="stat-card__value" style="color:var(--success);font-size:20px;">${formatMoney(totalPaid)}</div>
      <div class="stat-card__label">Total Collected</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg></span></div>
      <div class="stat-card__value" style="color:var(--accent)">${currentTerm ? currentTerm.name : '—'}</div>
      <div class="stat-card__label">Current Term</div>
    </div>
  `;

  // Recent students
  const { data: recentStudents } = await db.from('students')
    .select('id, full_name, admission_no, created_at, enrollments(classes(name))')
    .eq('school_id', sid).eq('is_active', true)
    .order('created_at', { ascending: false }).limit(5);

  document.getElementById('recentStudents').innerHTML = `
    <div class="card__header">
      <span class="card__title">Recent Students</span>
      <a href="students.html" class="btn btn--ghost btn--sm">View All →</a>
    </div>
    ${recentStudents?.length ? `
      <div class="table-wrap" style="border:none;">
        <table>
          <tbody>
            ${recentStudents.map(s => `
              <tr>
                <td>
                  <div class="student-cell">
                    <div class="avatar avatar--sm">${s.full_name.charAt(0)}</div>
                    <div class="info">
                      <div class="name">${s.full_name}</div>
                      <div class="sub">${s.admission_no}</div>
                    </div>
                  </div>
                </td>
                <td><span class="chip">${s.enrollments?.[0]?.classes?.name || 'Not enrolled'}</span></td>
                <td style="color:var(--ink-3);font-size:12px;">${formatDate(s.created_at)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    ` : `<div class="et-empty"><div class="et-empty__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></span></div><p>No students yet</p></div>`}
  `;

  // Fee snapshot — scoped to current term to avoid inflated numbers
  const feeQuery = db.from('fee_types').select('amount').eq('school_id', sid);
  if (currentTerm) feeQuery.eq('term_id', currentTerm.id);
  const { data: feeTypes } = await feeQuery;
  const feePerStudent = (feeTypes || []).reduce((s, f) => s + Number(f.amount), 0);
  const totalExpected = feePerStudent * (students.count ?? 0);
  const pct = totalExpected > 0 ? Math.min(100, Math.round((totalPaid / totalExpected) * 100)) : 0;
  const barColor = pct >= 70 ? '' : pct >= 40 ? 'warn' : 'danger';

  document.getElementById('feeSnapshot').innerHTML = `
    <div class="card__header">
      <span class="card__title">Fee Collection</span>
      <a href="fees.html" class="btn btn--ghost btn--sm">Details →</a>
    </div>
    <div style="margin-bottom:20px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:14px;color:var(--ink-3);">Overall Collection Rate</span>
        <strong style="font-size:14px;">${pct}%</strong>
      </div>
      <div class="progress-bar">
        <div class="progress-bar__fill ${barColor}" style="width:${pct}%"></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div style="background:var(--success-light);padding:14px;border-radius:var(--radius-sm);">
        <div style="font-size:11px;color:var(--success);font-weight:700;text-transform:uppercase;margin-bottom:4px;">Collected</div>
        <div style="font-size:18px;font-weight:800;color:var(--success);">${formatMoney(totalPaid)}</div>
      </div>
      <div style="background:var(--danger-light);padding:14px;border-radius:var(--radius-sm);">
        <div style="font-size:11px;color:var(--danger);font-weight:700;text-transform:uppercase;margin-bottom:4px;">Outstanding</div>
        <div style="font-size:18px;font-weight:800;color:var(--danger);">${formatMoney(Math.max(0, totalExpected - totalPaid))}</div>
      </div>
    </div>
  `;
})();

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'morning';
  if (h < 17) return 'afternoon';
  return 'evening';
}
</script>
<script src="../js/pwa.js"></script>
<script>
// ── Platform Announcements Banner ─────────────────────────────
(async () => {
  const { data: anns } = await db
    .from('platform_announcements')
    .select('id, title, body, type, is_pinned')
    .eq('is_draft', false)
    .order('is_pinned', { ascending: false })
    .order('created_at', { ascending: false })
    .limit(3);

  if (!anns || !anns.length) return;

  const TYPE_COLORS = {
    info:    { bg:'#dbeafe', border:'#93c5fd', text:'#1e40af', icon:'ℹ️' },
    update:  { bg:'#dcfce7', border:'#86efac', text:'#166534', icon:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>' },
    warning: { bg:'#fef3c7', border:'#fcd34d', text:'#92400e', icon:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>️' },
    urgent:  { bg:'#fee2e2', border:'#fca5a5', text:'#991b1b', icon:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>' },
  };

  const DISMISSED_KEY = 'et_dismissed_anns';
  const dismissed = JSON.parse(localStorage.getItem(DISMISSED_KEY) || '[]');
  const visible = anns.filter(a => !dismissed.includes(a.id));
  if (!visible.length) return;

  const wrap = document.createElement('div');
  wrap.id = 'platformAnnBanner';
  wrap.style.cssText = 'margin-bottom:20px';
  wrap.innerHTML = visible.map(a => {
    const c = TYPE_COLORS[a.type] || TYPE_COLORS.info;
    return `
      <div id="ann-${a.id}" style="background:${c.bg};border:1px solid ${c.border};border-radius:8px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px">
        <span style="font-size:16px;flex-shrink:0">${c.icon}</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:${c.text}">${a.title}</div>
          <div style="font-size:12px;color:${c.text};opacity:.85;margin-top:3px">${a.body}</div>
        </div>
        <button onclick="dismissAnn('${a.id}')" style="background:none;border:none;cursor:pointer;color:${c.text};opacity:.6;font-size:16px;padding:0 0 0 8px;flex-shrink:0" title="Dismiss"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span></button>
      </div>
    `;
  }).join('');

  const pageHeader = document.querySelector('.page-header');
  if (pageHeader) pageHeader.parentNode.insertBefore(wrap, pageHeader.nextSibling);

  window.dismissAnn = function(id) {
    const el = document.getElementById('ann-' + id);
    if (el) el.remove();
    const list = JSON.parse(localStorage.getItem(DISMISSED_KEY) || '[]');
    list.push(id);
    localStorage.setItem(DISMISSED_KEY, JSON.stringify(list));
  };
})();
</script>

<script src="../js/ai-assistant.js" defer></script>
</body>
</html>
