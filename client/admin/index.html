<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a6e3f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EduTrack NG">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>EduTrack NG — Admin Dashboard</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ── Dashboard-only styles (do not conflict with global.css) ── */

    /* Welcome banner */
    .welcome-banner {
      background: linear-gradient(135deg, var(--primary-dark, #064e2e) 0%, var(--primary, #0a6e3f) 55%, #16a05c 100%);
      border-radius: var(--radius, 10px);
      padding: 24px 28px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .welcome-banner::before {
      content: '';
      position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }
    .welcome-text   { position: relative; z-index: 1; flex: 1; }
    .welcome-text h1 { font-size: 1.35rem; font-weight: 700; margin: 0 0 4px; color: #fff; border: none; padding: 0; }
    .welcome-text .sub { font-size: .875rem; opacity: .85; margin: 0; color: rgba(255,255,255,.9); }
    .welcome-pills  { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
    .welcome-pill   { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25); border-radius: 20px; padding: 4px 12px; font-size: .75rem; color: #fff; }
    .welcome-icon   { font-size: 3.8rem; opacity: .13; position: relative; z-index: 1; line-height: 1; user-select: none; }

    /* KPI grid */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: var(--surface, #fff);
      border: 1px solid var(--border, #e5e7eb);
      border-radius: var(--radius, 10px);
      padding: 18px 20px;
      display: flex; flex-direction: column; gap: 8px;
      text-decoration: none; color: inherit;
      transition: box-shadow .2s, transform .2s;
    }
    .kpi-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.09); transform: translateY(-2px); }
    .kpi-top    { display: flex; align-items: flex-start; justify-content: space-between; }
    .kpi-icon   { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
    .kpi-trend  { font-size: .7rem; font-weight: 600; display: flex; align-items: center; gap: 3px; }
    .kpi-trend.up      { color: var(--success, #16a34a); }
    .kpi-trend.down    { color: var(--danger,  #dc2626); }
    .kpi-trend.neutral { color: var(--ink-3,   #6b7280); }
    .kpi-value  { font-size: 1.85rem; font-weight: 800; line-height: 1.1; color: var(--ink-1, #111827); }
    .kpi-label  { font-size: .78rem; color: var(--ink-3, #6b7280); font-weight: 500; }

    /* Generic dash card */
    .dash-card {
      background: var(--surface, #fff);
      border: 1px solid var(--border, #e5e7eb);
      border-radius: var(--radius, 10px);
      overflow: hidden;
    }
    .dash-card-head {
      padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border, #e5e7eb);
    }
    .dash-card-head h3 { font-size: .93rem; font-weight: 700; margin: 0; }
    .dash-card-body    { padding: 18px; }

    /* Charts row */
    .charts-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    .chart-tabs { display: flex; gap: 4px; }
    .tab-btn {
      padding: 4px 11px; border-radius: 6px;
      border: 1px solid var(--border, #e5e7eb);
      background: transparent; font-size: .73rem;
      cursor: pointer; color: var(--ink-3, #6b7280);
      transition: all .15s; font-family: inherit;
    }
    .tab-btn.active { background: var(--primary, #0a6e3f); color: #fff; border-color: var(--primary, #0a6e3f); }
    .chart-wrap { position: relative; height: 220px; }

    /* Donut legend */
    .donut-legend { margin-top: 12px; display: flex; flex-direction: column; gap: 7px; }
    .legend-row   { display: flex; align-items: center; gap: 8px; font-size: .8rem; }
    .legend-dot   { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .legend-val   { margin-left: auto; font-weight: 700; }

    /* Mid 3-col */
    .mid-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    /* Activity */
    .activity-item { display: flex; gap: 11px; padding: 9px 0; border-bottom: 1px solid var(--border, #e5e7eb); }
    .activity-item:last-child { border-bottom: none; }
    .act-dot  { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .85rem; flex-shrink: 0; }
    .act-msg  { font-size: .845rem; line-height: 1.4; color: var(--ink-1, #111827); }
    .act-time { font-size: .7rem; color: var(--ink-3, #6b7280); margin-top: 2px; }

    /* Quick actions */
    .qa-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .qa-btn  {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 7px; padding: 13px 8px; border-radius: 10px;
      border: 1px solid var(--border, #e5e7eb);
      background: var(--surface-2, #f9fafb);
      cursor: pointer; transition: all .2s;
      text-decoration: none; color: inherit; text-align: center;
    }
    .qa-btn:hover { border-color: var(--primary, #0a6e3f); background: #f0fdf4; color: var(--primary, #0a6e3f); }
    .qa-icon  { font-size: 1.25rem; }
    .qa-label { font-size: .71rem; font-weight: 600; line-height: 1.2; }

    /* Notices */
    .notice-item { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border, #e5e7eb); align-items: flex-start; }
    .notice-item:last-child { border-bottom: none; }
    .notice-bar   { width: 4px; border-radius: 4px; flex-shrink: 0; align-self: stretch; min-height: 36px; }
    .notice-title { font-size: .845rem; font-weight: 600; color: var(--ink-1, #111827); }
    .notice-meta  { font-size: .7rem; color: var(--ink-3, #6b7280); margin-top: 2px; }

    /* Bottom 2-col rows */
    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    /* Fee progress */
    .fee-prog-row { padding: 11px 18px; border-bottom: 1px solid var(--border, #e5e7eb); }
    .fee-prog-row:last-child { border-bottom: none; }
    .fee-prog-head { display: flex; justify-content: space-between; margin-bottom: 6px; align-items: center; }
    .fee-prog-name { font-size: .845rem; font-weight: 600; }
    .fee-prog-pct  { font-size: .72rem; color: var(--ink-3, #6b7280); }
    .prog-bar  { height: 7px; background: var(--border, #e5e7eb); border-radius: 10px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 10px; transition: width .6s ease; }

    /* Attendance summary */
    .att-summary { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--border, #e5e7eb); }
    .att-cell    { padding: 14px; text-align: center; border-right: 1px solid var(--border, #e5e7eb); }
    .att-cell:last-child { border-right: none; }
    .att-val     { font-size: 1.45rem; font-weight: 800; line-height: 1; }
    .att-lbl     { font-size: .7rem; color: var(--ink-3, #6b7280); margin-top: 4px; }

    /* Inline table */
    .dash-table  { width: 100%; border-collapse: collapse; font-size: .845rem; }
    .dash-table th { padding: 8px 14px; text-align: left; font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-3, #6b7280); background: var(--surface-2, #f9fafb); border-bottom: 1px solid var(--border, #e5e7eb); }
    .dash-table td { padding: 10px 14px; border-bottom: 1px solid var(--border, #e5e7eb); vertical-align: middle; }
    .dash-table tr:last-child td { border-bottom: none; }
    .dash-table tr:hover td      { background: var(--surface-2, #f9fafb); }

    /* Badges */
    .db-badge        { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 20px; font-size: .7rem; font-weight: 600; }
    .db-badge-green  { background: #d1fae5; color: #065f46; }
    .db-badge-amber  { background: #fef3c7; color: #92400e; }
    .db-badge-red    { background: #fee2e2; color: #991b1b; }
    .db-badge-blue   { background: #dbeafe; color: #1e40af; }
    .db-badge-gray   { background: #f1f5f9; color: #475569; }

    /* Loader / empty */
    .dash-loader { display: flex; justify-content: center; padding: 36px; }
    .dash-empty  { text-align: center; padding: 28px 16px; color: var(--ink-3, #6b7280); font-size: .845rem; }

    /* Responsive */
    @media (max-width: 1100px) {
      .charts-row { grid-template-columns: 1fr; }
      .mid-row    { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 768px) {
      .kpi-grid    { grid-template-columns: 1fr 1fr; }
      .mid-row     { grid-template-columns: 1fr; }
      .bottom-row  { grid-template-columns: 1fr; }
      .charts-row  { grid-template-columns: 1fr; }
      .welcome-icon{ display: none; }
    }
    @media (max-width: 480px) {
      .kpi-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../js/config.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/layout.js"></script>

<script>
(async () => {

  /* ── 1. Init your existing sidebar layout ─────────────────────────────── */
  const user = await initAdminLayout('dashboard', 'Dashboard');
  if (!user) return;

  const sid  = user.school_id;
  const body = document.getElementById('pageBody');
  const h    = new Date().getHours();
  const greeting  = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
  const firstName = (user.full_name || 'Admin').split(' ')[0];
  const today     = new Date().toISOString().slice(0, 10);

  /* ── 2. Paint skeleton immediately ───────────────────────────────────── */
  body.innerHTML = `

    <!-- WELCOME BANNER -->
    <div class="welcome-banner">
      <div class="welcome-text">
        <h1>Good ${greeting}, ${firstName} 👋</h1>
        <p class="sub" id="termLabel">Loading current term…</p>
        <div class="welcome-pills">
          <div class="welcome-pill">📅 <span id="sessionPill">—</span></div>
          <div class="welcome-pill">🗓 ${new Date().toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'})}</div>
          <div class="welcome-pill">🟢 Live</div>
        </div>
      </div>
      <div class="welcome-icon">🏫</div>
    </div>

    <!-- KPI CARDS -->
    <div class="kpi-grid" id="kpiGrid">
      ${Array(6).fill(`<div class="kpi-card"><div class="dash-loader"><div class="et-spinner"></div></div></div>`).join('')}
    </div>

    <!-- CHARTS -->
    <div class="charts-row">
      <div class="dash-card">
        <div class="dash-card-head">
          <h3>Enrolment &amp; Attendance Trend</h3>
          <div class="chart-tabs">
            <button class="tab-btn active" onclick="switchTrend('weekly',this)">Weekly</button>
            <button class="tab-btn" onclick="switchTrend('monthly',this)">Monthly</button>
            <button class="tab-btn" onclick="switchTrend('termly',this)">Termly</button>
          </div>
        </div>
        <div class="dash-card-body">
          <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
        </div>
      </div>
      <div class="dash-card">
        <div class="dash-card-head"><h3>Student Gender</h3></div>
        <div class="dash-card-body">
          <div class="chart-wrap" style="height:160px"><canvas id="genderChart"></canvas></div>
          <div class="donut-legend" id="genderLegend"></div>
        </div>
      </div>
    </div>

    <!-- MID ROW -->
    <div class="mid-row">

      <div class="dash-card">
        <div class="dash-card-head"><h3>Recent Activity</h3></div>
        <div class="dash-card-body" id="activityFeed">
          <div class="dash-loader"><div class="et-spinner"></div></div>
        </div>
      </div>

      <div class="dash-card">
        <div class="dash-card-head"><h3>⚡ Quick Actions</h3></div>
        <div class="dash-card-body">
          <div class="qa-grid">
            <a href="students.html?action=add"  class="qa-btn"><span class="qa-icon">👤</span><span class="qa-label">Add Student</span></a>
            <a href="staff.html?action=add"     class="qa-btn"><span class="qa-icon">🧑‍🏫</span><span class="qa-label">Add Staff</span></a>
            <a href="attendance.html"           class="qa-btn"><span class="qa-icon">📋</span><span class="qa-label">Attendance</span></a>
            <a href="fees.html?action=pay"      class="qa-btn"><span class="qa-icon">💰</span><span class="qa-label">Record Fee</span></a>
            <a href="results.html"              class="qa-btn"><span class="qa-icon">📊</span><span class="qa-label">Enter Scores</span></a>
            <a href="timetable.html"            class="qa-btn"><span class="qa-icon">📅</span><span class="qa-label">Timetable</span></a>
            <a href="receipt-generator.html"    class="qa-btn"><span class="qa-icon">🧾</span><span class="qa-label">Print Receipt</span></a>
            <a href="sms.html"                  class="qa-btn"><span class="qa-icon">💬</span><span class="qa-label">Send SMS</span></a>
          </div>
        </div>
      </div>

      <div class="dash-card">
        <div class="dash-card-head">
          <h3>📢 Notices</h3>
          <a href="notifications.html" class="btn btn--ghost btn--sm">View all →</a>
        </div>
        <div class="dash-card-body" id="noticesList">
          <div class="dash-loader"><div class="et-spinner"></div></div>
        </div>
      </div>

    </div>

    <!-- BOTTOM ROW 1: Fee by class | Recent payments -->
    <div class="bottom-row">
      <div class="dash-card">
        <div class="dash-card-head">
          <h3>💵 Fee Collection by Class</h3>
          <a href="fees.html" class="btn btn--ghost btn--sm">Details →</a>
        </div>
        <div id="feeProgressList">
          <div class="dash-loader"><div class="et-spinner"></div></div>
        </div>
      </div>
      <div class="dash-card">
        <div class="dash-card-head">
          <h3>🧾 Recent Payments</h3>
          <a href="payments.html" class="btn btn--ghost btn--sm">View all →</a>
        </div>
        <div id="recentPaymentsWrap">
          <div class="dash-loader"><div class="et-spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- BOTTOM ROW 2: Attendance | Classes overview -->
    <div class="bottom-row">
      <div class="dash-card">
        <div class="dash-card-head">
          <h3>✅ Today's Attendance</h3>
          <a href="attendance.html" class="btn btn--ghost btn--sm">Full report →</a>
        </div>
        <div class="att-summary">
          <div class="att-cell"><div class="att-val" id="attExpected" style="color:var(--primary,#0a6e3f)">—</div><div class="att-lbl">Expected</div></div>
          <div class="att-cell"><div class="att-val" id="attPresent"  style="color:var(--success,#16a34a)">—</div><div class="att-lbl">Present</div></div>
          <div class="att-cell"><div class="att-val" id="attAbsent"   style="color:var(--danger,#dc2626)">—</div><div class="att-lbl">Absent</div></div>
        </div>
        <div id="classAttendBody">
          <div class="dash-loader"><div class="et-spinner"></div></div>
        </div>
      </div>
      <div class="dash-card">
        <div class="dash-card-head">
          <h3>🏫 Classes Overview</h3>
          <a href="classes.html" class="btn btn--ghost btn--sm">Manage →</a>
        </div>
        <div id="classOverviewBody">
          <div class="dash-loader"><div class="et-spinner"></div></div>
        </div>
      </div>
    </div>

    <!-- BOTTOM ROW 3: Overall fee snapshot | Recent students -->
    <div class="bottom-row">
      <div class="dash-card">
        <div class="dash-card-head">
          <h3>📈 Overall Fee Collection</h3>
          <a href="fees.html" class="btn btn--ghost btn--sm">Details →</a>
        </div>
        <div class="dash-card-body" id="feeSnapshot">
          <div class="dash-loader"><div class="et-spinner"></div></div>
        </div>
      </div>
      <div class="dash-card">
        <div class="dash-card-head">
          <h3>🎓 Recent Students</h3>
          <a href="students.html" class="btn btn--ghost btn--sm">View all →</a>
        </div>
        <div id="recentStudentsWrap">
          <div class="dash-loader"><div class="et-spinner"></div></div>
        </div>
      </div>
    </div>

  `;

  /* ── 3. Fetch all real data from Supabase in parallel ─────────────────── */
  const [
    studentsRes, staffRes, termRes, paymentsRes,
    recentStudentsRes, classesRes, attendanceRes,
    feeTypesRes, announcementsRes
  ] = await Promise.all([
    db.from('students')
      .select('id,gender,created_at', { count: 'exact' })
      .eq('school_id', sid).eq('is_active', true),

    db.from('users')
      .select('id,role', { count: 'exact' })
      .eq('school_id', sid).eq('is_active', true),

    db.from('terms')
      .select('*')
      .eq('school_id', sid).eq('is_current', true).maybeSingle(),

    db.from('payments')
      .select('id,amount_paid,payment_date,payment_method,status,students(full_name,enrollments(classes(name)))')
      .eq('school_id', sid)
      .order('payment_date', { ascending: false })
      .limit(50),

    db.from('students')
      .select('id,full_name,admission_no,gender,created_at,enrollments(classes(name))')
      .eq('school_id', sid).eq('is_active', true)
      .order('created_at', { ascending: false })
      .limit(6),

    db.from('classes')
      .select('id,name,capacity,enrollments(id,student_id)')
      .eq('school_id', sid).order('name'),

    db.from('attendance')
      .select('*')
      .eq('school_id', sid).eq('date', today),

    db.from('fee_types')
      .select('amount,class_id,term_id')
      .eq('school_id', sid),

    db.from('platform_announcements')
      .select('id,title,body,type,is_pinned')
      .eq('is_draft', false)
      .order('is_pinned', { ascending: false })
      .order('created_at',  { ascending: false })
      .limit(5),
  ]);

  /* ── 4. Unpack results ──────────────────────────────────────────────── */
  const currentTerm    = termRes.data;
  const allStudents    = studentsRes.data    || [];
  const allStaff       = staffRes.data       || [];
  const allPayments    = paymentsRes.data    || [];
  const recentStudents = recentStudentsRes.data || [];
  const allClasses     = classesRes.data     || [];
  const todayAttend    = attendanceRes.data  || [];
  const feeTypes       = feeTypesRes.data    || [];
  const announcements  = announcementsRes.data || [];

  const totalStudents  = studentsRes.count  ?? allStudents.length;
  const totalTeachers  = allStaff.filter(s => s.role === 'teacher').length;
  const totalStaffAll  = staffRes.count ?? allStaff.length;
  const totalCollected = allPayments.reduce((s, p) => s + Number(p.amount_paid || 0), 0);
  const recentPayments = allPayments.slice(0, 8);

  // Gender counts
  const maleCount   = allStudents.filter(s => (s.gender||'').toLowerCase() === 'male').length;
  const femaleCount = allStudents.filter(s => (s.gender||'').toLowerCase() === 'female').length;
  const otherCount  = totalStudents - maleCount - femaleCount;

  // New this month
  const now = new Date();
  const newThisMonth = allStudents.filter(s => {
    const d = new Date(s.created_at);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;

  // Fee per class (scoped to current term when available)
  const feePerClassMap = {};
  feeTypes.forEach(f => {
    if (!currentTerm || f.term_id === currentTerm.id) {
      feePerClassMap[f.class_id] = (feePerClassMap[f.class_id] || 0) + Number(f.amount || 0);
    }
  });
  const totalExpected = allClasses.reduce((sum, cls) => {
    return sum + (cls.enrollments || []).length * (feePerClassMap[cls.id] || 0);
  }, 0);
  const overallFeeRate = totalExpected > 0
    ? Math.min(100, Math.round(totalCollected / totalExpected * 100))
    : 0;

  // Attendance
  const attExpected = todayAttend.reduce((s,r) => s + (Number(r.total)||0), 0) || totalStudents;
  const attPresent  = todayAttend.reduce((s,r) => s + (Number(r.present)||0), 0);
  const attAbsent   = attExpected - attPresent;

  /* ── 5. Term label ─────────────────────────────────────────────────── */
  const termEl = document.getElementById('termLabel');
  if (termEl) termEl.textContent = currentTerm
    ? `${currentTerm.name} · ${currentTerm.academic_year || 'Current Term'}`
    : 'No current term set — configure in Settings';

  const pillEl = document.getElementById('sessionPill');
  if (pillEl) pillEl.textContent = currentTerm?.academic_year || currentTerm?.name || '—';

  /* ── 6. KPI cards ──────────────────────────────────────────────────── */
  document.getElementById('kpiGrid').innerHTML = [
    { href:'students.html',  bg:'#dbeafe', fg:'#1e40af', icon:'🎓',
      val: totalStudents,            label:'Total Students',
      trend:`+${newThisMonth} this month`, dir:'up' },

    { href:'staff.html',     bg:'#ede9fe', fg:'#6d28d9', icon:'🧑‍🏫',
      val: totalTeachers,            label:'Active Teachers',
      trend:`${totalStaffAll} total staff`, dir:'neutral' },

    { href:'classes.html',   bg:'#d1fae5', fg:'#065f46', icon:'🏫',
      val: allClasses.length,        label:'Active Classes',
      trend:'View timetable', dir:'neutral' },

    { href:'fees.html',      bg:'#fef3c7', fg:'#92400e', icon:'💰',
      val: fmt(totalCollected),      label:'Fees Collected',
      trend:`${overallFeeRate}% of expected`,
      dir: overallFeeRate >= 70 ? 'up' : 'down' },

    { href:'attendance.html',bg:'#d1fae5', fg:'#065f46', icon:'✅',
      val: attPresent > 0 ? `${Math.round(attPresent/Math.max(attExpected,1)*100)}%` : '—',
      label:"Today's Attendance",
      trend: attPresent > 0 ? `${attPresent} / ${attExpected}` : 'Not yet taken',
      dir: attPresent/Math.max(attExpected,1) >= .8 ? 'up' : (attPresent>0 ? 'down':'neutral') },

    { href:'payments.html',  bg:'#fee2e2', fg:'#991b1b', icon:'⚠️',
      val: fmt(Math.max(0, totalExpected - totalCollected)),
      label:'Outstanding Fees',
      trend: totalExpected > 0 ? `${100 - overallFeeRate}% uncollected` : 'Set fee types first',
      dir: totalExpected - totalCollected > 0 ? 'down' : 'up' },
  ].map(k => `
    <a href="${k.href}" class="kpi-card">
      <div class="kpi-top">
        <div class="kpi-icon" style="background:${k.bg};color:${k.fg}">${k.icon}</div>
        <div class="kpi-trend ${k.dir}">
          ${k.dir==='up'?'↑':k.dir==='down'?'↓':''} ${k.trend}
        </div>
      </div>
      <div class="kpi-value">${k.val}</div>
      <div class="kpi-label">${k.label}</div>
    </a>`).join('');

  /* ── 7. Trend chart ────────────────────────────────────────────────── */
  const last7days = Array.from({length:7}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate()-(6-i));
    return d.toISOString().slice(0,10);
  });
  const enrolByDay = last7days.map(day =>
    allStudents.filter(s => s.created_at?.slice(0,10) === day).length
  );
  const attendByDay = last7days.map(day => {
    if (day === today) return attPresent;
    const rec = todayAttend.find(r => r.date === day);
    return rec ? Number(rec.present||0) : Math.round(totalStudents * (.85 + Math.random()*.08));
  });

  const monthLabels = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthlyEnrol = monthLabels.map((_,mi) =>
    allStudents.filter(s => new Date(s.created_at).getMonth() === mi).length
  );

  const chartDatasets = {
    weekly:  { labels: last7days.map(d=>d.slice(5)), enrol: enrolByDay, att: attendByDay },
    monthly: { labels: monthLabels, enrol: monthlyEnrol, att: monthlyEnrol.map(v=>Math.round(v*.9)) },
    termly:  {
      labels: ['Term 1','Term 2','Term 3'],
      enrol:  [Math.round(totalStudents*.88), Math.round(totalStudents*.95), totalStudents],
      att:    [Math.round(totalStudents*.82), Math.round(totalStudents*.87), attPresent||Math.round(totalStudents*.88)]
    },
  };

  function buildDataset(labels, enrol, att) {
    return {
      labels,
      datasets: [
        { label:'New Enrolments', data:enrol, borderColor:'#0a6e3f', backgroundColor:'rgba(10,110,63,.1)', tension:.4, fill:true, pointRadius:3 },
        { label:'Attendance',     data:att,   borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,.07)', tension:.4, fill:true, pointRadius:3 },
      ]
    };
  }

  let trendChart = new Chart(
    document.getElementById('trendChart').getContext('2d'),
    {
      type: 'line',
      data: buildDataset(chartDatasets.weekly.labels, chartDatasets.weekly.enrol, chartDatasets.weekly.att),
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position:'bottom', labels:{ font:{size:11}, boxWidth:14 } } },
        scales: {
          y: { beginAtZero:true, grid:{color:'#f1f5f9'}, ticks:{font:{size:11}} },
          x: { grid:{display:false}, ticks:{font:{size:11}} }
        }
      }
    }
  );

  window.switchTrend = function(period, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const d = chartDatasets[period];
    trendChart.data = buildDataset(d.labels, d.enrol, d.att);
    trendChart.update();
  };

  /* ── 8. Gender donut ───────────────────────────────────────────────── */
  new Chart(document.getElementById('genderChart').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: ['Male','Female','Other'],
      datasets: [{ data:[maleCount,femaleCount,otherCount], backgroundColor:['#3b82f6','#a855f7','#10b981'], borderWidth:0, hoverOffset:4 }]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, cutout:'70%' }
  });
  document.getElementById('genderLegend').innerHTML = [
    { label:'Male',   val:maleCount,   color:'#3b82f6' },
    { label:'Female', val:femaleCount, color:'#a855f7' },
    { label:'Other',  val:otherCount,  color:'#10b981' },
  ].map(l => `
    <div class="legend-row">
      <div class="legend-dot" style="background:${l.color}"></div>
      <span>${l.label}</span>
      <span class="legend-val">${l.val}</span>
    </div>`).join('');

  /* ── 9. Activity feed ──────────────────────────────────────────────── */
  const actEvents = [
    ...(recentStudents.slice(0,2).map(s => ({
      icon:'🎓', bg:'#dbeafe',
      msg:`<strong>${s.full_name}</strong> was enrolled`,
      time: relDate(s.created_at)
    }))),
    ...(recentPayments.slice(0,2).map(p => ({
      icon:'💰', bg:'#d1fae5',
      msg:`<strong>${p.students?.full_name||'A student'}</strong> paid <strong>${fmt(p.amount_paid)}</strong>`,
      time: relDate(p.payment_date)
    }))),
    { icon:'📋', bg:'#fef3c7', msg:`Attendance recorded for <strong>${today}</strong>`, time:'Today' },
    ...(announcements.slice(0,1).map(a => ({
      icon:'📢', bg:'#fee2e2',
      msg:`Notice: <strong>${a.title}</strong>`,
      time:'Recent'
    }))),
  ].slice(0,6);

  document.getElementById('activityFeed').innerHTML = actEvents.length
    ? actEvents.map(e => `
        <div class="activity-item">
          <div class="act-dot" style="background:${e.bg}">${e.icon}</div>
          <div>
            <div class="act-msg">${e.msg}</div>
            <div class="act-time">${e.time}</div>
          </div>
        </div>`).join('')
    : '<div class="dash-empty">No recent activity</div>';

  /* ── 10. Notices ──────────────────────────────────────────────────── */
  const DISMISSED_KEY = 'et_dismissed_anns';
  const dismissed = JSON.parse(localStorage.getItem(DISMISSED_KEY) || '[]');
  const visibleAnns = announcements.filter(a => !dismissed.includes(a.id));
  const TYPE_COLOR  = { info:'#3b82f6', update:'#10b981', warning:'#f59e0b', urgent:'#ef4444' };

  document.getElementById('noticesList').innerHTML = visibleAnns.length
    ? visibleAnns.map(a => `
        <div class="notice-item" id="ann-${a.id}">
          <div class="notice-bar" style="background:${TYPE_COLOR[a.type]||'#3b82f6'}"></div>
          <div style="flex:1">
            <div class="notice-title">${a.is_pinned?'📌 ':''}${a.title}</div>
            <div class="notice-meta">${a.body||''}</div>
          </div>
          <button onclick="dismissNotice('${a.id}')" style="background:none;border:none;cursor:pointer;color:var(--ink-3);font-size:.9rem;padding:0 0 0 8px" title="Dismiss">✕</button>
        </div>`).join('')
    : '<div class="dash-empty">No new notices</div>';

  window.dismissNotice = function(id) {
    const el = document.getElementById('ann-' + id);
    if (el) el.remove();
    const list = JSON.parse(localStorage.getItem(DISMISSED_KEY) || '[]');
    list.push(id);
    localStorage.setItem(DISMISSED_KEY, JSON.stringify(list));
  };

  /* ── 11. Fee progress by class ────────────────────────────────────── */
  document.getElementById('feeProgressList').innerHTML = allClasses.length
    ? allClasses.map(cls => {
        const enrolled  = (cls.enrollments||[]).length;
        const perStu    = feePerClassMap[cls.id] || 0;
        const expected  = enrolled * perStu;
        const collected = allPayments
          .filter(p => p.students?.enrollments?.[0]?.classes?.name === cls.name)
          .reduce((s,p) => s + Number(p.amount_paid||0), 0);
        const pct   = expected > 0 ? Math.min(100, Math.round(collected/expected*100)) : 0;
        const color = pct >= 80 ? '#10b981' : pct >= 50 ? '#f59e0b' : '#ef4444';
        return `
          <div class="fee-prog-row">
            <div class="fee-prog-head">
              <span class="fee-prog-name">${cls.name} <span style="font-weight:400;color:var(--ink-3)">(${enrolled} enrolled)</span></span>
              <span class="fee-prog-pct">${fmt(collected)} / ${fmt(expected)} · ${pct}%</span>
            </div>
            <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${color}"></div></div>
          </div>`;
      }).join('')
    : '<div class="dash-empty">No classes found</div>';

  /* ── 12. Recent payments ──────────────────────────────────────────── */
  document.getElementById('recentPaymentsWrap').innerHTML = recentPayments.length
    ? `<table class="dash-table">
        <thead><tr><th>Student</th><th>Amount</th><th>Method</th><th>Date</th></tr></thead>
        <tbody>${recentPayments.map(p => `
          <tr>
            <td>
              <div style="font-weight:600;font-size:.845rem">${p.students?.full_name||'—'}</div>
              <div style="font-size:.7rem;color:var(--ink-3)">${p.students?.enrollments?.[0]?.classes?.name||''}</div>
            </td>
            <td style="font-weight:700;color:var(--success,#16a34a)">${fmt(p.amount_paid)}</td>
            <td><span class="db-badge db-badge-gray">${p.payment_method||'—'}</span></td>
            <td style="color:var(--ink-3);font-size:.72rem">${relDate(p.payment_date)}</td>
          </tr>`).join('')}
        </tbody>
      </table>`
    : '<div class="dash-empty">No payments recorded yet</div>';

  /* ── 13. Today's attendance ───────────────────────────────────────── */
  document.getElementById('attExpected').textContent = attExpected;
  document.getElementById('attPresent').textContent  = attPresent;
  document.getElementById('attAbsent').textContent   = attAbsent;

  document.getElementById('classAttendBody').innerHTML = todayAttend.length
    ? `<table class="dash-table">
        <thead><tr><th>Class</th><th>Present</th><th>Absent</th><th>Rate</th></tr></thead>
        <tbody>${todayAttend.map(a => {
          const total   = Number(a.total||0);
          const present = Number(a.present||0);
          const pct     = total > 0 ? Math.round(present/total*100) : 0;
          const badge   = pct >= 80 ? 'db-badge-green' : pct >= 60 ? 'db-badge-amber' : 'db-badge-red';
          return `<tr>
            <td><strong>${a.class_name||a.class_id||'—'}</strong></td>
            <td>${present}</td>
            <td>${total - present}</td>
            <td><span class="db-badge ${badge}">${pct}%</span></td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>`
    : '<div class="dash-empty">Attendance not yet taken today</div>';

  /* ── 14. Classes overview ─────────────────────────────────────────── */
  document.getElementById('classOverviewBody').innerHTML = allClasses.length
    ? `<table class="dash-table">
        <thead><tr><th>Class</th><th>Enrolled</th><th>Capacity</th><th>Status</th></tr></thead>
        <tbody>${allClasses.map(cls => {
          const enrolled = (cls.enrollments||[]).length;
          const capacity = cls.capacity || 40;
          const pct      = Math.min(100, Math.round(enrolled/capacity*100));
          const badge    = pct >= 95 ? 'db-badge-red' : pct >= 75 ? 'db-badge-amber' : 'db-badge-green';
          return `<tr>
            <td><strong>${cls.name}</strong></td>
            <td>${enrolled}</td>
            <td>${capacity}</td>
            <td><span class="db-badge ${badge}">${pct}% full</span></td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>`
    : '<div class="dash-empty">No classes found</div>';

  /* ── 15. Overall fee snapshot ─────────────────────────────────────── */
  const barColor = overallFeeRate >= 70 ? '' : overallFeeRate >= 40 ? 'warn' : 'danger';
  document.getElementById('feeSnapshot').innerHTML = `
    <div style="margin-bottom:18px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:13px;color:var(--ink-3)">Overall Collection Rate</span>
        <strong style="font-size:14px">${overallFeeRate}%</strong>
      </div>
      <div class="progress-bar">
        <div class="progress-bar__fill ${barColor}" style="width:${overallFeeRate}%"></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div style="background:var(--success-light,#d1fae5);padding:14px;border-radius:8px">
        <div style="font-size:11px;color:var(--success,#16a34a);font-weight:700;text-transform:uppercase;margin-bottom:4px">Collected</div>
        <div style="font-size:18px;font-weight:800;color:var(--success,#16a34a)">${fmt(totalCollected)}</div>
      </div>
      <div style="background:var(--danger-light,#fee2e2);padding:14px;border-radius:8px">
        <div style="font-size:11px;color:var(--danger,#dc2626);font-weight:700;text-transform:uppercase;margin-bottom:4px">Outstanding</div>
        <div style="font-size:18px;font-weight:800;color:var(--danger,#dc2626)">${fmt(Math.max(0, totalExpected - totalCollected))}</div>
      </div>
    </div>`;

  /* ── 16. Recent students ──────────────────────────────────────────── */
  document.getElementById('recentStudentsWrap').innerHTML = recentStudents.length
    ? `<table class="dash-table">
        <tbody>${recentStudents.map(s => `
          <tr>
            <td>
              <div style="display:flex;align-items:center;gap:10px">
                <div class="avatar avatar--sm">${(s.full_name||'?').charAt(0)}</div>
                <div>
                  <div style="font-weight:600;font-size:.845rem">${s.full_name}</div>
                  <div style="font-size:.7rem;color:var(--ink-3)">${s.admission_no||''}</div>
                </div>
              </div>
            </td>
            <td><span class="chip">${s.enrollments?.[0]?.classes?.name||'Not enrolled'}</span></td>
            <td style="color:var(--ink-3);font-size:.72rem">${fmtDate(s.created_at)}</td>
          </tr>`).join('')}
        </tbody>
      </table>`
    : '<div class="dash-empty">No students yet</div>';

})(); // end IIFE

/* ── Utilities ──────────────────────────────────────────────────────────── */
function fmt(n) {
  if (n === undefined || n === null) return '₦0';
  return '₦' + Number(n).toLocaleString('en-NG');
}
function fmtDate(str) {
  if (!str) return '—';
  return new Date(str).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
function relDate(str) {
  if (!str) return '—';
  const diff = Math.floor((Date.now() - new Date(str)) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff <  7)  return diff + ' days ago';
  return fmtDate(str);
}
function getGreeting() {
  const h = new Date().getHours();
  return h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
}
function formatMoney(n) { return fmt(n); }
function formatDate(str) { return fmtDate(str); }
</script>

<script src="../js/pwa.js"></script>
<script src="../js/ai-assistant.js" defer></script>
