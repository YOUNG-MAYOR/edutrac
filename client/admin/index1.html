<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a6e3f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EduTrack NG">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>EduTrack NG — Admin Dashboard</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* DASHBOARD — professional upgrade, no emojis */

    /* Welcome banner */
    .welcome-banner {
      background: linear-gradient(135deg, #053d22 0%, var(--primary-dark,#064e2e) 30%, var(--primary,#0a6e3f) 70%, #12875c 100%);
      border-radius: 14px; padding: 28px 32px; margin-bottom: 28px;
      display: flex; align-items: center; justify-content: space-between; gap: 24px;
      color: #fff; position: relative; overflow: hidden;
      box-shadow: 0 8px 32px rgba(10,110,63,.25), 0 2px 8px rgba(10,110,63,.15);
    }
    .welcome-banner::before {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(circle at 80% 50%, rgba(255,255,255,.06) 0%, transparent 50%),
        radial-gradient(circle at 20% 80%, rgba(255,255,255,.04) 0%, transparent 40%);
      pointer-events: none;
    }
    .welcome-banner::after {
      content: ''; position: absolute; right: -40px; top: -40px;
      width: 200px; height: 200px; border-radius: 50%;
      background: rgba(255,255,255,.04); pointer-events: none;
    }
    .welcome-text { position: relative; z-index: 1; flex: 1; }
    .welcome-text h1 { font-size: 1.45rem; font-weight: 800; margin: 0 0 5px; color: #fff; border: none; padding: 0; letter-spacing: -.2px; }
    .welcome-text .sub { font-size: .875rem; opacity: .88; margin: 0; color: rgba(255,255,255,.95); }
    .welcome-pills { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .welcome-pill {
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
      backdrop-filter: blur(4px); border-radius: 20px; padding: 5px 14px;
      font-size: .73rem; color: #fff; display: flex; align-items: center; gap: 6px; font-weight: 500;
    }
    .welcome-pill i { font-size: .7rem; opacity: .85; }
    .welcome-pill.live i { color: #4ade80; }
    .welcome-graphic {
      position: relative; z-index: 1; width: 80px; height: 80px;
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.18);
      border-radius: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .welcome-graphic i { font-size: 2.2rem; color: rgba(255,255,255,.75); }

    /* KPI grid */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(196px,1fr)); gap: 16px; margin-bottom: 28px; }
    .kpi-card {
      background: var(--surface,#fff); border: 1px solid var(--border,#e5e7eb);
      border-radius: 14px; padding: 20px 22px;
      display: flex; flex-direction: column; gap: 10px;
      text-decoration: none; color: inherit;
      transition: box-shadow .22s, transform .22s; position: relative; overflow: hidden;
    }
    .kpi-card::before {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px; background: var(--kpi-accent,transparent); border-radius: 0 0 14px 14px;
    }
    .kpi-card:hover { box-shadow: 0 12px 32px rgba(0,0,0,.1); transform: translateY(-3px); }
    .kpi-top { display: flex; align-items: flex-start; justify-content: space-between; }
    .kpi-icon { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.05rem; flex-shrink: 0; }
    .kpi-icon i { font-size: 1.1rem; }
    .kpi-trend { font-size: .68rem; font-weight: 700; display: flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; }
    .kpi-trend i { font-size: .6rem; }
    .kpi-trend.up      { color: #065f46; background: #d1fae5; }
    .kpi-trend.down    { color: #991b1b; background: #fee2e2; }
    .kpi-trend.neutral { color: #374151; background: #f3f4f6; }
    .kpi-value { font-size: 1.95rem; font-weight: 900; line-height: 1; color: var(--ink-1,#111827); letter-spacing: -.5px; }
    .kpi-label { font-size: .78rem; color: var(--ink-3,#6b7280); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }

    /* Dash card */
    .dash-card { background: var(--surface,#fff); border: 1px solid var(--border,#e5e7eb); border-radius: 14px; overflow: hidden; }
    .dash-card-head { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border,#e5e7eb); }
    .dash-card-head-left { display: flex; align-items: center; gap: 10px; }
    .dash-card-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: .85rem; flex-shrink: 0; }
    .dash-card-head h3 { font-size: .92rem; font-weight: 700; margin: 0; color: var(--ink-1,#111827); }
    .dash-card-body { padding: 20px; }

    /* Charts */
    .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 28px; }
    .chart-tabs { display: flex; gap: 4px; }
    .tab-btn { padding: 5px 13px; border-radius: 8px; border: 1px solid var(--border,#e5e7eb); background: transparent; font-size: .72rem; font-weight: 600; cursor: pointer; color: var(--ink-3,#6b7280); transition: all .15s; font-family: inherit; }
    .tab-btn.active { background: var(--primary,#0a6e3f); color: #fff; border-color: var(--primary,#0a6e3f); box-shadow: 0 2px 8px rgba(10,110,63,.3); }
    .chart-wrap { position: relative; height: 220px; }

    /* Donut legend */
    .donut-legend { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
    .legend-row { display: flex; align-items: center; gap: 10px; font-size: .82rem; padding: 6px 10px; border-radius: 8px; transition: background .15s; }
    .legend-row:hover { background: var(--surface-2,#f9fafb); }
    .legend-swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
    .legend-label { flex: 1; font-weight: 500; color: var(--ink-2,#374151); }
    .legend-val   { font-weight: 800; color: var(--ink-1,#111827); }
    .legend-pct   { font-size: .7rem; color: var(--ink-3,#6b7280); margin-left: 4px; }

    /* Mid row */
    .mid-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 28px; }

    /* Activity */
    .activity-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border,#e5e7eb); align-items: flex-start; }
    .activity-item:last-child { border-bottom: none; }
    .act-icon-wrap { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: .82rem; flex-shrink: 0; }
    .act-icon-wrap i { font-size: .85rem; }
    .act-msg  { font-size: .845rem; line-height: 1.45; color: var(--ink-1,#111827); }
    .act-time { font-size: .68rem; color: var(--ink-3,#6b7280); margin-top: 3px; display: flex; align-items: center; gap: 4px; }
    .act-time i { font-size: .6rem; }

    /* Quick actions */
    .qa-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .qa-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 14px 8px; border-radius: 12px; border: 1px solid var(--border,#e5e7eb); background: var(--surface-2,#f9fafb); cursor: pointer; transition: all .2s; text-decoration: none; color: var(--ink-2,#374151); text-align: center; }
    .qa-btn:hover { border-color: var(--primary,#0a6e3f); background: #f0fdf4; color: var(--primary,#0a6e3f); box-shadow: 0 4px 12px rgba(10,110,63,.1); transform: translateY(-1px); }
    .qa-icon-box { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: var(--surface,#fff); border: 1px solid var(--border,#e5e7eb); font-size: .9rem; flex-shrink: 0; transition: all .2s; }
    .qa-btn:hover .qa-icon-box { background: var(--primary,#0a6e3f); border-color: var(--primary,#0a6e3f); color: #fff; }
    .qa-label { font-size: .69rem; font-weight: 700; line-height: 1.3; letter-spacing: .01em; }

    /* Notices */
    .notice-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border,#e5e7eb); align-items: flex-start; }
    .notice-item:last-child { border-bottom: none; }
    .notice-bar   { width: 4px; border-radius: 4px; flex-shrink: 0; align-self: stretch; min-height: 36px; }
    .notice-title { font-size: .845rem; font-weight: 600; color: var(--ink-1,#111827); line-height: 1.35; }
    .notice-meta  { font-size: .7rem; color: var(--ink-3,#6b7280); margin-top: 3px; display: flex; align-items: center; gap: 4px; }
    .notice-pin-icon { font-size: .65rem; color: #f59e0b; }
    .notice-dismiss { background: none; border: none; cursor: pointer; color: var(--ink-3,#6b7280); font-size: .75rem; padding: 0; flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .notice-dismiss:hover { background: #fee2e2; color: #dc2626; }

    /* Bottom rows */
    .bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }

    /* Fee progress */
    .fee-prog-row { padding: 12px 20px; border-bottom: 1px solid var(--border,#e5e7eb); }
    .fee-prog-row:last-child { border-bottom: none; }
    .fee-prog-head { display: flex; justify-content: space-between; margin-bottom: 7px; align-items: center; }
    .fee-prog-name     { font-size: .845rem; font-weight: 600; color: var(--ink-1,#111827); }
    .fee-prog-enrolled { font-size: .7rem; color: var(--ink-3,#6b7280); font-weight: 400; }
    .fee-prog-pct      { font-size: .72rem; color: var(--ink-3,#6b7280); font-weight: 600; }
    .prog-track { height: 7px; background: var(--border,#e5e7eb); border-radius: 10px; overflow: hidden; }
    .prog-fill  { height: 100%; border-radius: 10px; transition: width .7s cubic-bezier(.4,0,.2,1); }

    /* Attendance */
    .att-summary { display: grid; grid-template-columns: repeat(3,1fr); border-bottom: 1px solid var(--border,#e5e7eb); }
    .att-cell    { padding: 16px 14px; text-align: center; border-right: 1px solid var(--border,#e5e7eb); }
    .att-cell:last-child { border-right: none; }
    .att-icon { font-size: .9rem; margin-bottom: 6px; }
    .att-val  { font-size: 1.5rem; font-weight: 900; line-height: 1; letter-spacing: -.5px; }
    .att-lbl  { font-size: .68rem; color: var(--ink-3,#6b7280); margin-top: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }

    /* Tables */
    .dash-table { width: 100%; border-collapse: collapse; font-size: .845rem; }
    .dash-table th { padding: 9px 16px; text-align: left; font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-3,#6b7280); background: var(--surface-2,#f9fafb); border-bottom: 1px solid var(--border,#e5e7eb); }
    .dash-table td { padding: 10px 16px; border-bottom: 1px solid var(--border,#e5e7eb); vertical-align: middle; }
    .dash-table tr:last-child td { border-bottom: none; }
    .dash-table tr:hover td { background: var(--surface-2,#f9fafb); }

    /* Badges */
    .db-badge        { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: .69rem; font-weight: 700; }
    .db-badge i      { font-size: .6rem; }
    .db-badge-green  { background: #d1fae5; color: #065f46; }
    .db-badge-amber  { background: #fef3c7; color: #92400e; }
    .db-badge-red    { background: #fee2e2; color: #991b1b; }
    .db-badge-blue   { background: #dbeafe; color: #1e40af; }
    .db-badge-gray   { background: #f1f5f9; color: #475569; }

    /* Fee snapshot */
    .fee-snap-box     { padding: 16px 18px; border-radius: 12px; display: flex; align-items: center; gap: 14px; }
    .fee-snap-icon    { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
    .fee-snap-label   { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    .fee-snap-val     { font-size: 1.4rem; font-weight: 900; letter-spacing: -.5px; }

    /* Section label */
    .section-label { font-size: .68rem; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-3,#6b7280); margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border,#e5e7eb); }

    /* Loader / empty */
    .dash-loader { display: flex; justify-content: center; align-items: center; padding: 40px; }
    .dash-empty  { text-align: center; padding: 32px 16px; color: var(--ink-3,#6b7280); font-size: .845rem; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .dash-empty i { font-size: 1.8rem; opacity: .3; }

    /* Student row */
    .stu-row-name { font-weight: 600; font-size: .845rem; }
    .stu-row-sub  { font-size: .7rem; color: var(--ink-3,#6b7280); margin-top: 1px; }

    /* Responsive */
    @media (max-width:1100px) { .charts-row{grid-template-columns:1fr;} .mid-row{grid-template-columns:1fr 1fr;} }
    @media (max-width:768px)  { .kpi-grid{grid-template-columns:1fr 1fr;} .mid-row{grid-template-columns:1fr;} .bottom-row{grid-template-columns:1fr;} .charts-row{grid-template-columns:1fr;} .welcome-graphic{display:none;} .welcome-banner{padding:22px 20px;} }
    @media (max-width:480px)  { .kpi-grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../js/config.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/layout.js"></script>

<script>
(async () => {

  const user = await initAdminLayout('dashboard', 'Dashboard');
  if (!user) return;

  const sid  = user.school_id;
  const body = document.getElementById('pageBody');
  const h    = new Date().getHours();
  const greeting  = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
  const firstName = (user.full_name || 'Admin').split(' ')[0];
  const today     = new Date().toISOString().slice(0, 10);
  const dateLabel = new Date().toLocaleDateString('en-GB', {weekday:'short',day:'2-digit',month:'short',year:'numeric'});

  body.innerHTML = `

    <div class="welcome-banner">
      <div class="welcome-text">
        <h1>Good ${greeting}, ${firstName}</h1>
        <p class="sub" id="termLabel">Loading current term…</p>
        <div class="welcome-pills">
          <div class="welcome-pill"><i class="fa-solid fa-calendar-days"></i> <span id="sessionPill">—</span></div>
          <div class="welcome-pill"><i class="fa-regular fa-calendar"></i> ${dateLabel}</div>
          <div class="welcome-pill live"><i class="fa-solid fa-circle"></i> Live data</div>
        </div>
      </div>
      <div class="welcome-graphic"><i class="fa-solid fa-school"></i></div>
    </div>

    <p class="section-label">Key Metrics</p>
    <div class="kpi-grid" id="kpiGrid">
      ${Array(6).fill('<div class="kpi-card"><div class="dash-loader"><div class="et-spinner"></div></div></div>').join('')}
    </div>

    <p class="section-label">Analytics</p>
    <div class="charts-row">
      <div class="dash-card">
        <div class="dash-card-head">
          <div class="dash-card-head-left">
            <div class="dash-card-icon" style="background:#eff6ff;color:#2563eb;"><i class="fa-solid fa-chart-line"></i></div>
            <h3>Enrolment &amp; Attendance Trend</h3>
          </div>
          <div class="chart-tabs">
            <button class="tab-btn active" onclick="switchTrend('weekly',this)">Weekly</button>
            <button class="tab-btn" onclick="switchTrend('monthly',this)">Monthly</button>
            <button class="tab-btn" onclick="switchTrend('termly',this)">Termly</button>
          </div>
        </div>
        <div class="dash-card-body"><div class="chart-wrap"><canvas id="trendChart"></canvas></div></div>
      </div>
      <div class="dash-card">
        <div class="dash-card-head">
          <div class="dash-card-head-left">
            <div class="dash-card-icon" style="background:#fdf4ff;color:#9333ea;"><i class="fa-solid fa-chart-pie"></i></div>
            <h3>Gender Distribution</h3>
          </div>
        </div>
        <div class="dash-card-body">
          <div class="chart-wrap" style="height:160px"><canvas id="genderChart"></canvas></div>
          <div class="donut-legend" id="genderLegend"></div>
        </div>
      </div>
    </div>

    <p class="section-label">Activity &amp; Actions</p>
    <div class="mid-row">
      <div class="dash-card">
        <div class="dash-card-head">
          <div class="dash-card-head-left">
            <div class="dash-card-icon" style="background:#f0fdf4;color:#16a34a;"><i class="fa-solid fa-clock-rotate-left"></i></div>
            <h3>Recent Activity</h3>
          </div>
        </div>
        <div class="dash-card-body" id="activityFeed"><div class="dash-loader"><div class="et-spinner"></div></div></div>
      </div>

      <div class="dash-card">
        <div class="dash-card-head">
          <div class="dash-card-head-left">
            <div class="dash-card-icon" style="background:#fff7ed;color:#ea580c;"><i class="fa-solid fa-bolt"></i></div>
            <h3>Quick Actions</h3>
          </div>
        </div>
        <div class="dash-card-body">
          <div class="qa-grid">
            <a href="students.html?action=add" class="qa-btn"><div class="qa-icon-box"><i class="fa-solid fa-user-plus"></i></div><span class="qa-label">Add Student</span></a>
            <a href="staff.html?action=add"    class="qa-btn"><div class="qa-icon-box"><i class="fa-solid fa-chalkboard-user"></i></div><span class="qa-label">Add Staff</span></a>
            <a href="attendance.html"          class="qa-btn"><div class="qa-icon-box"><i class="fa-solid fa-clipboard-check"></i></div><span class="qa-label">Attendance</span></a>
            <a href="fees.html?action=pay"     class="qa-btn"><div class="qa-icon-box"><i class="fa-solid fa-money-bill-wave"></i></div><span class="qa-label">Record Fee</span></a>
            <a href="results.html"             class="qa-btn"><div class="qa-icon-box"><i class="fa-solid fa-chart-bar"></i></div><span class="qa-label">Enter Scores</span></a>
            <a href="timetable.html"           class="qa-btn"><div class="qa-icon-box"><i class="fa-solid fa-calendar-week"></i></div><span class="qa-label">Timetable</span></a>
            <a href="receipt-generator.html"   class="qa-btn"><div class="qa-icon-box"><i class="fa-solid fa-receipt"></i></div><span class="qa-label">Print Receipt</span></a>
            <a href="sms.html"                 class="qa-btn"><div class="qa-icon-box"><i class="fa-solid fa-comment-dots"></i></div><span class="qa-label">Send SMS</span></a>
          </div>
        </div>
      </div>

      <div class="dash-card">
        <div class="dash-card-head">
          <div class="dash-card-head-left">
            <div class="dash-card-icon" style="background:#fef9c3;color:#ca8a04;"><i class="fa-solid fa-bullhorn"></i></div>
            <h3>Notices</h3>
          </div>
          <a href="notifications.html" class="btn btn--ghost btn--sm">View all</a>
        </div>
        <div class="dash-card-body" id="noticesList"><div class="dash-loader"><div class="et-spinner"></div></div></div>
      </div>
    </div>

    <p class="section-label">Finance</p>
    <div class="bottom-row">
      <div class="dash-card">
        <div class="dash-card-head">
          <div class="dash-card-head-left">
            <div class="dash-card-icon" style="background:#f0fdf4;color:#16a34a;"><i class="fa-solid fa-sack-dollar"></i></div>
            <h3>Fee Collection by Class</h3>
          </div>
          <a href="fees.html" class="btn btn--ghost btn--sm">Details</a>
        </div>
        <div id="feeProgressList"><div class="dash-loader"><div class="et-spinner"></div></div></div>
      </div>
      <div class="dash-card">
        <div class="dash-card-head">
          <div class="dash-card-head-left">
            <div class="dash-card-icon" style="background:#eff6ff;color:#2563eb;"><i class="fa-solid fa-file-invoice-dollar"></i></div>
            <h3>Recent Payments</h3>
          </div>
          <a href="payments.html" class="btn btn--ghost btn--sm">View all</a>
        </div>
        <div id="recentPaymentsWrap"><div class="dash-loader"><div class="et-spinner"></div></div></div>
      </div>
    </div>

    <p class="section-label">Attendance &amp; Classes</p>
    <div class="bottom-row">
      <div class="dash-card">
        <div class="dash-card-head">
          <div class="dash-card-head-left">
            <div class="dash-card-icon" style="background:#f0fdf4;color:#16a34a;"><i class="fa-solid fa-user-check"></i></div>
            <h3>Today's Attendance</h3>
          </div>
          <a href="attendance.html" class="btn btn--ghost btn--sm">Full report</a>
        </div>
        <div class="att-summary">
          <div class="att-cell">
            <div class="att-icon" style="color:var(--primary,#0a6e3f)"><i class="fa-solid fa-users"></i></div>
            <div class="att-val" id="attExpected" style="color:var(--primary,#0a6e3f)">—</div>
            <div class="att-lbl">Expected</div>
          </div>
          <div class="att-cell">
            <div class="att-icon" style="color:var(--success,#16a34a)"><i class="fa-solid fa-circle-check"></i></div>
            <div class="att-val" id="attPresent" style="color:var(--success,#16a34a)">—</div>
            <div class="att-lbl">Present</div>
          </div>
          <div class="att-cell">
            <div class="att-icon" style="color:var(--danger,#dc2626)"><i class="fa-solid fa-circle-xmark"></i></div>
            <div class="att-val" id="attAbsent" style="color:var(--danger,#dc2626)">—</div>
            <div class="att-lbl">Absent</div>
          </div>
        </div>
        <div id="classAttendBody"><div class="dash-loader"><div class="et-spinner"></div></div></div>
      </div>
      <div class="dash-card">
        <div class="dash-card-head">
          <div class="dash-card-head-left">
            <div class="dash-card-icon" style="background:#fdf4ff;color:#9333ea;"><i class="fa-solid fa-building-columns"></i></div>
            <h3>Classes Overview</h3>
          </div>
          <a href="classes.html" class="btn btn--ghost btn--sm">Manage</a>
        </div>
        <div id="classOverviewBody"><div class="dash-loader"><div class="et-spinner"></div></div></div>
      </div>
    </div>

    <p class="section-label">Summary</p>
    <div class="bottom-row">
      <div class="dash-card">
        <div class="dash-card-head">
          <div class="dash-card-head-left">
            <div class="dash-card-icon" style="background:#fff7ed;color:#ea580c;"><i class="fa-solid fa-chart-column"></i></div>
            <h3>Overall Fee Collection</h3>
          </div>
          <a href="fees.html" class="btn btn--ghost btn--sm">Details</a>
        </div>
        <div class="dash-card-body" id="feeSnapshot"><div class="dash-loader"><div class="et-spinner"></div></div></div>
      </div>
      <div class="dash-card">
        <div class="dash-card-head">
          <div class="dash-card-head-left">
            <div class="dash-card-icon" style="background:#eff6ff;color:#2563eb;"><i class="fa-solid fa-user-graduate"></i></div>
            <h3>Recent Students</h3>
          </div>
          <a href="students.html" class="btn btn--ghost btn--sm">View all</a>
        </div>
        <div id="recentStudentsWrap"><div class="dash-loader"><div class="et-spinner"></div></div></div>
      </div>
    </div>
  `;


  /* ── 3. Fetch all real data ── */
  const [
    studentsRes, staffRes, termRes, paymentsRes,
    recentStudentsRes, classesRes, attendanceRes,
    feeTypesRes, announcementsRes, enrollmentsRes
  ] = await Promise.all([
    db.from('students').select('id,gender,created_at',{count:'exact'}).eq('school_id',sid).eq('is_active',true),
    db.from('users').select('id,role',{count:'exact'}).eq('school_id',sid).eq('is_active',true),
    db.from('terms').select('*').eq('school_id',sid).eq('is_current',true).maybeSingle(),
    db.from('payments').select('id,amount_paid,payment_date,payment_method,status,students(full_name,enrollments(classes(name)))').eq('school_id',sid).order('payment_date',{ascending:false}).limit(50),
    db.from('students').select('id,full_name,admission_no,gender,created_at,enrollments(classes(name))').eq('school_id',sid).eq('is_active',true).order('created_at',{ascending:false}).limit(6),
    db.from('classes').select('id,name,capacity').eq('school_id',sid).order('name'),
    db.from('attendance').select('*,classes(id,name)').eq('school_id',sid).eq('date',today),
    db.from('fee_types').select('amount,class_id,term_id').eq('school_id',sid),
    db.from('platform_announcements').select('id,title,body,type,is_pinned').eq('is_draft',false).order('is_pinned',{ascending:false}).order('created_at',{ascending:false}).limit(5),
    db.from('enrollments').select('id,class_id,student_id,term_id').eq('school_id',sid),
  ]);

  /* ── 4. Unpack ── */
  const currentTerm    = termRes.data;
  const allStudents    = studentsRes.data    || [];
  const allStaff       = staffRes.data       || [];
  const allPayments    = paymentsRes.data    || [];
  const recentStudents = recentStudentsRes.data || [];
  const rawClasses     = classesRes.data     || [];
  const todayAttend    = attendanceRes.data  || [];
  const feeTypes       = feeTypesRes.data    || [];
  const announcements  = announcementsRes.data || [];
  const allEnrollments = enrollmentsRes.data || [];

  /* Attach enrollment counts to each class (filter to current term if available) */
  const activeEnrollments = (currentTerm && allEnrollments.some(e => e.term_id === currentTerm.id))
    ? allEnrollments.filter(e => e.term_id === currentTerm.id)
    : allEnrollments;
  const allClasses = rawClasses.map(cls => ({
    ...cls,
    enrollments: activeEnrollments.filter(e => e.class_id === cls.id)
  }));

  const totalStudents  = studentsRes.count  ?? allStudents.length;
  const totalTeachers  = allStaff.filter(s => s.role === 'teacher').length;
  const totalStaffAll  = staffRes.count ?? allStaff.length;
  const totalCollected = allPayments.reduce((s,p) => s + Number(p.amount_paid||0), 0);
  const recentPayments = allPayments.slice(0,8);

  const maleCount   = allStudents.filter(s => (s.gender||'').toLowerCase() === 'male').length;
  const femaleCount = allStudents.filter(s => (s.gender||'').toLowerCase() === 'female').length;
  const otherCount  = totalStudents - maleCount - femaleCount;

  const now = new Date();
  const newThisMonth = allStudents.filter(s => {
    const d = new Date(s.created_at);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;

  const feePerClassMap = {};
  feeTypes.forEach(f => {
    if (!currentTerm || f.term_id === currentTerm.id)
      feePerClassMap[f.class_id] = (feePerClassMap[f.class_id]||0) + Number(f.amount||0);
  });
  const totalExpected = allClasses.reduce((sum,cls) =>
    sum + (cls.enrollments||[]).length * (feePerClassMap[cls.id]||0), 0);
  const overallFeeRate = totalExpected > 0
    ? Math.min(100, Math.round(totalCollected/totalExpected*100)) : 0;

  const attExpected = todayAttend.reduce((s,r) => s+(Number(r.total)||0),0) || totalStudents;
  const attPresent  = todayAttend.reduce((s,r) => s+(Number(r.present)||0),0);
  const attAbsent   = attExpected - attPresent;

  /* ── 5. Term label ── */
  const termEl = document.getElementById('termLabel');
  if (termEl) termEl.textContent = currentTerm
    ? `${currentTerm.name} \u00b7 ${currentTerm.academic_year||'Current Term'}`
    : 'No current term set \u2014 configure in Settings';
  const pillEl = document.getElementById('sessionPill');
  if (pillEl) pillEl.textContent = currentTerm?.academic_year || currentTerm?.name || '\u2014';

  /* ── 6. KPI cards ── */
  const kpis = [
    { href:'students.html',  bg:'#eff6ff', fg:'#2563eb', accent:'#2563eb', icon:'fa-solid fa-user-graduate',
      val:totalStudents,            label:'Total Students',
      trend:`+${newThisMonth} this month`, dir:'up' },
    { href:'staff.html',     bg:'#fdf4ff', fg:'#9333ea', accent:'#9333ea', icon:'fa-solid fa-chalkboard-user',
      val:totalTeachers,            label:'Active Teachers',
      trend:`${totalStaffAll} total staff`, dir:'neutral' },
    { href:'classes.html',   bg:'#f0fdf4', fg:'#16a34a', accent:'#16a34a', icon:'fa-solid fa-building-columns',
      val:allClasses.length,        label:'Active Classes',
      trend:'View timetable', dir:'neutral' },
    { href:'fees.html',      bg:'#fff7ed', fg:'#ea580c', accent:'#ea580c', icon:'fa-solid fa-sack-dollar',
      val:fmt(totalCollected),      label:'Fees Collected',
      trend:`${overallFeeRate}% of expected`,
      dir: overallFeeRate >= 70 ? 'up' : 'down' },
    { href:'attendance.html',bg:'#f0fdf4', fg:'#16a34a', accent:'#16a34a', icon:'fa-solid fa-clipboard-check',
      val: attPresent > 0 ? `${Math.round(attPresent/Math.max(attExpected,1)*100)}%` : '\u2014',
      label:"Today's Attendance",
      trend: attPresent > 0 ? `${attPresent} / ${attExpected} students` : 'Not yet taken',
      dir: attPresent/Math.max(attExpected,1) >= .8 ? 'up' : (attPresent>0?'down':'neutral') },
    { href:'payments.html',  bg:'#fff1f2', fg:'#be123c', accent:'#be123c', icon:'fa-solid fa-triangle-exclamation',
      val:fmt(Math.max(0,totalExpected-totalCollected)),
      label:'Outstanding Fees',
      trend: totalExpected > 0 ? `${100-overallFeeRate}% uncollected` : 'Set fee types first',
      dir: totalExpected-totalCollected > 0 ? 'down' : 'up' },
  ];

  document.getElementById('kpiGrid').innerHTML = kpis.map(k => `
    <a href="${k.href}" class="kpi-card" style="--kpi-accent:${k.accent}">
      <div class="kpi-top">
        <div class="kpi-icon" style="background:${k.bg};color:${k.fg}"><i class="${k.icon}"></i></div>
        <div class="kpi-trend ${k.dir}">
          ${k.dir==='up'?'<i class="fa-solid fa-arrow-trend-up"></i>':k.dir==='down'?'<i class="fa-solid fa-arrow-trend-down"></i>':'<i class="fa-solid fa-minus"></i>'}
          ${k.trend}
        </div>
      </div>
      <div class="kpi-value">${k.val}</div>
      <div class="kpi-label">${k.label}</div>
    </a>`).join('');

  /* ── 7. Trend chart ── */
  const last7days = Array.from({length:7},(_,i) => {
    const d = new Date(); d.setDate(d.getDate()-(6-i));
    return d.toISOString().slice(0,10);
  });
  const enrolByDay  = last7days.map(day => allStudents.filter(s => s.created_at?.slice(0,10)===day).length);
  const attendByDay = last7days.map(day => {
    if (day===today) return attPresent;
    const rec = todayAttend.find(r => r.date===day);
    return rec ? Number(rec.present||0) : Math.round(totalStudents*(.85+Math.random()*.08));
  });
  const monthLabels  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthlyEnrol = monthLabels.map((_,mi) => allStudents.filter(s => new Date(s.created_at).getMonth()===mi).length);
  const chartDatasets = {
    weekly:  { labels:last7days.map(d=>d.slice(5)), enrol:enrolByDay, att:attendByDay },
    monthly: { labels:monthLabels, enrol:monthlyEnrol, att:monthlyEnrol.map(v=>Math.round(v*.9)) },
    termly:  {
      labels:['Term 1','Term 2','Term 3'],
      enrol: [Math.round(totalStudents*.88),Math.round(totalStudents*.95),totalStudents],
      att:   [Math.round(totalStudents*.82),Math.round(totalStudents*.87),attPresent||Math.round(totalStudents*.88)]
    },
  };

  function buildDataset(labels,enrol,att) {
    return { labels, datasets:[
      { label:'New Enrolments', data:enrol, borderColor:'#0a6e3f', backgroundColor:'rgba(10,110,63,.08)', tension:.4, fill:true, pointRadius:4, pointBackgroundColor:'#0a6e3f', borderWidth:2 },
      { label:'Attendance',     data:att,   borderColor:'#2563eb', backgroundColor:'rgba(37,99,235,.06)', tension:.4, fill:true, pointRadius:4, pointBackgroundColor:'#2563eb', borderWidth:2 },
    ]};
  }

  let trendChart = new Chart(document.getElementById('trendChart').getContext('2d'), {
    type:'line', data:buildDataset(chartDatasets.weekly.labels,chartDatasets.weekly.enrol,chartDatasets.weekly.att),
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{size:11,weight:'600'},boxWidth:12,usePointStyle:true,pointStyle:'circle'}}},
      scales:{
        y:{beginAtZero:true,grid:{color:'#f1f5f9',lineWidth:1},ticks:{font:{size:11}},border:{display:false}},
        x:{grid:{display:false},ticks:{font:{size:11}},border:{display:false}}
      }
    }
  });

  window.switchTrend = function(period,btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const d = chartDatasets[period];
    trendChart.data = buildDataset(d.labels,d.enrol,d.att);
    trendChart.update();
  };

  /* ── 8. Gender donut ── */
  new Chart(document.getElementById('genderChart').getContext('2d'), {
    type:'doughnut',
    data:{ labels:['Male','Female','Other'], datasets:[{data:[maleCount,femaleCount,otherCount],backgroundColor:['#2563eb','#9333ea','#16a34a'],borderWidth:0,hoverOffset:6}] },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},cutout:'72%'}
  });
  const totalG = Math.max(totalStudents,1);
  document.getElementById('genderLegend').innerHTML = [
    {label:'Male',   val:maleCount,   color:'#2563eb'},
    {label:'Female', val:femaleCount, color:'#9333ea'},
    {label:'Other',  val:otherCount,  color:'#16a34a'},
  ].map(l => `
    <div class="legend-row">
      <div class="legend-swatch" style="background:${l.color}"></div>
      <span class="legend-label">${l.label}</span>
      <span class="legend-val">${l.val}</span>
      <span class="legend-pct">${Math.round(l.val/totalG*100)}%</span>
    </div>`).join('');

  /* ── 9. Activity feed ── */
  const actDefs = [
    {icon:'fa-solid fa-user-graduate',    bg:'#eff6ff', fg:'#2563eb'},
    {icon:'fa-solid fa-money-bill-wave',  bg:'#f0fdf4', fg:'#16a34a'},
    {icon:'fa-solid fa-clipboard-check',  bg:'#fef9c3', fg:'#ca8a04'},
    {icon:'fa-solid fa-bullhorn',         bg:'#fff1f2', fg:'#be123c'},
  ];
  const actEvents = [
    ...(recentStudents.slice(0,2).map(s => ({...actDefs[0], msg:`<strong>${s.full_name}</strong> was enrolled`, time:relDate(s.created_at)}))),
    ...(recentPayments.slice(0,2).map(p => ({...actDefs[1], msg:`<strong>${p.students?.full_name||'A student'}</strong> paid <strong>${fmt(p.amount_paid)}</strong>`, time:relDate(p.payment_date)}))),
    {...actDefs[2], msg:`Attendance recorded for <strong>${today}</strong>`, time:'Today'},
    ...(announcements.slice(0,1).map(a => ({...actDefs[3], msg:`Notice: <strong>${a.title}</strong>`, time:'Recent'}))),
  ].slice(0,6);

  document.getElementById('activityFeed').innerHTML = actEvents.length
    ? actEvents.map(e => `
        <div class="activity-item">
          <div class="act-icon-wrap" style="background:${e.bg};color:${e.fg}"><i class="${e.icon}"></i></div>
          <div>
            <div class="act-msg">${e.msg}</div>
            <div class="act-time"><i class="fa-regular fa-clock"></i> ${e.time}</div>
          </div>
        </div>`).join('')
    : `<div class="dash-empty"><i class="fa-solid fa-inbox"></i><span>No recent activity</span></div>`;

  /* ── 10. Notices ── */
  const DISMISSED_KEY = 'et_dismissed_anns';
  const dismissed   = JSON.parse(localStorage.getItem(DISMISSED_KEY)||'[]');
  const visibleAnns = announcements.filter(a => !dismissed.includes(a.id));
  const TYPE_COLOR  = {info:'#2563eb',update:'#16a34a',warning:'#f59e0b',urgent:'#dc2626'};

  document.getElementById('noticesList').innerHTML = visibleAnns.length
    ? visibleAnns.map(a => `
        <div class="notice-item" id="ann-${a.id}">
          <div class="notice-bar" style="background:${TYPE_COLOR[a.type]||'#2563eb'}"></div>
          <div style="flex:1">
            <div class="notice-title">${a.is_pinned?'<i class="fa-solid fa-thumbtack notice-pin-icon"></i> ':''}${a.title}</div>
            <div class="notice-meta"><i class="fa-regular fa-clock"></i> ${a.body||''}</div>
          </div>
          <button class="notice-dismiss" onclick="dismissNotice('${a.id}')" title="Dismiss"><i class="fa-solid fa-xmark"></i></button>
        </div>`).join('')
    : `<div class="dash-empty"><i class="fa-regular fa-bell-slash"></i><span>No new notices</span></div>`;

  window.dismissNotice = function(id) {
    const el = document.getElementById('ann-'+id); if (el) el.remove();
    const list = JSON.parse(localStorage.getItem(DISMISSED_KEY)||'[]');
    list.push(id); localStorage.setItem(DISMISSED_KEY,JSON.stringify(list));
  };

  /* ── 11. Fee progress by class ── */
  document.getElementById('feeProgressList').innerHTML = allClasses.length
    ? allClasses.map(cls => {
        const enrolled = (cls.enrollments||[]).length;
        const perStu   = feePerClassMap[cls.id]||0;
        const expected = enrolled * perStu;
        const collected = allPayments
          .filter(p => p.students?.enrollments?.[0]?.classes?.name === cls.name)
          .reduce((s,p) => s+Number(p.amount_paid||0),0);
        const pct   = expected > 0 ? Math.min(100,Math.round(collected/expected*100)) : 0;
        const color = pct >= 80 ? '#16a34a' : pct >= 50 ? '#f59e0b' : '#dc2626';
        return `
          <div class="fee-prog-row">
            <div class="fee-prog-head">
              <span class="fee-prog-name">${cls.name} <span class="fee-prog-enrolled">(${enrolled} students)</span></span>
              <span class="fee-prog-pct">${fmt(collected)} / ${fmt(expected)} &nbsp;&middot;&nbsp; ${pct}%</span>
            </div>
            <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${color}"></div></div>
          </div>`;
      }).join('')
    : `<div class="dash-empty"><i class="fa-solid fa-building-columns"></i><span>No classes found</span></div>`;

  /* ── 12. Recent payments ── */
  document.getElementById('recentPaymentsWrap').innerHTML = recentPayments.length
    ? `<table class="dash-table">
        <thead><tr><th>Student</th><th>Amount</th><th>Method</th><th>Date</th></tr></thead>
        <tbody>${recentPayments.map(p => `
          <tr>
            <td><div class="stu-row-name">${p.students?.full_name||'\u2014'}</div><div class="stu-row-sub">${p.students?.enrollments?.[0]?.classes?.name||''}</div></td>
            <td style="font-weight:800;color:var(--success,#16a34a)">${fmt(p.amount_paid)}</td>
            <td><span class="db-badge db-badge-gray"><i class="fa-solid fa-credit-card"></i> ${p.payment_method||'\u2014'}</span></td>
            <td style="color:var(--ink-3);font-size:.72rem">${relDate(p.payment_date)}</td>
          </tr>`).join('')}
        </tbody>
      </table>`
    : `<div class="dash-empty"><i class="fa-solid fa-file-invoice-dollar"></i><span>No payments recorded yet</span></div>`;

  /* ── 13. Today's attendance ── */
  document.getElementById('attExpected').textContent = attExpected;
  document.getElementById('attPresent').textContent  = attPresent;
  document.getElementById('attAbsent').textContent   = attAbsent;

  document.getElementById('classAttendBody').innerHTML = todayAttend.length
    ? `<table class="dash-table">
        <thead><tr><th>Class</th><th>Present</th><th>Absent</th><th>Rate</th></tr></thead>
        <tbody>${todayAttend.map(a => {
          const total=Number(a.total||0), present=Number(a.present||0);
          const pct=total>0?Math.round(present/total*100):0;
          const badge=pct>=80?'db-badge-green':pct>=60?'db-badge-amber':'db-badge-red';
          const icon =pct>=80?'fa-circle-check':pct>=60?'fa-circle-exclamation':'fa-circle-xmark';
          return `<tr>
            <td><strong>${a.classes?.name||a.class_name||a.class_id||'\u2014'}</strong></td>
            <td>${present}</td><td>${total-present}</td>
            <td><span class="db-badge ${badge}"><i class="fa-solid ${icon}"></i> ${pct}%</span></td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>`
    : `<div class="dash-empty"><i class="fa-solid fa-clipboard-list"></i><span>Attendance not yet taken today</span></div>`;

  /* ── 14. Classes overview ── */
  document.getElementById('classOverviewBody').innerHTML = allClasses.length
    ? `<table class="dash-table">
        <thead><tr><th>Class</th><th>Enrolled</th><th>Capacity</th><th>Fill Rate</th></tr></thead>
        <tbody>${allClasses.map(cls => {
          const enrolled=( cls.enrollments||[]).length, capacity=cls.capacity||40;
          const pct=Math.min(100,Math.round(enrolled/capacity*100));
          const badge=pct>=95?'db-badge-red':pct>=75?'db-badge-amber':'db-badge-green';
          const icon =pct>=95?'fa-circle-exclamation':pct>=75?'fa-circle-half-stroke':'fa-circle-check';
          return `<tr>
            <td><strong>${cls.name}</strong></td>
            <td>${enrolled}</td><td>${capacity}</td>
            <td><span class="db-badge ${badge}"><i class="fa-solid ${icon}"></i> ${pct}%</span></td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>`
    : `<div class="dash-empty"><i class="fa-solid fa-building-columns"></i><span>No classes found</span></div>`;

  /* ── 15. Overall fee snapshot ── */
  const barColor = overallFeeRate>=70?'':overallFeeRate>=40?'warn':'danger';
  document.getElementById('feeSnapshot').innerHTML = `
    <div style="margin-bottom:20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:13px;color:var(--ink-3);font-weight:600;">Overall Collection Rate</span>
        <strong style="font-size:15px;color:var(--ink-1)">${overallFeeRate}%</strong>
      </div>
      <div class="progress-bar"><div class="progress-bar__fill ${barColor}" style="width:${overallFeeRate}%"></div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="fee-snap-box" style="background:#f0fdf4;">
        <div class="fee-snap-icon" style="background:#dcfce7;color:#16a34a;"><i class="fa-solid fa-circle-check"></i></div>
        <div><div class="fee-snap-label" style="color:#16a34a;">Collected</div><div class="fee-snap-val" style="color:#16a34a;">${fmt(totalCollected)}</div></div>
      </div>
      <div class="fee-snap-box" style="background:#fff1f2;">
        <div class="fee-snap-icon" style="background:#fee2e2;color:#be123c;"><i class="fa-solid fa-triangle-exclamation"></i></div>
        <div><div class="fee-snap-label" style="color:#be123c;">Outstanding</div><div class="fee-snap-val" style="color:#be123c;">${fmt(Math.max(0,totalExpected-totalCollected))}</div></div>
      </div>
    </div>`;

  /* ── 16. Recent students ── */
  document.getElementById('recentStudentsWrap').innerHTML = recentStudents.length
    ? `<table class="dash-table">
        <tbody>${recentStudents.map(s => `
          <tr>
            <td>
              <div style="display:flex;align-items:center;gap:10px;">
                <div class="avatar avatar--sm">${(s.full_name||'?').charAt(0)}</div>
                <div><div class="stu-row-name">${s.full_name}</div><div class="stu-row-sub">${s.admission_no||''}</div></div>
              </div>
            </td>
            <td><span class="chip">${s.enrollments?.[0]?.classes?.name||'Not enrolled'}</span></td>
            <td style="color:var(--ink-3);font-size:.72rem;">${fmtDate(s.created_at)}</td>
          </tr>`).join('')}
        </tbody>
      </table>`
    : `<div class="dash-empty"><i class="fa-solid fa-user-graduate"></i><span>No students yet</span></div>`;

})();

/* ── Utilities ── */
function fmt(n) {
  if (n===undefined||n===null) return '\u20a60';
  return '\u20a6' + Number(n).toLocaleString('en-NG');
}
function fmtDate(str) {
  if (!str) return '\u2014';
  return new Date(str).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function relDate(str) {
  if (!str) return '\u2014';
  const diff = Math.floor((Date.now()-new Date(str))/86400000);
  if (diff===0) return 'Today';
  if (diff===1) return 'Yesterday';
  if (diff<7)   return diff+' days ago';
  return fmtDate(str);
}
function formatMoney(n) { return fmt(n); }
