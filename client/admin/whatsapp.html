<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTrack NG &mdash; WhatsApp Notifications</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <style>
    .wa-banner{background:linear-gradient(135deg,#075e54,#128c7e);border-radius:var(--radius-lg);padding:22px 26px;display:flex;align-items:center;gap:20px;margin-bottom:24px;color:white;}
    .wa-option{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:10px;cursor:pointer;transition:all .2s;}
    .wa-option:hover,.wa-option.sel{border-color:#25d366;background:#f0fdf4;}
    .preview-bubble{background:#dcf8c6;border-radius:12px 12px 0 12px;padding:12px 16px;font-size:14px;line-height:1.7;white-space:pre-wrap;color:#0d1117;}
    .wa-chat-bg{background:#e5ddd5;padding:20px;border-radius:var(--radius);margin-bottom:16px;}
    .tmpl-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:10px;}
    .phone-row{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--surface-2);border-radius:var(--radius-sm);margin-bottom:6px;font-size:13px;}
  </style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>
<script src="../js/layout.js"></script>
<script>
let user,students=[],selMethod='link';

const TMPLS=[
  {id:'result',name:'Results Published',icon:'\u{1F4CA}',body:'Hello {parent_name},\n\nResults for *{student_name}* are now published on EduTrack NG.\n\nAverage: *{avg_score}%* | Grade: *{grade}*\n\nLog in to view: {login_url}\n\n_EduTrack NG_'},
  {id:'fee',name:'Fee Reminder',icon:'\u{1F4B0}',body:'Hello {parent_name},\n\n*{student_name}* has an outstanding fee of *\u20A6{amount}*.\n\nPlease pay before _{due_date}_.\n\nThank you.\n\n_EduTrack NG_'},
  {id:'attend',name:'Low Attendance',icon:'\u{1F4CB}',body:'Hello {parent_name},\n\n*{student_name}\u2019s* attendance has dropped to *{attendance_pct}%* this term.\n\nPlease ensure daily attendance.\n\n_EduTrack NG_'},
  {id:'admit',name:'Admission Confirmation',icon:'\u{1F393}',body:'Dear {parent_name},\n\n*{student_name}* has been admitted to *{school_name}*! \u{1F389}\n\nClass: *{class_name}* | Adm No: *{admission_no}*\n\nWelcome!\n\n_EduTrack NG_'},
  {id:'custom',name:'Custom Message',icon:'\u270F',body:''}
];

(async()=>{
  user=await initAdminLayout('settings','WhatsApp');
  if(!user)return;
  const{data}=await db.from('students').select('id,full_name,parent_phone,parent_name').eq('school_id',user.school_id).eq('is_active',true).order('full_name');
  students=data||[];
  renderPage();
})();

function renderPage(){
  const withPhone=students.filter(s=>s.parent_phone);
  document.getElementById('pageBody').innerHTML=`
    <div class="page-header"><h1>WhatsApp Notifications</h1><p>Send WhatsApp messages to parents directly from EduTrack NG</p></div>
    <div class="wa-banner">
      <div style="font-size:40px;flex-shrink:0;">&#128172;</div>
      <div style="flex:1;"><h3 style="font-weight:700;margin-bottom:4px;">WhatsApp &mdash; Nigerian Parents&rsquo; Preferred Channel</h3><p style="font-size:13px;opacity:.7;">Parents respond 3&times; faster on WhatsApp than SMS. ${withPhone.length} of ${students.length} students have parent numbers.</p></div>
    </div>
    <div class="tabs" style="margin-bottom:20px;">
      <button class="tab active" onclick="switchT('single',this)">&#128244; Single Message</button>
      <button class="tab" onclick="switchT('bulk',this)">&#128101; Bulk Messages</button>
      <button class="tab" onclick="switchT('tmpls',this)">&#128221; Templates</button>
      <button class="tab" onclick="switchT('setup',this)">&#9881;&#65039; Setup</button>
    </div>
    <div id="tb"></div>`;
  switchTDirect('single');
}

function switchT(t,btn){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));btn.classList.add('active');switchTDirect(t);}
function switchTDirect(t){
  const c=document.getElementById('tb');
  if(t==='single')renderSingle(c);
  else if(t==='bulk')renderBulk(c);
  else if(t==='tmpls')renderTmpls(c);
  else renderSetup(c);
}

let selStudent=null;
function renderSingle(c){
  c.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:900px;">
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="card">
          <div class="card__header"><span class="card__title">1. Select Student</span></div>
          <input type="text" id="wsrch" class="form-control" placeholder="Search student name&hellip;" oninput="wsSearch()" autocomplete="off">
          <div id="wsug" style="position:relative;"></div>
          <div id="wstu" style="margin-top:8px;display:none;background:var(--primary-light);border-radius:8px;padding:10px 14px;font-size:14px;font-weight:600;color:var(--primary);"></div>
        </div>
        <div class="card">
          <div class="card__header"><span class="card__title">2. Template</span></div>
          <select id="wtmpl" class="form-control" onchange="loadTmpl()" style="margin-bottom:10px;">
            ${TMPLS.map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}
          </select>
          <textarea id="wmsg" class="form-control" rows="7" style="font-family:var(--mono);font-size:13px;" oninput="updPrev()"></textarea>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="card">
          <div class="card__header"><span class="card__title">&#128242; Preview</span></div>
          <div class="wa-chat-bg">
            <div style="font-size:11px;color:#6b7280;text-align:center;margin-bottom:8px;">Today</div>
            <div id="wprev" class="preview-bubble">Select a student and write a message to see preview&hellip;</div>
            <div style="text-align:right;font-size:10px;color:#9ca3af;margin-top:4px;">12:00 &#10003;&#10003;</div>
          </div>
        </div>
        <div class="card">
          <div id="wphoneinfo" style="background:var(--surface-2);border-radius:8px;padding:12px;font-size:13px;margin-bottom:14px;">Select a student first.</div>
          <button class="btn btn--primary" style="width:100%;background:#25d366;border-color:#25d366;" onclick="doSend()">&#128172; Open in WhatsApp</button>
          <div style="font-size:12px;color:var(--ink-3);margin-top:8px;text-align:center;">Opens WhatsApp on your phone with the message ready to send.</div>
        </div>
      </div>
    </div>`;
  loadTmpl();
}

function wsSearch(){
  const q=document.getElementById('wsrch').value.toLowerCase();
  if(q.length<2){document.getElementById('wsug').innerHTML='';return;}
  const m=students.filter(s=>s.full_name.toLowerCase().includes(q)).slice(0,6);
  document.getElementById('wsug').innerHTML=m.length?`<div style="position:absolute;left:0;right:0;z-index:10;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);top:2px;">${m.map(s=>`<div onclick="pickStudent('${s.id}','${s.full_name.replace(/'/g,"\'")}','${(s.parent_phone||'').replace(/'/g,"\'")}','${(s.parent_name||'').replace(/'/g,"\'")}')" style="padding:10px 14px;cursor:pointer;font-size:13px;" onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background=''">${s.full_name} <span style="color:var(--ink-3);font-size:12px;">${s.parent_phone?'&#128241; '+s.parent_phone:'&#9888;&#65039; No phone'}</span></div>`).join('')}</div>`:'';}

function pickStudent(id,name,phone,pname){
  selStudent={id,name,phone,pname};
  document.getElementById('wsrch').value=name;
  document.getElementById('wsug').innerHTML='';
  const info=document.getElementById('wphoneinfo');
  const stu=document.getElementById('wstu');
  if(info)info.innerHTML=phone?`<strong>${name}</strong><br>Parent: ${pname||'N/A'}<br>WhatsApp: <span style="color:#25d366;font-weight:700;">${phone}</span>`:`<span style="color:var(--danger);">&#9888;&#65039; ${name} has no parent phone number.</span>`;
  if(stu){stu.style.display='block';stu.textContent=name+' selected';}
  updPrev();
}

function loadTmpl(){
  const id=document.getElementById('wtmpl')?.value;
  const t=TMPLS.find(x=>x.id===id);
  const el=document.getElementById('wmsg');
  if(el&&t){el.value=t.body;updPrev();}
}

function updPrev(){
  const msg=document.getElementById('wmsg')?.value||'';
  const sn=selStudent?.name||'{student_name}';
  const pn=selStudent?.pname||'{parent_name}';
  let p=msg.replace(/\{student_name\}/g,sn).replace(/\{parent_name\}/g,pn).replace(/\{school_name\}/g,'Your School').replace(/\*([^*]+)\*/g,'<strong>$1</strong>').replace(/_([^_]+)_/g,'<em>$1</em>').replace(/\n/g,'<br>');
  const el=document.getElementById('wprev');
  if(el)el.innerHTML=p||'Write a message to see preview&hellip;';
}

function doSend(){
  const msg=document.getElementById('wmsg')?.value?.trim();
  if(!msg){toast('Write a message first.','error');return;}
  if(!selStudent?.phone){toast('Select a student with a parent phone number.','error');return;}
  const ph=selStudent.phone.replace(/\s/g,'').replace(/^0/,'234');
  const fm=msg.replace(/\{student_name\}/g,selStudent.name).replace(/\{parent_name\}/g,selStudent.pname||'').replace(/\{school_name\}/g,'Your School');
  window.open('https://wa.me/'+ph+'?text='+encodeURIComponent(fm),'_blank');
  toast('WhatsApp opened! Send the message from your phone.','success');
}

function renderBulk(c){
  const wp=students.filter(s=>s.parent_phone);
  c.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:900px;">
      <div class="card">
        <div class="card__header"><span class="card__title">&#128221; Bulk Message</span></div>
        <div class="form-group">
          <label class="form-label">Template</label>
          <select id="btmpl" class="form-control" onchange="loadBTmpl()">${TMPLS.map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}</select>
        </div>
        <div class="form-group">
          <textarea id="bmsg" class="form-control" rows="6" style="font-family:var(--mono);font-size:13px;"></textarea>
        </div>
        <button class="btn btn--primary" style="background:#25d366;border-color:#25d366;" onclick="genLinks()">&#128172; Generate ${wp.length} WhatsApp Links</button>
      </div>
      <div class="card">
        <div class="card__header"><span class="card__title">&#128241; Parents with Phone (${wp.length})</span></div>
        <div style="max-height:300px;overflow-y:auto;">
          ${wp.slice(0,15).map(s=>`<div class="phone-row"><div><strong>${s.full_name}</strong><div style="font-size:11px;color:var(--ink-3);">${s.parent_name||'Parent'}</div></div><span style="font-family:var(--mono);font-size:12px;">${s.parent_phone}</span></div>`).join('')}
          ${wp.length>15?`<div style="text-align:center;padding:8px;font-size:13px;color:var(--ink-3);">+${wp.length-15} more</div>`:''}
        </div>
      </div>
    </div>
    <div id="blinks" style="margin-top:16px;"></div>`;
  loadBTmpl();
}

function loadBTmpl(){const id=document.getElementById('btmpl')?.value;const t=TMPLS.find(x=>x.id===id);const el=document.getElementById('bmsg');if(el&&t)el.value=t.body;}

function genLinks(){
  const msg=document.getElementById('bmsg')?.value?.trim();
  if(!msg){toast('Write a message.','error');return;}
  const wp=students.filter(s=>s.parent_phone);
  const bl=document.getElementById('blinks');
  bl.innerHTML=`<div class="card"><div class="card__header"><span class="card__title">&#128172; ${wp.length} WhatsApp Links Ready</span></div>
    <p style="font-size:13px;color:var(--ink-3);margin-bottom:12px;">Click each link to open WhatsApp with the message pre-filled &mdash; just tap Send.</p>
    <div style="display:flex;flex-direction:column;gap:6px;max-height:360px;overflow-y:auto;">
      ${wp.map(s=>{
        const ph=s.parent_phone.replace(/\s/g,'').replace(/^0/,'234');
        const fm=msg.replace(/\{student_name\}/g,s.full_name).replace(/\{parent_name\}/g,s.parent_name||'Parent').replace(/\{school_name\}/g,'Your School');
        const url='https://wa.me/'+ph+'?text='+encodeURIComponent(fm);
        return `<div class="phone-row"><div><strong>${s.full_name}</strong><div style="font-size:11px;color:var(--ink-3);">${s.parent_phone}</div></div><a href="${url}" target="_blank" class="btn btn--sm" style="background:#25d366;color:white;border-color:#25d366;font-size:12px;">&#128172; Open</a></div>`;
      }).join('')}
    </div>
  </div>`;
  toast(wp.length+' links ready!','success');
}

function renderTmpls(c){
  c.innerHTML=`<div style="max-width:660px;">${TMPLS.map(t=>`
    <div class="tmpl-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <strong>${t.name}</strong>
        <button class="btn btn--secondary btn--sm" onclick="useTmpl('${t.id}')">Use</button>
      </div>
      ${t.body?`<div style="background:#dcf8c6;border-radius:10px 10px 0 10px;padding:12px 16px;font-size:13px;line-height:1.7;white-space:pre-wrap;">${t.body}</div>`:
      '<div style="font-size:13px;color:var(--ink-3);font-style:italic;">Write your own custom message</div>'}
    </div>`).join('')}</div>`;
}

function useTmpl(id){document.querySelector('.tab:first-child').click();setTimeout(()=>{const s=document.getElementById('wtmpl');if(s){s.value=id;loadTmpl();}},100);}

function renderSetup(c){
  c.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:860px;">
      <div class="card" style="background:#f0fdf4;border-color:#bbf7d0;">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:10px;">&#128279; Method 1: wa.me Links (Free)</h3>
        <p style="font-size:13px;color:var(--ink-2);line-height:1.75;margin-bottom:12px;"><strong>No setup needed.</strong> Clicking Send opens WhatsApp with the message pre-filled. You just tap Send on your phone.</p>
        <div style="background:#dcfce7;border-radius:8px;padding:10px 14px;font-size:13px;color:#15803d;font-weight:600;">&#9989; Already active &mdash; use it now!</div>
      </div>
      <div class="card">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:10px;">&#129302; Method 2: WhatsApp Business API</h3>
        <p style="font-size:13px;color:var(--ink-2);line-height:1.75;margin-bottom:12px;">Fully automated sending. Requires an approved WhatsApp Business account from Meta.</p>
        <div class="form-group">
          <label class="form-label">API Provider</label>
          <select id="wap" class="form-control"><option>Termii (Nigerian)</option><option>Twilio</option><option>360dialog</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">API Key</label>
          <input type="password" id="wakey" class="form-control" placeholder="Your API key">
        </div>
        <div class="form-group">
          <label class="form-label">Sender Phone</label>
          <input type="text" id="wasender" class="form-control" placeholder="+2348012345678">
        </div>
        <button class="btn btn--primary" onclick="saveWA()">&#128190; Save Config</button>
        <div id="waMsg" style="margin-top:8px;"></div>
      </div>
      <div class="card" style="grid-column:span 2;background:var(--warning-light);border-color:var(--warning);">
        <p style="font-size:13px;color:var(--warning);font-weight:600;">&#9888;&#65039; WhatsApp Business API requires Meta approval (1&ndash;5 business days) and a verified Nigerian business. For immediate use, the free wa.me method works perfectly for most schools.</p>
      </div>
    </div>`;
}

async function saveWA(){
  const key=document.getElementById('wakey')?.value?.trim();
  const msg=document.getElementById('waMsg');
  if(!key){msg.innerHTML='<span class="form-error">Enter API key.</span>';return;}
  const{data:sch}=await db.from('schools').select('settings').eq('id',user.school_id).single();
  const s=sch?.settings||{};
  const{error}=await db.from('schools').update({settings:{...s,wa_api_key:key}}).eq('id',user.school_id);
  if(error){msg.innerHTML=`<span class="form-error">${error.message}</span>`;return;}
  toast('WhatsApp API key saved!','success');
  msg.innerHTML='<span style="color:var(--success);font-size:13px;font-weight:600;">&#9989; Saved!</span>';
}
</script>

<script src="../js/ai-assistant.js" defer></script>
</body>
</html>
