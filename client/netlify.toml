    Cache-Control = "no-store, no-cache, must-revalidate"
    Pragma = "no-cache"

# Student portal (authenticated pages) — no-store
# Exception: /portals/student/login.html is handled separately below
[[headers]]
  for = "/portals/student/index.html"
