# EduTrack NG — Netlify Configuration
# Frontend deploys from the client/ folder.
# All /api/* requests are proxied to the Railway backend via the redirect below.

[build]
  publish = "."

# ── Proxy all API calls to Railway ──────────────────────────────
# Replace the :splat target with your actual Railway backend URL.
# This redirect is transparent to the browser (200 status passthrough).
[[redirects]]
  from   = "/api/*"
  to     = "https://REPLACE_WITH_RAILWAY_URL/api/:splat"
  status = 200
  force  = true

  [redirects.headers]
    X-Forwarded-Host = "edutrac.netlify.app"

# ── Security & PWA Headers ───────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Service Worker — must NOT be cached
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type  = "application/javascript"

# Manifest
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type  = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

# Icons — cache aggressively
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ── Role-gated portals — private, no CDN cache ───────────────────
[[headers]]
  for = "/admin/*.html"
  [headers.values]
    Cache-Control = "private, no-cache, must-revalidate"
    Pragma        = "no-cache"

