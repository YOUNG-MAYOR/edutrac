<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#7c3aed">
  <title>EduTrack NG — Exam Officer Dashboard</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .eo-stat { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: white; }
    .eo-stat .stat-card__value { color: white !important; }
    .eo-stat .stat-card__label { color: rgba(255,255,255,0.8); }
    .eo-stat .stat-card__icon { font-size: 28px; }
    .progress-bar { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 6px; }
    .progress-bar__fill { height: 100%; background: #7c3aed; border-radius: 99px; transition: width 0.5s ease; }
    .class-card { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; transition: box-shadow 0.2s; }
    .class-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .badge--purple { background: #ede9fe; color: #7c3aed; }
  </style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../../js/config.js"></script>
<script src="../../api/database.js"></script>
<script src="../../api/auth.js"></script>
<script src="../../api/calculations.js"></script>
<script src="../../assets/js/sidebar.js"></script>
<script>
(async () => {
  const user = await initPage(['exam_officer', 'vp_academic', 'admin'], 'Dashboard', 'dashboard');
  if (!user) return;
  const body = document.getElementById('pageBody');

  showLoader('#pageBody', 'Loading exam overview…');

  const [{ data: term }, { data: classes }, { data: students }, { data: exams }] = await Promise.all([
    db.from('terms').select('*').eq('school_id', user.school_id).eq('is_current', true).maybeSingle(),
    db.from('classes').select('id, name, level').eq('school_id', user.school_id).order('name'),
    db.from('students').select('id', { count: 'exact', head: true }).eq('school_id', user.school_id).eq('is_active', true),
    db.from('exams').select('*').eq('school_id', user.school_id).order('name'),
  ]);

  let enrolledCount = 0, resultCount = 0, classStats = [];

  if (term) {
    const { count: enrolled } = await db.from('enrollments')
      .select('id', { count: 'exact', head: true })
      .eq('school_id', user.school_id).eq('term_id', term.id);
    enrolledCount = enrolled || 0;

    const { count: results } = await db.from('results')
      .select('id', { count: 'exact', head: true })
      .eq('school_id', user.school_id).eq('term_id', term.id);
    resultCount = results || 0;

    // Per-class enrollment & result entry progress
    for (const cls of (classes || [])) {
      const [{ count: enr }, { count: res }] = await Promise.all([
        db.from('enrollments').select('id', { count: 'exact', head: true }).eq('class_id', cls.id).eq('term_id', term.id),
        db.from('results').select('id', { count: 'exact', head: true }).eq('class_id', cls.id).eq('term_id', term.id),
      ]);
      classStats.push({ ...cls, enrolled: enr || 0, results: res || 0 });
    }
  }

  const totalExamSlots = enrolledCount * (exams || []).length;
  const entryPct = totalExamSlots ? Math.round((resultCount / totalExamSlots) * 100) : 0;

  body.innerHTML = `
    <div class="page-header">
      <h1>Good ${getGreeting()}, ${user.full_name.split(' ')[0]}! <span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></span></h1>
      <p>${term ? term.name + ' · ' + (term.academic_year_id || '') : 'No active term set'} · ${new Date().toLocaleDateString('en-NG',{weekday:'long',day:'numeric',month:'long'})}</p>
    </div>

    ${!term ? `<div class="card" style="border-left:4px solid var(--warning);padding:16px;">
      <strong><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>️ No active term set.</strong> Ask the admin to set a current term in Settings.
    </div>` : ''}

    <div class="stat-grid">
      <div class="stat-card eo-stat">
        <div class="stat-card__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg></span>️</div>
        <div class="stat-card__value">${(classes||[]).length}</div>
        <div class="stat-card__label">Total Classes</div>
      </div>
      <div class="stat-card eo-stat">
        <div class="stat-card__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></span></div>
        <div class="stat-card__value">${enrolledCount}</div>
        <div class="stat-card__label">Enrolled This Term</div>
      </div>
      <div class="stat-card eo-stat">
        <div class="stat-card__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></span></div>
        <div class="stat-card__value">${(exams||[]).length}</div>
        <div class="stat-card__label">Exam Components</div>
      </div>
      <div class="stat-card eo-stat">
        <div class="stat-card__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span></div>
        <div class="stat-card__value">${entryPct}%</div>
        <div class="stat-card__label">Score Entry Done</div>
      </div>
    </div>

    <!-- Overall progress bar -->
    <div class="card" style="margin-bottom:20px;">
      <div class="card__header"><span class="card__title"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></span> Score Entry Progress — ${term?.name || 'N/A'}</span></div>
      <div style="padding:4px 0 12px;">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
          <span>${resultCount.toLocaleString()} of ${totalExamSlots.toLocaleString()} scores entered</span>
          <strong style="color:#7c3aed;">${entryPct}%</strong>
        </div>
        <div class="progress-bar"><div class="progress-bar__fill" style="width:${entryPct}%"></div></div>
      </div>
    </div>

    <!-- Per-class breakdown -->
    <div class="card" style="margin-bottom:20px;">
      <div class="card__header"><span class="card__title"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg></span> Class-by-Class Status</span></div>
      ${classStats.length ? `
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;padding:4px 0;">
          ${classStats.map(cls => {
            const maxSlots = cls.enrolled * (exams||[]).length;
            const pct = maxSlots ? Math.round((cls.results / maxSlots) * 100) : 0;
            const color = pct >= 100 ? 'var(--success)' : pct >= 50 ? '#7c3aed' : 'var(--warning)';
            return `
              <div class="class-card">
                <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px;">
                  <div style="font-weight:700;font-size:15px;">${cls.name}</div>
                  <span class="badge badge--purple">${pct}%</span>
                </div>
                <div style="font-size:12px;color:var(--ink-3);margin-bottom:8px;">
                  ${cls.enrolled} enrolled · ${cls.results} scores entered
                </div>
                <div class="progress-bar">
                  <div class="progress-bar__fill" style="width:${pct}%;background:${color}"></div>
                </div>
                <div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;">
                  <a href="results.html?class=${cls.id}" class="btn btn--secondary btn--sm"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></span> Results</a>
                  <a href="report-cards.html?class=${cls.id}" class="btn btn--secondary btn--sm"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg></span> Reports</a>
                </div>
              </div>`;
          }).join('')}
        </div>
      ` : '<div class="et-empty"><div class="et-empty__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg></span>️</div><p>No classes found.</p></div>'}
    </div>

    <!-- Quick Actions -->
    <div class="card">
      <div class="card__header"><span class="card__title"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span> Quick Actions</span></div>
      <div class="btn-group" style="flex-wrap:wrap;">
        <a href="results.html" class="btn btn--primary"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></span> View All Results</a>
        <a href="report-cards.html" class="btn btn--secondary"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg></span> Print Report Cards</a>
        <a href="exams.html" class="btn btn--secondary"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></span> Manage Exam Setup</a>
        <a href="students.html" class="btn btn--secondary"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></span> View Students</a>
      </div>
    </div>
  `;
})();

function getGreeting() {
  const h = new Date().getHours();
  return h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
}
</script>
<script src="../../js/pwa.js"></script>

<script src="../../js/ai-assistant.js" defer></script>
</body>
</html>
