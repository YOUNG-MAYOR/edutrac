<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a2e6e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Academic Report Card</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Playfair+Display:wght@400;700;900&family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&family=Poppins:wght@400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/global.css">
<style>
:root {
  --primary:#1a2e6e; --primary-dark:#111e4a; --primary-light:#2a44a0;
  --accent:#c8860a;  --accent-light:#f0c040;
  --co-bg:#fff8e6;   --co-hdr:#c8860a;
  --disc-bg:#e6f3fb; --disc-hdr:#1a6eaa;
  --grade-row:#e8f0fc;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#dde2ea;font-family:'EB Garamond',Georgia,serif;padding:0 0 60px;}

.rc-loader{max-width:820px;margin:80px auto;text-align:center;font-family:sans-serif;color:#555;}
.rc-spinner{width:44px;height:44px;border:4px solid #ddd;border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.rc-loader-steps{margin-top:12px;font-size:12px;color:#888;line-height:1.8;}
.step-done{color:#16a34a;} .step-active{color:var(--primary);font-weight:600;} .step-wait{color:#ccc;}

.err-box{max-width:820px;margin:50px auto;padding:32px 28px;background:white;border-radius:8px;
  box-shadow:0 2px 14px rgba(0,0,0,.12);font-family:sans-serif;border-left:5px solid #ef4444;}
.err-box h2{color:#b91c1c;font-size:16px;margin-bottom:8px;}
.err-box p{font-size:13px;color:#555;margin-bottom:6px;}
.err-box code{display:block;margin-top:10px;background:#fef2f2;border:1px solid #fca5a5;padding:8px 12px;
  border-radius:5px;font-size:12px;color:#991b1b;word-break:break-all;white-space:pre-wrap;}
.err-retry{display:inline-block;margin-top:14px;padding:8px 18px;background:var(--primary);color:white;
  border:none;border-radius:5px;font-size:13px;font-family:sans-serif;cursor:pointer;font-weight:600;}

.no-report-card{max-width:820px;margin:30px auto;background:#fff3cd;border-left:5px solid #ffc107;
  border-radius:8px;padding:32px 28px;text-align:center;font-family:'Segoe UI',sans-serif;
  box-shadow:0 2px 14px rgba(0,0,0,.08);}
.no-report-card svg{width:64px;height:64px;margin-bottom:16px;color:#856404;}
.no-report-card h3{color:#856404;font-size:22px;margin-bottom:12px;}
.no-report-card p{color:#533f03;font-size:14px;margin-bottom:20px;}
.no-report-card button{background:#856404;color:white;border:none;padding:10px 24px;
  border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;margin:0 8px;}
.no-report-card button:hover{background:#6c4a04;}

.control-bar{
  position:sticky;top:0;z-index:200;background:white;
  box-shadow:0 2px 10px rgba(0,0,0,.13);
  padding:9px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  font-family:'Segoe UI',sans-serif;font-size:13px;
}
.ssel-wrap{display:flex;align-items:center;gap:7px;flex:1;min-width:180px;}

/* ── Mobile control bar ── */
@media(max-width:640px){
  .control-bar{padding:8px 10px;gap:7px;}
  /* Student selector fills full width on its own row */
  .ssel-wrap{flex-basis:100%;min-width:0;order:0;}
  .ssel-wrap select{font-size:12px;}
  /* Theme label hidden on mobile */
  .control-bar > h3{display:none;}
  /* Swatches row: scrollable, full width */
  .color-presets{overflow-x:auto;flex-wrap:nowrap;flex-basis:100%;order:1;padding-bottom:2px;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .color-presets::-webkit-scrollbar{display:none;}
  /* Custom color picker inline with swatches */
  .custom-cw{order:2;flex-shrink:0;}
  /* Divider hidden on mobile */
  .dv{display:none;}
  /* Action buttons: wrap, right-aligned, last row */
  .ctrl-actions{order:3;margin-left:0;width:100%;justify-content:flex-end;flex-wrap:wrap;gap:5px;}
  .ctrl-btn{padding:6px 10px;font-size:11px;}
  .btn-pr svg{display:none;}
}
.ssel-wrap label{font-size:12px;color:#555;white-space:nowrap;font-weight:600;}
.ssel-wrap select{flex:1;padding:5px 9px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;
  font-family:'Segoe UI',sans-serif;color:#111;background:white;cursor:pointer;}
.snav{display:flex;gap:3px;}
.nav-btn{padding:4px 10px;border:1px solid #d1d5db;border-radius:5px;background:white;
  font-size:13px;cursor:pointer;font-weight:700;color:#374151;font-family:'Segoe UI',sans-serif;}
.nav-btn:hover:not(:disabled){background:var(--primary);color:white;border-color:var(--primary);}
.nav-btn:disabled{opacity:.35;cursor:not-allowed;}
.s-counter{font-size:12px;color:#6b7280;white-space:nowrap;}
.dv{width:1px;height:26px;background:#e5e7eb;flex-shrink:0;}
.color-presets{display:flex;gap:5px;align-items:center;}
.preset-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.14s;box-shadow:0 1px 4px rgba(0,0,0,.22);}
.preset-swatch:hover,.preset-swatch.active{transform:scale(1.2);border-color:#333;}
.custom-cw{display:flex;align-items:center;gap:5px;}
.custom-cw label{font-size:11px;color:#555;}
.custom-cw input[type=color]{width:30px;height:26px;border:1px solid #ccc;border-radius:4px;cursor:pointer;padding:1px;}
.ctrl-actions{display:flex;gap:6px;margin-left:auto;}
.ctrl-btn{padding:6px 13px;border:none;border-radius:5px;font-size:12px;font-family:'Segoe UI',sans-serif;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:5px;}
.btn-pa{background:#f59e0b;color:white;} .btn-pr{background:var(--primary);color:white;} .btn-bk{background:#f3f4f6;color:#374151;}
.ctrl-btn:hover{filter:brightness(1.08);}

.term-picker{max-width:820px;margin:30px auto 0;background:white;border-radius:10px;
  box-shadow:0 4px 22px rgba(0,0,0,.13);padding:32px 28px;font-family:'Segoe UI',sans-serif;
  border-top:4px solid var(--primary);}
.term-picker h2{font-family:'Cinzel',serif;color:var(--primary);font-size:16px;margin-bottom:6px;}
.term-picker p{font-size:12px;color:#6b7280;margin-bottom:18px;}
.term-picker-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
.term-picker-row select{flex:1;min-width:200px;padding:9px 12px;border:1.5px solid #d1d5db;border-radius:7px;
  font-size:13px;font-family:'Segoe UI',sans-serif;color:#111;background:white;cursor:pointer;}
.term-picker-row select:focus{outline:none;border-color:var(--primary);}
.term-go-btn{padding:9px 22px;background:var(--primary);color:white;border:none;border-radius:7px;
  font-size:13px;font-family:'Segoe UI',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap;}
.term-go-btn:hover{filter:brightness(1.1);}
.term-go-btn:disabled{opacity:.4;cursor:not-allowed;}
.term-sel-bar{display:flex;align-items:center;gap:6px;}
.term-sel-bar label{font-size:11px;color:#555;font-weight:600;white-space:nowrap;}
.term-sel-bar select{padding:4px 8px;border:1px solid #d1d5db;border-radius:5px;font-size:12px;
  font-family:'Segoe UI',sans-serif;color:#111;background:white;cursor:pointer;}
.term-sel-bar button{padding:4px 10px;background:var(--primary);color:white;border:none;border-radius:5px;
  font-size:11px;font-weight:700;cursor:pointer;font-family:'Segoe UI',sans-serif;}

.class-banner{max-width:820px;margin:12px auto 0;background:white;border-left:4px solid var(--primary);
  border-radius:0 6px 6px 0;padding:7px 15px;font-family:'Segoe UI',sans-serif;font-size:12px;color:#374151;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.class-banner strong{color:var(--primary);font-size:14px;}
.cbadge{background:var(--primary);color:white;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;}

@media print{
  .control-bar,.class-banner{display:none!important;}
  body{background:white!important;padding:0!important;}
  .report-card{box-shadow:none!important;margin:0!important;}
  .deco-border{border:3px solid #000!important;}
  .print-page-break{page-break-before:always;}
}

.card-wrap{max-width:820px;margin:14px auto 0;}
.report-card{background:white;box-shadow:0 4px 22px rgba(0,0,0,.15);padding:10px;}
.deco-border{border:4px solid var(--primary);padding:5px;position:relative;}
.deco-border::before{content:'';position:absolute;inset:4px;border:1.5px solid var(--accent-light);pointer-events:none;z-index:0;}
.deco-border::after{content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle at 0% 0%,var(--accent) 0,transparent 14px),radial-gradient(circle at 100% 0%,var(--accent) 0,transparent 14px),radial-gradient(circle at 0% 100%,var(--accent) 0,transparent 14px),radial-gradient(circle at 100% 100%,var(--accent) 0,transparent 14px);
  pointer-events:none;z-index:1;}
.card-inner{border:1.5px solid var(--primary);position:relative;z-index:2;background:white;overflow:hidden;}
.card-inner::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,#bbb 1px,transparent 1px);background-size:22px 22px;opacity:.05;pointer-events:none;z-index:0;}
.card-inner>*{position:relative;z-index:1;}
.deco-strip{height:11px;background:repeating-linear-gradient(90deg,var(--primary) 0px,var(--primary) 6px,var(--accent-light) 6px,var(--accent-light) 12px);opacity:.82;}

.rc-header{padding:13px 15px 9px;display:grid;grid-template-columns:80px 1fr 88px;gap:10px;align-items:center;border-bottom:2px solid var(--primary);}
.logo-circle{width:70px;height:70px;border-radius:50%;border:3px double var(--primary);display:flex;align-items:center;justify-content:center;overflow:hidden;background:#f7f7f7;}
.logo-circle img{width:100%;height:100%;object-fit:cover;}
.logo-fb{font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:var(--primary);text-align:center;line-height:1.3;padding:5px;}
.hc{text-align:center;}
.school-name{font-family:'Cinzel',serif;font-size:clamp(13px,2.7vw,23px);font-weight:900;color:var(--primary);letter-spacing:.5px;line-height:1.1;}
.school-meta{font-size:10px;color:#555;margin-top:3px;font-style:italic;}
.gold-div{height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent-light),var(--accent),transparent);margin:5px auto;width:75%;}
.card-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--primary);}
.sess-txt{font-size:12px;color:var(--accent);font-weight:600;margin-top:2px;}
.cls-line{font-size:12px;color:#333;margin-top:3px;font-style:italic;}
.cls-line span{border-bottom:1px dotted #888;min-width:70px;display:inline-block;font-style:normal;font-weight:700;color:var(--primary-dark);}

.pp-box{display:flex;flex-direction:column;align-items:center;gap:3px;}
.pp-frame{width:76px;height:92px;border:2px solid var(--primary);background:#f7f7f7;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;}
.pp-frame img{width:100%;height:100%;object-fit:cover;}
.pp-ph{text-align:center;font-size:9px;color:#bbb;font-family:sans-serif;line-height:1.4;padding:4px;}
.pp-ph svg{display:block;margin:0 auto 3px;}
.pp-lbl{font-size:9px;color:#999;font-style:italic;}

.info-strip{display:grid;grid-template-columns:1fr 1fr;border-bottom:2px solid var(--primary);font-size:12px;}
.info-row{display:flex;align-items:baseline;padding:5px 13px;border-bottom:1px solid #e4e4e4;gap:5px;}
.info-row:nth-child(odd){border-right:1px solid #ddd;}
.info-row:nth-last-child(-n+2){border-bottom:none;}
.il{font-weight:700;color:#333;white-space:nowrap;min-width:106px;}
.iv{border-bottom:1px dotted #bbb;flex:1;min-height:14px;color:#111;padding-left:2px;font-style:italic;}

.sec-hdr{background:var(--primary);color:white;font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;padding:4px 13px;text-transform:uppercase;font-weight:600;}

.aw{overflow-x:auto;}
table.ac{width:100%;border-collapse:collapse;font-size:11.5px;}
table.ac th,table.ac td{border:1px solid var(--primary);padding:4px 5px;text-align:center;vertical-align:middle;}
table.ac th{background:var(--primary);color:white;font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.4px;font-weight:600;}
td.sn{text-align:left;font-weight:700;font-size:12px;color:var(--primary-dark);padding-left:11px;background:#fafbff;white-space:nowrap;}
table.ac tr:nth-child(even) td:not(.sn){background:#f5f8ff;}
.gb{display:inline-block;padding:1px 7px;border-radius:3px;font-size:10px;font-weight:700;}
.gAp{background:#dcfce7;color:#15803d}.gA{background:#bbf7d0;color:#166534}.gBp{background:#dbeafe;color:#1d4ed8}
.gB{background:#bfdbfe;color:#1e40af}.gCp{background:#fef9c3;color:#854d0e}.gC{background:#fde68a;color:#92400e}
.gD{background:#fed7aa;color:#9a3412}.gF{background:#fee2e2;color:#991b1b}.gDf{background:#f3f4f6;color:#6b7280}

.sum-band{display:grid;grid-template-columns:repeat(4,1fr);border-top:2px solid var(--primary);border-bottom:2px solid var(--primary);}
.sum-cell{text-align:center;padding:7px 4px;border-right:1px solid var(--primary);}
.sum-cell:last-child{border-right:none;}
.sl{display:inline-block;font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:1px;text-transform:uppercase;color:white;padding:1px 7px;border-radius:2px;margin-bottom:4px;}
.sl.c1{background:var(--primary)}.sl.c2{background:var(--accent)}.sl.c3{background:#16a34a}.sl.c4{background:#7c3aed}
.sv{display:block;font-family:'Playfair Display',serif;font-size:20px;font-weight:700;line-height:1;}

.two-col{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #ddd;}
.co-col{border-right:2px solid var(--primary);}
.co-h,.di-h{text-align:center;padding:4px 8px;font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;color:white;}
.co-h{background:var(--co-hdr);}.di-h{background:var(--disc-hdr);}
.ach{display:flex;justify-content:space-between;align-items:center;padding:3px 11px;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.4px;}
.co-col .ach{background:rgba(200,134,10,.1);color:#7a4f00;}
.di-col .ach{background:rgba(26,110,170,.1);color:#0a3d5e;}
.ar{display:flex;align-items:center;justify-content:space-between;padding:4px 11px;border-bottom:1px solid rgba(0,0,0,.07);font-size:11px;}
.co-col .ar{background:var(--co-bg);}
.di-col .ar{background:var(--disc-bg);}
.ar:nth-child(even){filter:brightness(.97);}
.grade-box{min-width:38px;height:18px;border:1px solid #aaa;background:white;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#333;}

.rm-row{padding:6px 13px;font-size:11.5px;border-top:1px solid #eee;}
.rm-lbl{font-family:'Cinzel',serif;font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:2px;}

.promo-band{padding:7px 15px;border-top:1px solid #ddd;background:#fffef0;font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:var(--primary-dark);}
.promo-band span{border-bottom:1.5px dotted var(--accent);min-width:60px;display:inline-block;font-style:italic;}
.nt-row{padding:5px 15px;font-size:11px;border-top:1px solid #eee;background:#fffbeb;}

.gs-wrap{padding:6px 13px;border-top:1px solid #ddd;background:#f8f8f8;}
.gs-title{font-family:'Cinzel',serif;font-size:8px;text-align:center;letter-spacing:1.5px;text-transform:uppercase;color:var(--primary);margin-bottom:4px;font-weight:600;}
table.gs{width:100%;border-collapse:collapse;font-size:11px;}
table.gs th{background:var(--primary);color:white;padding:4px 5px;text-align:center;font-family:'Cinzel',serif;font-size:8px;letter-spacing:.4px;}
table.gs td{border:1px solid #ccc;padding:3px 5px;text-align:center;background:white;font-weight:600;}
table.gs tr td:first-child{background:var(--grade-row);}

.sig-ft{display:grid;grid-template-columns:repeat(4,1fr);padding:9px 15px 7px;border-top:2px solid var(--primary);background:#fafafa;gap:5px;}
.sig-bl{text-align:center;}
.sig-ln{border-top:1px solid #666;margin:24px auto 4px;width:76%;min-height:42px;display:flex;align-items:flex-end;justify-content:center;}
.sig-ln img{max-height:40px;max-width:90%;object-fit:contain;}
.sig-la{font-family:'Cinzel',serif;font-size:9px;color:#333;letter-spacing:.4px;}
.sig-sl{font-size:8px;color:#999;margin-top:1px;}


/* ══════════════════════════════════════════════
   NURSERY SECTION DESIGN — Playful & Colourful
   ══════════════════════════════════════════════ */
.ns-card{font-family:'Nunito',sans-serif;}
.ns-card .report-card{padding:0;border-radius:18px;overflow:hidden;}
.ns-card .deco-border{border:5px dashed #ff6b6b !important;border-radius:18px;padding:8px;
  background:linear-gradient(135deg,#fff9f0 0%,#f0faff 50%,#fff0f9 100%);}
.ns-card .deco-border::before{border:none;}
.ns-card .deco-border::after{background-image:none;}
.ns-card .card-inner{border-radius:12px;border:none;overflow:visible;}
.ns-card .card-inner::before{display:none;}
.ns-rainbow-strip{height:14px;background:linear-gradient(90deg,#ff6b6b,#ff9f43,#ffd32a,#0be881,#18dcff,#7d5fff,#ff6b6b);border-radius:8px 8px 0 0;}
.ns-header{padding:16px 16px 12px;display:flex;align-items:center;gap:14px;
  background:linear-gradient(135deg,#ffecd2 0%,#fcb69f 50%,#a18cd1 100%);
  position:relative;overflow:hidden;}
.ns-header::before{content:'⭐';position:absolute;top:-6px;right:12px;font-size:40px;opacity:.18;}
.ns-logo{width:76px;height:76px;border-radius:50%;border:4px solid white;overflow:hidden;
  background:white;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(0,0,0,.18);flex-shrink:0;}
.ns-logo img{width:100%;height:100%;object-fit:cover;}
.ns-logo-fb{font-size:8px;font-weight:800;color:#e65c00;text-align:center;padding:4px;font-family:'Fredoka One',sans-serif;}
.ns-hc{flex:1;text-align:center;}
.ns-school{font-family:'Fredoka One',cursive;font-size:clamp(14px,3vw,24px);
  color:#3d0c8f;text-shadow:1px 1px 0 rgba(255,255,255,.7);line-height:1.2;}
.ns-meta{font-size:10px;color:#5a3a6b;margin:3px 0 5px;}
.ns-title{font-family:'Fredoka One',cursive;font-size:17px;color:#e65c00;letter-spacing:.5px;}
.ns-sess{font-size:11px;color:#7d4cbb;font-weight:600;margin-top:2px;}
.ns-class{font-size:12px;color:#444;font-weight:700;margin-top:2px;}
.ns-pp{width:70px;height:88px;border-radius:8px;border:3px solid white;
  overflow:hidden;background:#f3e8ff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 8px rgba(0,0,0,.2);cursor:pointer;flex-shrink:0;}
.ns-pp img{width:100%;height:100%;object-fit:cover;}
.ns-pp-ph{text-align:center;font-size:9px;color:#aaa;font-family:sans-serif;line-height:1.4;padding:4px;}

.ns-info{display:grid;grid-template-columns:1fr 1fr;border-bottom:3px solid #ffd32a;font-size:12px;font-family:'Nunito',sans-serif;}
.ns-info-row{display:flex;padding:5px 13px;gap:5px;align-items:center;border-bottom:1px solid rgba(0,0,0,.05);}
.ns-info-row:nth-child(odd){background:#fff9f0;border-right:2px dashed #ffd32a;}
.ns-info-row:nth-child(even){background:#f0faff;}
.ns-il{font-weight:800;color:#5a3a6b;white-space:nowrap;min-width:90px;font-size:11px;}
.ns-iv{font-weight:600;color:#333;flex:1;}

.ns-sec-hdr{padding:6px 14px;font-family:'Fredoka One',cursive;font-size:13px;letter-spacing:.5px;color:white;
  background:linear-gradient(90deg,#7d5fff,#18dcff);}
.ns-skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.ns-skill-item{display:flex;align-items:center;justify-content:space-between;
  padding:6px 13px;border-bottom:1px solid rgba(0,0,0,.05);}
.ns-skill-item:nth-child(odd){background:#fff3e0;border-right:2px dashed #ff9f43;}
.ns-skill-item:nth-child(even){background:#e8f5e9;}
.ns-skill-name{font-weight:700;color:#444;font-size:11.5px;}
.ns-stars{display:flex;gap:2px;}
.ns-star-fill{color:#ffd32a;font-size:14px;}
.ns-star-empty{color:#ddd;font-size:14px;}

}

<script>
function applyPreset(el,p,pd,pl,a,al,coBg,coH,discBg,discH,grRow){
  document.querySelectorAll('.preset-swatch').forEach(s=>s.classList.remove('active'));
  el.classList.add('active'); _sv(p,pd,pl,a,al,coBg,coH,discBg,discH,grRow);
}
function applyCustom(hex){_sv(hex,shade(hex,-20),shade(hex,20),'#c8860a','#f0c040','#fff8e6','#c8860a','#e6f3fb','#1a6eaa','#e8f0fc');}
function _sv(p,pd,pl,a,al,coBg,coH,discBg,discH,grRow){
  const r=document.documentElement;
  r.style.setProperty('--primary',p);r.style.setProperty('--primary-dark',pd);r.style.setProperty('--primary-light',pl);
  r.style.setProperty('--accent',a);r.style.setProperty('--accent-light',al);
  r.style.setProperty('--co-bg',coBg);r.style.setProperty('--co-hdr',coH);
  r.style.setProperty('--disc-bg',discBg);r.style.setProperty('--disc-hdr',discH);
  r.style.setProperty('--grade-row',grRow);
  document.getElementById('customColor').value=p;
}
function shade(c,pct){
  let R=parseInt(c.slice(1,3),16),G=parseInt(c.slice(3,5),16),B=parseInt(c.slice(5,7),16);
  R=Math.min(255,Math.max(0,R+Math.round(R*pct/100)));
  G=Math.min(255,Math.max(0,G+Math.round(G*pct/100)));
  B=Math.min(255,Math.max(0,B+Math.round(B*pct/100)));
  return '#'+[R,G,B].map(v=>v.toString(16).padStart(2,'0')).join('');
}

const steps=[];
function addStep(label){
  steps.push({label,done:false});
  renderSteps();
  return steps.length-1;
}
function doneStep(i){steps[i].done=true;renderSteps();}
function renderSteps(){
  const el=document.getElementById('loadSteps'); if(!el)return;
  el.innerHTML=steps.map((s,i)=>{
    const last=i===steps.length-1;
    const cls=s.done?'step-done':last?'step-active':'step-wait';
    const icon=s.done?'✓':last?'▶':'○';
    return `<div class="${cls}">${icon} ${s.label}</div>`;
  }).join('');
}
function setMsg(m){const el=document.getElementById('loadMsg');if(el)el.textContent=m;}

async function sq(label, queryPromise, timeoutMs=20000){
  const si=addStep(label);
  const timer=new Promise((_,rej)=>setTimeout(()=>{rej(new Error(`Timed out after ${timeoutMs/1000}s`));},timeoutMs));
  try{
    const result=await Promise.race([queryPromise,timer]);
    if(result?.error && result.error.message){
      throw new Error(result.error.message);
    }
    doneStep(si);
    return result?.data!==undefined ? result.data : result;
  }catch(e){
    showErr(`Failed at step: "${label}"`, e.message||String(e));
    throw e;
  }
}

function showErr(msg,detail=''){
  document.getElementById('mainContent').innerHTML=`
    <div class="err-box">
      <h2>⚠️ ${msg}</h2>
      <p>The report card could not load. Check the details below and try again.</p>
      ${detail?`<code>${detail}</code>`:''}
      <br>
      <button class="err-retry" onclick="location.reload()">↺ Retry</button>
      &nbsp;
      <button class="err-retry" style="background:#6b7280" onclick="history.back()">← Go Back</button>
    </div>`;
}

function gradeFromScale(score,scale){
  if(score===null||score===undefined||!scale?.length)return{grade:'—',remark:''};
  const g=scale.find(s=>score>=s.min_score&&score<=s.max_score);
  return g?{grade:g.grade,remark:g.remark||''}:{grade:'—',remark:''};
}
function gradeBadge(g){
  if(!g||g==='—')return '<span class="gb gDf">—</span>';
  const m={'A+':'Ap','A':'A','B+':'Bp','B':'B','C+':'Cp','C':'C','D':'D','F':'F','F9':'F','E8':'F','D7':'D'};
  const c=m[g]||(g.startsWith('A')?'Ap':g.startsWith('B')?'Bp':g.startsWith('C')?'Cp':'Df');
  return `<span class="gb g${c}">${g}</span>`;
}
function fmtDate(d){if(!d)return '—';try{return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});}catch{return d;}}
function sigHTML(label,url){
  return `<div class="sig-bl"><div class="sig-ln">${url?`<img src="${url}" alt="${label}" crossorigin="anonymous">`:''}</div>
    <div class="sig-la">${label}</div><div class="sig-sl">Signature &amp; Stamp</div></div>`;
}
function rmHTML(label,text,bg,color){
  if(!text)return '';
  return `<div class="rm-row" style="background:${bg}"><span class="rm-lbl" style="color:${color}">${label}</span>${text}</div>`;
}
function actRows(fields,data){
  return fields.map(([k,l])=>`<div class="ar"><span>${l}</span><span class="grade-box">${data?.[k]||''}</span></div>`).join('');
}

function getSectionType(classRow){
  const s=(classRow?.level||classRow?.section||classRow?.name||'').toLowerCase();
  if(/nursery|crèche|creche|toddler|kinder|reception|pre[\s-]?school|early|playgroup|kg|k\.g|kindergarten/.test(s)) return 'nursery';
  if(/primary|junior|basic|elementary|standard|pry|jss|jnr|lower/.test(s)) return 'primary';
  return 'secondary';
}

/* ═══ SHARED DATA PREP ═══ */
function prepCardData(student,results,attData,affective){
  const cn=_classRow?.name||'—';
  const sec=(_classRow?.section||_classRow?.level||'').toUpperCase();
  const classLabel=sec?`${cn} — Section ${sec}`:cn;
  const examList=_exams?.length?_exams:[...new Map((results||[]).map(r=>[r.exam_id,r.exams])).values()].filter(Boolean);
  let subjectBase;
  if(_classSubjects?.length){
    // Deduplicate by subject_id — class_subjects may have duplicate entries
    const seen=new Map();
    _classSubjects.forEach(cs=>{
      if(!seen.has(cs.subject_id))
        seen.set(cs.subject_id,{id:cs.subject_id,name:cs.subjects?.name||cs.subject_name||'—'});
    });
    subjectBase=[...seen.values()];
  } else {
    const seen=new Map();
    (results||[]).forEach(r=>{if(!seen.has(r.subject_id))seen.set(r.subject_id,{id:r.subject_id,name:r.subjects?.name||'—'});});
    subjectBase=[...seen.values()];
  }
  // Also deduplicate examList to prevent duplicate score columns
  const examMap=new Map();
  (examList||[]).forEach(e=>{if(e&&!examMap.has(e.id))examMap.set(e.id,e);});
  const subRows=subjectBase.sort((a,b)=>a.name.localeCompare(b.name)).map(sub=>{
    const subResults=(results||[]).filter(r=>r.subject_id===sub.id);
    const tw=subResults.reduce((s,r)=>s+(r.exams?.weight||1),0);
    const ws=subResults.reduce((s,r)=>s+(r.score/(r.exams?.max_score||100))*100*(r.exams?.weight||1),0);
    const total=tw>0?Math.round(ws/tw*10)/10:null;
    const g=gradeFromScale(total,_scale||[]);
    return{name:sub.name,rows:subResults,total,grade:g.grade,remark:g.remark};
  });
  const ws2=subRows.filter(s=>s.total!==null);
  const avg=ws2.length?Math.round(ws2.reduce((s,r)=>s+r.total,0)/ws2.length*10)/10:null;
  const raw=results?.reduce((s,r)=>s+(r.score||0),0)??null;
  const og=gradeFromScale(avg,_scale||[]);
  const days=new Set((attData||[]).map(a=>a.date)).size;
  const pres=(attData||[]).filter(a=>a.status==='P'||a.status==='L').length;
  const att=days>0?Math.round(pres/days*100):null;
  const parts=[_school?.affiliation_no?`Affiliation No.: ${_school.affiliation_no}`:null,_school?.phone?`Ph: ${_school.phone}`:null,_school?.email?`Email: ${_school.email}`:null].filter(Boolean);
  const meta=parts.length?parts.join(' &nbsp;|&nbsp; '):[_school?.address,_school?.lga,_school?.state].filter(Boolean).join(', ')||'&nbsp;';
  const sessLabel=(_term?.academic_years?.label||_term?.name)?`Academic Session — ${_term?.academic_years?.label||_term?.name}`:'Academic Session';
  const logoH=_school?.logo_url?`<img src="${_school.logo_url}" alt="Logo" onerror="this.outerHTML='<div class=logo-fb>SCHOOL<br>CREST</div>'">`:`<div class="logo-fb">SCHOOL<br>CREST</div>`;
  const pp=student.photo_url||student.passport_url||student.avatar_url||'';
  const sid=student.id.replace(/-/g,'_');
  return{cn,classLabel,examList,subRows,avg,raw,og,att,meta,sessLabel,logoH,pp,sid,days,pres};
}

async function sqSafe(label, queryPromise, timeoutMs=8000){
  const timer=new Promise((_,rej)=>setTimeout(()=>rej(new Error('Timed out')),timeoutMs));
  try{
    const result=await Promise.race([queryPromise,timer]);
    if(result?.error){ console.warn(`sqSafe "${label}":`,result.error.message); return null; }
    return result?.data!==undefined ? result.data : result;
  }catch(e){
    console.warn(`sqSafe "${label}" failed:`,e.message||e);
    return null;
  }
}

/* ═══ BUILD ONE CARD — routes to section-specific builder ═══ */
async function buildCard(student, termId, extraClass=''){
  let studentResults = [];
  
  if(_bulkResults !== null){
    studentResults = _bulkResults.filter(r => r.student_id === student.id);
  } else {
    const {data: checkResults, count} = await db.from('results')
      .select('id', { count: 'exact', head: true })
      .eq('student_id', student.id)
      .eq('term_id', termId);
    
    if(!count || count === 0){
      return null;
    }
    
    studentResults = await sq(`Results for ${student.full_name||student.id}`,
      db.from('results')
        .select('score,student_id,subject_id,exam_id,subjects(id,name,code),exams(id,name,max_score,weight)')
        .eq('student_id', student.id).eq('term_id', termId));
  }

  if(!studentResults || studentResults.length === 0){
    return null;
  }

  let attData, affective;

  if(_bulkAtt !== null && _bulkAffective !== null){
    attData   = _bulkAtt.filter(a => a.student_id === student.id);
    affective = _bulkAffective.find(a => a.student_id === student.id) || null;
  } else {
    [attData, affective] = await Promise.all([
      sq(`Attendance for ${student.full_name||student.id}`,
         db.from('attendance')
           .select('status,date,student_id').eq('student_id',student.id).eq('term_id',termId)),
      sq(`Affective domain for ${student.full_name||student.id}`,
         db.from('affective_domain')
           .select('*').eq('student_id',student.id).eq('term_id',termId).maybeSingle()),
    ]);
  }

  const cn=_classRow?.name||'—';
  const sec=(_classRow?.section||_classRow?.level||'').toUpperCase();
  const classLabel=sec?`${cn} — Section ${sec}`:cn;

  const examList=_exams?.length
    ?_exams
    :[...new Map((studentResults||[]).map(r=>[r.exam_id,r.exams])).values()].filter(Boolean);

  let subjectBase;
  if(_classSubjects?.length){
    subjectBase=_classSubjects.map(cs=>({id:cs.subject_id,name:cs.subjects?.name||cs.subject_name||'—'}));
  } else {
    const seen=new Map();
    (studentResults||[]).forEach(r=>{if(!seen.has(r.subject_id))seen.set(r.subject_id,{id:r.subject_id,name:r.subjects?.name||'—'});});
    subjectBase=[...seen.values()];
  }
  
  const subRows=subjectBase.sort((a,b)=>a.name.localeCompare(b.name)).map(sub=>{
    const subResults=(studentResults||[]).filter(r=>r.subject_id===sub.id);
    const tw=subResults.reduce((s,r)=>s+(r.exams?.weight||1),0);
    const ws=subResults.reduce((s,r)=>s+(r.score/(r.exams?.max_score||100))*100*(r.exams?.weight||1),0);
    const total=tw>0?Math.round(ws/tw*10)/10:null;
    const g=gradeFromScale(total,_scale||[]);
    return{name:sub.name,rows:subResults,total,grade:g.grade,remark:g.remark};
  });

  const ws2=subRows.filter(s=>s.total!==null);
  const avg=ws2.length?Math.round(ws2.reduce((s,r)=>s+r.total,0)/ws2.length*10)/10:null;
  const raw=studentResults?.reduce((s,r)=>s+(r.score||0),0)??null;
  const og=gradeFromScale(avg,_scale||[]);
  const days=new Set((attData||[]).map(a=>a.date)).size;
  const pres=(attData||[]).filter(a=>a.status==='P'||a.status==='L').length;
  const att=days>0?Math.round(pres/days*100):null;

  const parts=[
    _school?.affiliation_no?`Affiliation No.: ${_school.affiliation_no}`:null,
    _school?.phone?`Ph: ${_school.phone}`:null,
    _school?.email?`Email: ${_school.email}`:null,
  ].filter(Boolean);
  const meta=parts.length?parts.join(' &nbsp;|&nbsp; '):
    [_school?.address,_school?.lga,_school?.state].filter(Boolean).join(', ')||'&nbsp;';
  const sessLabel=(_term?.academic_years?.label||_term?.name)
    ?`Academic Session — ${_term?.academic_years?.label||_term?.name}`:'Academic Session';

  const logoH=_school?.logo_url
    ?`<img src="${_school.logo_url}" alt="Logo" onerror="this.outerHTML='<div class=logo-fb>SCHOOL<br>CREST</div>'">`
    :`<div class="logo-fb">SCHOOL<br>CREST</div>`;

  const pp=student.photo_url||student.passport_url||student.avatar_url||'';

  const eHdrs=examList.map(e=>
    `<th>${e.name}<br><span style="font-weight:400;font-size:7.5px">/${e.max_score}</span></th>`
  ).join('');
  
  const sRows=subRows.map(sub=>{
    const cells=examList.map(e=>{
      const r=sub.rows.find(r=>r.exam_id===e.id);
      return`<td>${r!==undefined?r.score:'—'}</td>`;
    }).join('');
    return`<tr><td class="sn">${sub.name}</td>${cells}
      <td><strong style="color:var(--primary)">${sub.total??'—'}</strong></td>
      <td>${gradeBadge(sub.grade)}</td>
      <td style="font-size:10px;color:#555;text-align:left">${sub.remark||'—'}</td></tr>`;
  }).join('')||`<tr><td colspan="99" style="text-align:center;padding:18px;color:#999;font-family:sans-serif;font-size:12px">No results recorded for this term.</td></tr>`;

  const coF=[['work_education','Work Education'],['art_education','Art Education'],
    ['physical_education','Health &amp; Physical Education'],['social_skills','Social Skills'],['sports','Sports']];
  const diF=[['punctuality','Regularity &amp; Punctuality'],['sincerity','Sincerity'],
    ['conduct','Behaviour &amp; Values'],['respect','Respectfulness for Rules &amp; Reg.'],
    ['attitude_teachers','Attitude Towards Teachers'],['attitude_society','Attitude Towards Society']];

  const scH=(_scale||[]).length
    ?`<thead><tr><th>Grade</th>${(_scale||[]).map(g=>`<th>${g.grade}</th>`).join('')}</thead>
      <tbody><tr><th>Marks</th>${(_scale||[]).map(g=>`<td>${g.min_score}–${g.max_score}</td>`).join('')}</tr>
      <tr><th>Remark</th>${(_scale||[]).map(g=>`<td style="font-size:8.5px">${g.remark||'—'}</td>`).join('')}</tr></tbody>`
    :`<thead><tr><th>91–100</th><th>81–90</th><th>71–80</th><th>61–70</th><th>51–60</th><th>41–50</th><th>32–40</th></thead>
     <tbody><tr><td>A+</td><td>A</td><td>B+</td><td>B</td><td>C+</td><td>C</td><td>D</td></tr></tbody>`;

  const sid=student.id.replace(/-/g,'_');

  // Store current student for certificate/testimonial generation
  _currentStudent={student,results:studentResults,attData,affective};

  // Deduplicate exams — prevents duplicate score columns
  const examDeduped = [];
  const examSeen = new Set();
  (_exams || []).forEach(e => { if (e && !examSeen.has(e.id)) { examSeen.add(e.id); examDeduped.push(e); } });
  if (examDeduped.length) _exams = examDeduped;

  // Also deduplicate studentResults per (subject_id, exam_id) pair
  const resultKey = r => `${r.subject_id}||${r.exam_id}`;
  const resultSeen = new Set();
  studentResults = studentResults.filter(r => {
    const k = resultKey(r);
    if (resultSeen.has(k)) return false;
    resultSeen.add(k);
    return true;
  });

  // Route to section-specific card builder
  const sType=getSectionType(_classRow);
  if(sType==='nursery') return buildNurseryCard(student,studentResults,attData,affective);
  if(sType==='primary') return buildPrimaryCard(student,studentResults,attData,affective);

  return`
<div class="card-wrap ${extraClass}">
<div class="report-card"><div class="deco-border"><div class="card-inner">
<div class="deco-strip"></div>
<div class="rc-header">
  <div class="logo-circle">${logoH}</div>
  <div class="hc">
    <div class="school-name">${_school?.name||'School Name'}</div>
    <div class="school-meta">${meta}</div>
    <div class="gold-div"></div>
    <div class="card-title">Academic Record</div>
    <div class="sess-txt">${sessLabel}</div>
    <div class="cls-line">Class : <span>${classLabel}</span></div>
  </div>
  <div class="pp-box">
    <div class="pp-frame" onclick="document.getElementById('ppInput_${sid}').click()">
      <img id="ppImg_${sid}" src="${pp}" style="${pp?'':'display:none'}" alt="Student Photo">
      <div class="pp-ph" id="ppPh_${sid}" ${pp?'style="display:none"':''}>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        Affix<br>Student<br>Photo
      </div>
    </div>
    <input type="file" id="ppInput_${sid}" accept="image/*" onchange="loadPP(event,'${sid}')" style="display:none">
    <div class="pp-lbl">Passport Size</div>
  </div>
</div>
<div class="info-strip">
  <div class="info-row"><span class="il">Name of Student</span><span class="iv">${student.full_name||'—'}</span></div>
  <div class="info-row"><span class="il">Roll No.</span><span class="iv">${student.admission_no||student.roll_no||'—'}</span></div>
  <div class="info-row"><span class="il">Mother's Name</span><span class="iv">${student.mother_name||'—'}</span></div>
  <div class="info-row"><span class="il">Scholar No.</span><span class="iv">${student.scholar_no||student.id?.slice(0,8).toUpperCase()||'—'}</span></div>
  <div class="info-row"><span class="il">Father's Name</span><span class="iv">${student.father_name||student.guardian_name||'—'}</span></div>
  <div class="info-row"><span class="il">Date of Birth</span><span class="iv">${fmtDate(student.dob||student.date_of_birth)}</span></div>
</div>
<div class="sec-hdr">Scholastic Area — Academic Performance</div>
<div class="aw"><table class="ac">
  <thead><tr><th rowspan="2" style="text-align:left;padding-left:11px;min-width:110px">Subjects</th>${eHdrs}<th rowspan="2">Total</th><th rowspan="2">Grade</th><th rowspan="2" style="min-width:65px">Remark</th></tr><tr></tr></thead>
  <tbody>${sRows}</tbody>
</table></div>
<div class="sum-band">
  <div class="sum-cell"><span class="sl c1">Over All Marks</span><span class="sv" style="color:var(--primary)">${raw??'—'}</span></div>
  <div class="sum-cell"><span class="sl c2">Percentage</span><span class="sv" style="color:var(--accent)">${avg!==null?avg+'%':'—'}</span></div>
  <div class="sum-cell"><span class="sl c3">Grade</span><span class="sv" style="color:#16a34a">${og.grade}</span></div>
  <div class="sum-cell"><span class="sl c4">Attendance</span><span class="sv" style="color:#7c3aed">${att!==null?att+'%':'—'}</span></div>
</div>
<div class="two-col">
  <div class="co-col"><div class="co-h">Co-Schooling Area</div><div class="ach"><span>Activity</span><span>Grade</span></div>${actRows(coF,affective)}</div>
  <div class="di-col"><div class="di-h">Discipline</div><div class="ach"><span>Activity</span><span>Grade</span></div>${actRows(diF,affective)}</div>
</div>
${rmHTML("Class Teacher's Remark",affective?.class_teacher_remark,'#f8faff','var(--primary)')}
${rmHTML("VP Academic's Remark", affective?.vp_academic_remark, '#eff6ff','#1e40af')}
${rmHTML("Exam Officer's Remark", affective?.exam_officer_remark, '#faf5ff','#6b21a8')}

<div class="promo-band">Congratulations ! &nbsp; Promoted to Class — <span>${affective?.promoted_to||'&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;'}</span></div>

    <div class="no-report-card">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">

function loadPP(e,sid){
  const file=e.target.files[0];if(!file)return;
  const rd=new FileReader();
  rd.onload=ev=>{
    const img=document.getElementById('ppImg_'+sid);
    const ph =document.getElementById('ppPh_'+sid);
    if(img){img.src=ev.target.result;img.style.display='block';}
    if(ph) ph.style.display='none';
  };
  rd.readAsDataURL(file);
}

let _students=[],_ci=0,_tid='';

function switchStudent(id){
  const i=_students.findIndex(s=>s.id===id);if(i<0)return;
  _ci=i;_updateNav();_loadCard(_students[i]);
}

function stepStudent(d){
  const n=_ci+d;if(n<0||n>=_students.length)return;
  _ci=n;document.getElementById('ssel').value=_students[_ci].id;
  _updateNav();_loadCard(_students[_ci]);
}

function _updateNav(){
  document.getElementById('btnPrev').disabled=_ci===0;
  document.getElementById('btnNext').disabled=_ci===_students.length-1;
  document.getElementById('sCtr').textContent=`${_ci+1} / ${_students.length}`;
}

async function _loadCard(s){
  document.getElementById('mainContent').innerHTML=
    `<div class="rc-loader"><div class="rc-spinner"></div><p id="loadMsg">Loading ${s.full_name||'student'}...</p><div class="rc-loader-steps" id="loadSteps"></div></div>`;
  steps.length=0;
  
  try{
    const html=await buildCard(s,_tid);
    if(html===null){
      showNoReportCard(s);
    } else {
      document.getElementById('mainContent').innerHTML=html;
    }
  }
  catch(e){
    console.error('_loadCard error:', e);
    showErr('Failed to load report card', e.message||String(e));
  }
}

async function switchTerm(newTermId){
  if(!newTermId||newTermId===_tid) return;
  const chosen=_allTerms.find(t=>t.id===newTermId);
  if(!chosen) return;
  _tid=newTermId; _term=chosen;
  _bulkResults=null; _bulkAtt=null; _bulkAffective=null; _exams=null; _classSubjects=null;
  await _initClassCards(_classRow.school_id, _classRow.id);
}

async function _initClassCards(schoolId, classId){
  try{
    setMsg('Loading grade scale, exams and class subjects…');
    document.getElementById('mainContent').innerHTML=
      `<div class="rc-loader"><div class="rc-spinner"></div><p id="loadMsg">Loading data for ${_term?.name||'selected term'}…</p><div class="rc-loader-steps" id="loadSteps"></div></div>`;
    steps.length=0;

    const [scaleData,examsData]=await Promise.all([
      sq('Grading scale', db.from('grading_scales').select('*').eq('school_id',schoolId).order('min_score',{ascending:false})),
      sqSafe('Exams list', db.from('exams').select('*').eq('school_id',schoolId).eq('term_id',_tid).order('name')),
    ]);
    _scale=scaleData; _exams=examsData||[];

    setMsg('Loading class subjects…');
    let csData=await sqSafe('Class subjects',
      db.from('class_subjects')
        .select('subject_id,subjects(id,name,code)')
        .eq('class_id',classId)
        .order('subjects(name)',{ascending:true}));
    if(!csData?.length){
      csData=await sqSafe('Class subjects (alt)',
        db.from('class_subjects')
          .select('subject_id,subject_name')
          .eq('class_id',classId));
    }
    _classSubjects=csData||[];

    setMsg('Loading student list…');
    let enrollments=await sq('Enrollments',
      db.from('enrollments').select('student_id').eq('class_id',classId).eq('term_id',_tid));

    if(!enrollments?.length){
      const fallback=await sqSafe('Enrollments (class-only fallback)',
        db.from('enrollments').select('student_id').eq('class_id',classId));
      if(fallback?.length){
        enrollments=fallback;
      }
    }

    if(!enrollments?.length){
      document.getElementById('mainContent').innerHTML=`
        <div class="no-report-card">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <circle cx="12" cy="16" r="0.5" fill="currentColor" stroke="none"/>
          </svg>
          <h3>No Students Enrolled</h3>
          <p>No students are enrolled in this class for the selected term.</p>
          <p>Try selecting a different term, or ensure students are enrolled in this class.</p>
          <button onclick="history.back()">← Go Back</button>
        </div>`;
      return;
    }

    const studentIds=enrollments.map(e=>e.student_id).filter(Boolean);

    setMsg(`Loading ${studentIds.length} student records…`);
    const studentsData=await sq('Student records',
      db.from('students').select('id,full_name,admission_no,roll_no,mother_name,father_name,guardian_name,scholar_no,dob,date_of_birth,photo_url,passport_url,avatar_url,school_id').in('id',studentIds));

    _students=(studentsData||[]).sort((a,b)=>(a.full_name||'').localeCompare(b.full_name||''));

    setMsg('Bulk loading results, attendance and affective data…');
    const [allResults, allAtt, allAffective]=await Promise.all([
      sq('All results (bulk)',
         db.from('results')
           .select('score,student_id,subject_id,exam_id,subjects(id,name,code),exams(id,name,max_score,weight)')
           .in('student_id',studentIds).eq('term_id',_tid)),
      sq('All attendance (bulk)',
         db.from('attendance')
           .select('status,date,student_id').in('student_id',studentIds).eq('term_id',_tid)),
      sq('All affective (bulk)',
         db.from('affective_domain')
           .select('*').in('student_id',studentIds).eq('term_id',_tid)),
    ]);
    _bulkResults = allResults || [];
    _bulkAtt = allAtt || [];
    _bulkAffective = allAffective || [];

    const sel=document.getElementById('ssel');
    sel.innerHTML=_students.map(s=>
      `<option value="${s.id}">${s.full_name||'Unknown'}${s.admission_no?' ('+s.admission_no+')':''}</option>`
    ).join('');
    document.getElementById('sselWrap').style.display='flex';
    document.getElementById('dvSel').style.display='block';
    document.getElementById('btnPrintAll').style.display='flex';
    document.getElementById('btnCert').style.display='flex';
    document.getElementById('btnTest').style.display='flex';

    // Update the banner with student count and selected term
    const cntBadge=document.getElementById('studentCountBadge');
    if(cntBadge) cntBadge.textContent=`${_students.length} student${_students.length!==1?'s':''}`;
    const termLabel=document.getElementById('termBadgeLabel');
    if(termLabel){
      const tName=_term?.name||'Selected Term';
      const sessLabel=_term?.academic_years?.label?` — ${_term.academic_years.label}`:'';
      termLabel.textContent=`Term: ${tName}${sessLabel}`;
      termLabel.style.color='var(--primary)';
      termLabel.style.fontWeight='600';
    }

    _ci=0; _updateNav();
    await _loadCard(_students[0]);

  }catch(e){
    if(document.querySelector('.rc-loader')){
      showErr('Unexpected error loading report cards', e.message||String(e));
    }
    console.error('Report card error:',e);
  }
}

async function printAll(){
  const btn=document.getElementById('btnPrintAll');
  btn.textContent='⏳ Preparing…';btn.disabled=true;
  document.getElementById('mainContent').innerHTML=
    `<div class="rc-loader"><div class="rc-spinner"></div><p id="loadMsg">Building all cards…</p><div class="rc-loader-steps" id="loadSteps"></div></div>`;
  steps.length=0;
  let html='';
  let printedCount=0;
  for(let i=0;i<_students.length;i++){
    try{
      const cardHtml=await buildCard(_students[i],_tid);
      if(cardHtml){
        html+=cardHtml+(i>0?'<div class="print-page-break"></div>':'');
        printedCount++;
      }
    }catch(e){}
  }
  if(printedCount===0){
    document.getElementById('mainContent').innerHTML='<div class="err-box"><h2>No students with published report cards found.</h2></div>';
  } else {
    document.getElementById('mainContent').innerHTML=html;
    setTimeout(()=>window.print(),500);
  }
  btn.textContent='🖨 Print All';btn.disabled=false;
}

function showTermPicker(schoolId, classId, terms){
  const opts=terms.map(t=>{
    const sess=t.academic_years?.label||'';
    const label=sess?`${t.name} — ${sess}`:t.name;
    const isCurrent=t.is_current?' ★ Current':'';
    return `<option value="${t.id}">${label}${isCurrent}</option>`;
  }).join('');
  document.getElementById('mainContent').innerHTML=`
    <div class="term-picker">
      <h2>📋 Select Term to Generate Report Cards</h2>
      <p>Choose the academic term for which you want to generate report cards for this class.</p>
      <div class="term-picker-row">
        <select id="termPickerSel">${opts}</select>
        <button class="term-go-btn" onclick="onTermPickerGo('${schoolId}','${classId}')">Generate Reports →</button>
      </div>
    </div>`;
}

async function onTermPickerGo(schoolId, classId){
  const sel=document.getElementById('termPickerSel');
  if(!sel||!sel.value) return;
  const chosen=_allTerms.find(t=>t.id===sel.value);
  if(!chosen) return;
  _tid=sel.value; _term=chosen;
  _populateTermBar();
  _bulkResults=null; _bulkAtt=null; _bulkAffective=null; _exams=null; _classSubjects=null;
  await _initClassCards(schoolId, classId);
}

function _populateTermBar(){
  const bar=document.getElementById('termSelBar');
  const tsel=document.getElementById('termSel');
  if(!bar||!tsel) return;
  tsel.innerHTML=_allTerms.map(t=>{
    const sess=t.academic_years?.label||'';
    const label=sess?`${t.name} — ${sess}`:t.name;
    return `<option value="${t.id}"${t.id===_tid?' selected':''}>${label}${t.is_current?' ★':''}</option>`;
  }).join('');
  bar.style.display='flex';
}

(async()=>{
  const P=new URLSearchParams(location.search);
  const classId  =P.get('class');
  const studentId=P.get('student');
  let   termId   =P.get('term');

  if(classId){
    try{
      setMsg('Loading class info…');
      _classRow=await sq('Class info', db.from('classes').select('id,name,level,section,school_id').eq('id',classId).single());
      if(!_classRow) return;

      const schoolId=_classRow.school_id;

      setMsg('Loading school and terms…');
      const [schoolData, allTermsData]=await Promise.all([
        sq('School data', db.from('schools').select('name,logo_url,address,state,lga,phone,email,motto,affiliation_no,vp_signature_url,exam_officer_signature_url,principal_signature_url,class_teacher_signature_url').eq('id',schoolId).single()),
        sq('All terms', db.from('terms').select('*,academic_years(label)').eq('school_id',schoolId).order('start_date',{ascending:false})),
      ]);
      _school=schoolData;
      _allTerms=allTermsData||[];

      const sec=(_classRow.section||_classRow.level||'').toUpperCase();
      const cLabel=sec?`${_classRow.name} — Section ${sec}`:_classRow.name;
      const bannerDiv=document.createElement('div');
      bannerDiv.className='class-banner no-print';
      bannerDiv.id='classBanner';
      bannerDiv.innerHTML=`<strong>${cLabel}</strong><span class="cbadge" id="studentCountBadge">—</span><span id="termBadgeLabel" style="color:#6b7280">Select a term to load results</span><span style="color:#6b7280">·</span><span style="color:#6b7280">School: ${_school?.name||schoolId}</span>`;
      document.getElementById('mainContent').insertAdjacentElement('beforebegin', bannerDiv);

      if(termId){
        const chosen=_allTerms.find(t=>t.id===termId);
        if(chosen){ _tid=chosen.id; _term=chosen; }
        else {
          _tid=termId;
          const termDetail=await sqSafe('Term detail',db.from('terms').select('*,academic_years(label)').eq('id',termId).maybeSingle());
          _term=termDetail||{id:termId,name:'Selected Term'};
        }
        _populateTermBar();
        await _initClassCards(schoolId, classId);
      } else if(_allTerms.length===1){
        _tid=_allTerms[0].id; _term=_allTerms[0];
        _populateTermBar();
        await _initClassCards(schoolId, classId);
      } else if(_allTerms.length>1){
        showTermPicker(schoolId, classId, _allTerms);
      } else {
        showErr('No terms found for this school.','Please create at least one term in the admin panel.');
      }
    }catch(e){
      if(document.querySelector('.rc-loader')){
        showErr('Unexpected error loading report card', e.message||String(e));
      }
      console.error('Report card error:',e);
    }
    return;
  }

  if(!studentId){
    // No class/student param — show a class picker so the sidebar button works
    try{
      const userData = await getCurrentUser();
      const schoolId = userData?.school_id || userData?.schools?.id;
      if(!schoolId){ window.location.href = '/login.html'; return; }
      document.getElementById('mainContent').innerHTML='<div class="rc-loader"><div class="rc-spinner"></div><p id="loadMsg">Loading classes…</p></div>';
      const {data:classes,error}=await db.from('classes').select('id,name,level,section').eq('school_id',schoolId).order('name');
      if(error||!classes?.length){ showErr('No classes found','Please create classes in the admin panel first.'); return; }
      const rows=classes.map(c=>{
        const sec=(c.section||c.level||'').toUpperCase();
        const label=sec?`${c.name} — Section ${sec}`:c.name;
        return `<div onclick="location.href='report-cards.html?class=${c.id}'" style="padding:14px 18px;border:1.5px solid #e5e7eb;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s;background:white;" onmouseover="this.style.borderColor='var(--primary)';this.style.background='#f0f4ff'" onmouseout="this.style.borderColor='#e5e7eb';this.style.background='white'">
          <span style="width:38px;height:38px;border-radius:7px;background:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></span>
          <div><div style="font-weight:700;font-size:14px;color:#1e293b">${label}</div><div style="font-size:11px;color:#6b7280;margin-top:2px">Click to view report cards</div></div>
          <span style="margin-left:auto;color:#9ca3af">&rsaquo;</span>
        </div>`;
      }).join('');
      document.getElementById('mainContent').innerHTML=`
        <div style="max-width:680px;margin:30px auto;">
          <div style="background:white;border-radius:12px;padding:28px;box-shadow:0 1px 4px rgba(0,0,0,.08);">
            <h2 style="font-family:'Cinzel',serif;color:var(--primary);font-size:18px;margin-bottom:6px">📋 Select a Class</h2>
            <p style="font-size:13px;color:#6b7280;margin-bottom:22px">Choose the class whose report cards you want to view or print.</p>
            <div style="display:flex;flex-direction:column;gap:10px">${rows}</div>
          </div>
        </div>`;
    }catch(e){ showErr('Failed to load classes', e.message||String(e)); }
    return;
  }

  try{
    setMsg('Loading student…');
    const student=await sq('Student record',
      db.from('students').select('id,full_name,admission_no,roll_no,mother_name,father_name,guardian_name,scholar_no,dob,date_of_birth,photo_url,passport_url,avatar_url,school_id').eq('id',studentId).single());
    if(!student) return;

    const schoolId=student.school_id;

    if(!termId){
      try{
        const {data:t}=await db.from('terms').select('*,academic_years(label)').eq('school_id',schoolId).eq('is_current',true).maybeSingle();
        if(t){_term=t;termId=t.id;}
        else{
          const {data:t2}=await db.from('terms').select('*,academic_years(label)').eq('school_id',schoolId).order('start_date',{ascending:false}).limit(1).maybeSingle();
          _term=t2;termId=t2?.id;
        }
      }catch(e){console.error('Term resolution failed:',e);}
    }
    _tid=termId;
    if(!_tid){showErr('No active term found for this school.');return;}

    setMsg('Loading school data…');
    const [schoolData,scaleData,examsData,termRow]=await Promise.all([
      sq('School data', db.from('schools').select('name,logo_url,address,state,lga,phone,email,motto,affiliation_no,vp_signature_url,exam_officer_signature_url,principal_signature_url,class_teacher_signature_url').eq('id',schoolId).single()),
      sq('Grading scale', db.from('grading_scales').select('*').eq('school_id',schoolId).order('min_score',{ascending:false})),
      sq('Exams list', db.from('exams').select('*').eq('school_id',schoolId).eq('term_id',_tid).order('name')),
      !_term?sq('Term info', db.from('terms').select('*,academic_years(label)').eq('id',_tid).single()):Promise.resolve(_term),
    ]);
    _school=schoolData;_scale=scaleData;_exams=examsData;
    if(!_term)_term=termRow;

    const {data:enr}=await db.from('enrollments').select('class_id,classes(id,name,level,section)').eq('student_id',studentId).eq('term_id',_tid).maybeSingle();
    _classRow=enr?.classes||null;

    steps.length=0;
    const html=await buildCard(student,_tid);
    if(html===null){
      showNoReportCard(student);
    } else {
      document.getElementById('mainContent').innerHTML=html;
    }
  }catch(e){
    if(document.querySelector('.rc-loader')){
      showErr('Unexpected error loading report card', e.message||String(e));
    }
    console.error('Report card error:',e);
  }
})();
</script>
