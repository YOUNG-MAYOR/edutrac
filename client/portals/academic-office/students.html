<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTrack NG — Students (Exam Officer)</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../../js/config.js"></script>
<script src="../../api/database.js"></script>
<script src="../../api/auth.js"></script>
<script src="../../api/calculations.js"></script>
<script src="../../assets/js/sidebar.js"></script>
<script>
let currentUser, currentTerm, classes = [], allStudents = [];

(async () => {
  currentUser = await initPage(['exam_officer', 'vp_academic', 'admin'], 'Students', 'students');
  if (!currentUser) return;

  const [{ data: term }, { data: cls }] = await Promise.all([
    db.from('terms').select('*').eq('school_id', currentUser.school_id).eq('is_current', true).maybeSingle(),
    db.from('classes').select('id,name').eq('school_id', currentUser.school_id).order('name'),
  ]);
  currentTerm = term; classes = cls || [];

  document.getElementById('pageBody').innerHTML = `
    <div class="page-header"><h1>Students</h1><p>${term?.name || '—'}</p></div>
    <div class="filter-bar">
      <select class="form-control" id="classFilter" onchange="loadStudents()" style="max-width:220px;">
        <option value="">All Classes</option>
        ${classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
      </select>
      <div class="search-box" style="flex:1;max-width:280px;">
        <input type="text" class="form-control" id="search" placeholder="Search…" oninput="filterStudents()">
      </div>
    </div>
    <div class="card" style="padding:0;">
      <div class="table-wrap" id="table" style="border:none;"></div>
    </div>
  `;
  await loadStudents();
})();

async function loadStudents() {
  showLoader('#table');
  const classId = document.getElementById('classFilter').value;
  if (!currentTerm) { showEmpty('#table', 'No active term set.'); return; }

  let q = db.from('enrollments')
    .select('class_id, classes(name), students(id,full_name,admission_no,gender,date_of_birth)')
    .eq('term_id', currentTerm.id).eq('school_id', currentUser.school_id);
  if (classId) q = q.eq('class_id', classId);

  const { data, error } = await q;
  if (error) { showError('#table', error.message); return; }
  allStudents = (data || []).map(e => ({ ...e.students, className: e.classes?.name })).filter(Boolean);
  filterStudents();
}

function filterStudents() {
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  const f = allStudents.filter(s => s.full_name.toLowerCase().includes(q) || s.admission_no?.toLowerCase().includes(q));
  if (!f.length) { showEmpty('#table', 'No students found.', '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></span>'); return; }
  document.getElementById('table').innerHTML = `
    <table>
      <thead><tr><th>#</th><th>Student</th><th>Adm. No.</th><th>Class</th><th>Gender</th><th>Actions</th></tr></thead>
      <tbody>
        ${f.map((s,i) => `
          <tr>
            <td style="color:var(--ink-3);">${i+1}</td>
            <td><div class="student-cell">
              <div class="avatar avatar--sm">${s.full_name.charAt(0)}</div>
              <div class="info"><div class="name">${s.full_name}</div><div class="sub">${formatDate(s.date_of_birth)}</div></div>
            </div></td>
            <td style="font-family:var(--mono);font-size:13px;">${s.admission_no||'—'}</td>
            <td><span class="chip">${s.className||'—'}</span></td>
            <td>${s.gender==='M'?'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="14" r="6"/><line x1="19" y1="5" x2="14" y2="10"/><polyline points="15 5 19 5 19 9"/></svg></span> Male':s.gender==='F'?'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="6"/><line x1="12" y1="15" x2="12" y2="23"/><line x1="8" y1="20" x2="16" y2="20"/></svg></span> Female':'—'}</td>
            <td>
              <a href="results.html?student=${s.id}" class="btn btn--secondary btn--sm"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></span> Results</a>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}
</script>
<script src="../../js/pwa.js"></script>

<script src="../../js/ai-assistant.js" defer></script>
</body>
</html>
