<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTrack NG — Fee Tracker</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../../js/config.js"></script>
<script src="../../api/database.js"></script>
<script src="../../api/auth.js"></script>
<script src="../../api/calculations.js"></script>
<script src="../../assets/js/sidebar.js"></script>
<script>
let user, term, students = [], feeTypes = [], allPayments = [], discountRules = null;

(async () => {
  user = await initPage(['admin','accountant','bursary'], 'Fee Tracker', 'fee-tracker');
  if (!user) return;

  document.getElementById('topbarActions').innerHTML = `
    <a href="receipt-generator.html" class="btn btn--primary"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></span> Record Payment</a>
  `;

  const ctx = await loadSchoolContext(user.school_id);
  term = ctx.term;

  const [{ data: studs }, { data: fees }, { data: pays }, { data: dr }] = await Promise.all([
    db.from('students').select('id,full_name,admission_no,family_id,enrollments(class_id,classes(name))')
      .eq('school_id', user.school_id).eq('is_active', true).order('full_name'),
    db.from('fee_types').select('*').eq('school_id', user.school_id),
    db.from('payments').select('*').eq('school_id', user.school_id).eq('term_id', term?.id || ''),
    db.from('discount_rules').select('*').eq('school_id', user.school_id).maybeSingle()
  ]);
  students = studs || [];
  feeTypes = fees || [];
  allPayments = pays || [];
  discountRules = dr;

  // Build family size map for sibling discounts
  const familyCounts = {};
  students.forEach(s => {
    if (s.family_id) familyCounts[s.family_id] = (familyCounts[s.family_id] || 0) + 1;
  });

  renderPage(familyCounts);
})();

function renderPage(familyCounts) {
  // Build per-student invoices
  const invoices = students.map(s => {
    const sibCount = s.family_id ? (familyCounts[s.family_id] || 1) : 1;
    const pays = allPayments.filter(p => p.student_id === s.id);
    const discountConfig = discountRules ? {
      tiers: [
        { minSiblings: 2, discountPct: discountRules.sibling_2_pct },
        { minSiblings: 3, discountPct: discountRules.sibling_3_pct },
        { minSiblings: 4, discountPct: discountRules.sibling_4plus_pct },
      ]
    } : null;
    const invoice = generateInvoice({ student: s, feeTypes, payments: pays, familyStudents: sibCount > 1 ? Array(sibCount) : [], discountConfig });
    return { student: s, invoice, sibCount };
  });

  const totalExpected = invoices.reduce((s, i) => s + i.invoice.totalNet, 0);
  const totalPaid     = invoices.reduce((s, i) => s + i.invoice.totalPaid, 0);
  const totalBalance  = invoices.reduce((s, i) => s + i.invoice.totalBalance, 0);
  const totalDiscount = invoices.reduce((s, i) => s + i.invoice.totalDiscount, 0);
  const debtors       = invoices.filter(i => i.invoice.totalBalance > 0).length;

  document.getElementById('pageBody').innerHTML = `
    <div class="page-header">
      <h1><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span> Fee Tracker</h1>
      <p>${term?.name || 'No current term'} · ${students.length} students</p>
    </div>

    <!-- Summary Stats -->
    <div class="stat-grid" style="margin-bottom:20px;">
      <div class="stat-card">
        <div class="stat-card__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span></div>
        <div class="stat-card__value" style="color:var(--primary);font-size:18px;">${formatMoney(totalExpected)}</div>
        <div class="stat-card__label">Total Expected</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span></div>
        <div class="stat-card__value" style="color:var(--success);font-size:18px;">${formatMoney(totalPaid)}</div>
        <div class="stat-card__label">Total Collected</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>️</div>
        <div class="stat-card__value" style="color:var(--danger);font-size:18px;">${formatMoney(totalBalance)}</div>
        <div class="stat-card__label">Outstanding Debt</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span></div>
        <div class="stat-card__value" style="color:var(--info);font-size:18px;">${formatMoney(totalDiscount)}</div>
        <div class="stat-card__label">Sibling Discounts</div>
        <div class="stat-card__delta">${invoices.filter(i => i.sibCount > 1).length} families</div>
      </div>
    </div>

    <!-- Collection rate bar -->
    <div class="card" style="margin-bottom:20px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:14px;font-weight:600;">Collection Rate</span>
        <strong>${totalExpected > 0 ? Math.round(totalPaid/totalExpected*100) : 0}%</strong>
      </div>
      <div class="progress-bar">
        <div class="progress-bar__fill ${totalExpected > 0 && totalPaid/totalExpected < 0.5 ? 'danger' : totalPaid/totalExpected < 0.7 ? 'warn' : ''}"
          style="width:${totalExpected > 0 ? Math.min(100,Math.round(totalPaid/totalExpected*100)) : 0}%"></div>
      </div>
      <div style="font-size:12px;color:var(--ink-3);margin-top:6px;">${debtors} students have outstanding balances</div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <div class="search-box" style="flex:1;max-width:260px;">
        <input class="form-control" id="srch" placeholder="Search student…" oninput="filterTable()">
      </div>
      <select class="form-control" id="fStatus" onchange="filterTable()" style="max-width:140px;">
        <option value="">All</option>
        <option value="debtors">Debtors Only</option>
        <option value="paid">Fully Paid</option>
        <option value="sibling">Sibling Discount</option>
      </select>
    </div>

    <div class="card" style="padding:0;">
      <div class="table-wrap" id="feeTable" style="border:none;"></div>
    </div>
  `;

  window._invoices = invoices;
  filterTable();
}

function filterTable() {
  const q = document.getElementById('srch')?.value.toLowerCase() || '';
  const status = document.getElementById('fStatus')?.value || '';
  const invoices = window._invoices || [];

  let filtered = invoices.filter(i => {
    const name = i.student.full_name.toLowerCase();
    const adm = (i.student.admission_no || '').toLowerCase();
    if (q && !name.includes(q) && !adm.includes(q)) return false;
    if (status === 'debtors' && i.invoice.totalBalance <= 0) return false;
    if (status === 'paid' && i.invoice.totalBalance > 0) return false;
    if (status === 'sibling' && i.sibCount <= 1) return false;
    return true;
  });

  const el = document.getElementById('feeTable');
  if (!filtered.length) { showEmpty(el, 'No students match filters.', '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span>'); return; }

  el.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Student</th>
          <th>Class</th>
          <th>Gross</th>
          <th>Discount</th>
          <th>Net Due</th>
          <th>Paid</th>
          <th>Balance</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(({ student, invoice, sibCount }) => {
          const cls = student.enrollments?.[0]?.classes?.name || '—';
          const pct = invoice.totalNet > 0 ? Math.round(invoice.totalPaid / invoice.totalNet * 100) : 100;
          const statusBadge = invoice.totalBalance <= 0
            ? `<span class="badge badge--green"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span> Paid</span>`
            : pct >= 50
              ? `<span class="badge badge--yellow">⏳ Partial</span>`
              : `<span class="badge badge--red"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span> Owing</span>`;
          return `
            <tr>
              <td>
                <div class="student-cell">
                  <div class="avatar avatar--sm">${student.full_name.charAt(0)}</div>
                  <div class="info">
                    <div class="name">${student.full_name}</div>
                    <div class="sub">${student.admission_no || ''}${sibCount > 1 ? ` · <span style="color:var(--info);font-weight:700;"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> ${sibCount} siblings</span>` : ''}</div>
                  </div>
                </div>
              </td>
              <td><span class="chip">${cls}</span></td>
              <td style="color:var(--ink-3);">${formatMoney(invoice.totalGross)}</td>
              <td style="color:${invoice.totalDiscount > 0 ? 'var(--info)' : 'var(--ink-4)'};">
                ${invoice.totalDiscount > 0 ? `−${formatMoney(invoice.totalDiscount)}` : '—'}
              </td>
              <td><strong>${formatMoney(invoice.totalNet)}</strong></td>
              <td style="color:var(--success);">${formatMoney(invoice.totalPaid)}</td>
              <td style="color:${invoice.totalBalance > 0 ? 'var(--danger)' : 'var(--ink-3)'};font-weight:700;">
                ${invoice.totalBalance > 0 ? formatMoney(invoice.totalBalance) : '—'}
              </td>
              <td>${statusBadge}</td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}
</script>

<script src="../../js/ai-assistant.js" defer></script>
</body>
</html>
