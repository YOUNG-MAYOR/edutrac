<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTrack NG — Bursary Portal</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
<div id="app"><div class="et-loader"><div class="et-spinner"></div><p>Loading…</p></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../../js/config.js"></script>
<script src="../../api/database.js"></script>
<script src="../../api/auth.js"></script>
<script src="../../assets/js/sidebar.js"></script>
<script>
(async () => {
  const user = await initPage(['bursary','accountant','admin'], 'Bursary Dashboard', 'fee-tracker');
  if (!user) return;

  const [{ data: term }, { data: school }, { data: payments }, { data: feeTypes }, { data: students }] = await Promise.all([
    db.from('terms').select('*').eq('school_id', user.school_id).eq('is_current', true).maybeSingle(),
    db.from('schools').select('name,logo_url').eq('id', user.school_id).single(),
    db.from('payments').select('amount_paid,paid_at,fee_type_id').eq('school_id', user.school_id),
    db.from('fee_types').select('id,name,amount').eq('school_id', user.school_id),
    db.from('students').select('id').eq('school_id', user.school_id).eq('is_active', true),
  ]);

  const totalCollected = (payments || []).reduce((s, p) => s + Number(p.amount_paid), 0);
  const totalExpected  = (feeTypes  || []).reduce((s, f) => s + Number(f.amount), 0) * (students || []).length;
  const pct = totalExpected > 0 ? Math.min(100, Math.round(totalCollected / totalExpected * 100)) : 0;

  document.getElementById('pageBody').innerHTML = `
    <div class="page-header">
      <h1 class="page-title"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span> Bursary Dashboard</h1>
      <p class="page-subtitle">${term?.name || 'No active term'}</p>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px;">
      <div class="card" style="border-left:4px solid var(--success);">
        <div style="font-size:12px;color:var(--ink-3);font-weight:700;text-transform:uppercase;margin-bottom:6px;">Total Collected</div>
        <div style="font-size:26px;font-weight:800;color:var(--success);">${formatMoney(totalCollected)}</div>
      </div>
      <div class="card" style="border-left:4px solid var(--info);">
        <div style="font-size:12px;color:var(--ink-3);font-weight:700;text-transform:uppercase;margin-bottom:6px;">Total Expected</div>
        <div style="font-size:26px;font-weight:800;color:var(--info);">${formatMoney(totalExpected)}</div>
      </div>
      <div class="card" style="border-left:4px solid var(--warning);">
        <div style="font-size:12px;color:var(--ink-3);font-weight:700;text-transform:uppercase;margin-bottom:6px;">Outstanding</div>
        <div style="font-size:26px;font-weight:800;color:var(--warning);">${formatMoney(Math.max(0, totalExpected - totalCollected))}</div>
      </div>
      <div class="card" style="border-left:4px solid var(--primary);">
        <div style="font-size:12px;color:var(--ink-3);font-weight:700;text-transform:uppercase;margin-bottom:6px;">Collection Rate</div>
        <div style="font-size:26px;font-weight:800;color:var(--primary);">${pct}%</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:24px;">
      <div class="card__title" style="margin-bottom:12px;">Payment Progress</div>
      <div style="height:14px;background:var(--surface-3);border-radius:100px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:${pct>=80?'var(--success)':pct>=50?'var(--warning)':'var(--danger)'};border-radius:100px;transition:width .5s;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--ink-3);margin-top:6px;">
        <span>${formatMoney(totalCollected)} collected</span>
        <span>${pct}%</span>
        <span>${formatMoney(Math.max(0,totalExpected-totalCollected))} outstanding</span>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="card">
        <div class="card__header"><div class="card__title">Quick Links</div></div>
        <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px;">
          <a href="fee-tracker.html" class="btn btn--primary"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg></span> Fee Tracker</a>
          <a href="../../admin/fees.html" class="btn btn--secondary"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>️ Manage Fee Types</a>
          <a href="../../admin/payments.html" class="btn btn--secondary"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></span> Payment Records</a>
        </div>
      </div>
      <div class="card">
        <div class="card__header"><div class="card__title">Fee Types (${(feeTypes||[]).length})</div></div>
        ${(feeTypes||[]).length === 0
          ? '<div class="et-empty" style="padding:20px 0;"><p>No fee types set up yet.</p></div>'
          : `<div style="display:flex;flex-direction:column;gap:8px;margin-top:8px;">
              ${(feeTypes||[]).map(f => `
                <div style="display:flex;justify-content:space-between;padding:8px 12px;background:var(--surface-2);border-radius:var(--radius-sm);">
                  <span style="font-size:14px;font-weight:600;">${f.name}</span>
                  <span style="font-weight:700;color:var(--primary);">${formatMoney(f.amount)}</span>
                </div>`).join('')}
            </div>`}
      </div>
    </div>
  `;
})();
</script>

<script src="../../js/ai-assistant.js" defer></script>
</body>
</html>
