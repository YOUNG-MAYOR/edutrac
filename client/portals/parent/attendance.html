<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a6e3f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EduTrack NG">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>EduTrack NG — Attendance</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../../js/config.js"></script>
<script src="../../api/database.js"></script>
<script src="../../api/auth.js"></script>
<script src="../../api/calculations.js"></script>
<script src="../../assets/js/sidebar.js"></script>
<script>
let currentUser, children = [], currentTerm;

(async () => {
  currentUser = await initPage(['parent'], 'Attendance', 'attendance');
  if (!currentUser) return;

  const [{ data: links }, { data: term }] = await Promise.all([
    db.from('parent_students').select('students(id,full_name,enrollments(classes(name)))').eq('parent_id', currentUser.id),
    db.from('terms').select('*').eq('school_id', currentUser.school_id).eq('is_current',true).maybeSingle()
  ]);
  children = (links || []).map(l => l.students).filter(Boolean);
  currentTerm = term;
  const preselect = new URLSearchParams(location.search).get('student') || '';

  document.getElementById('pageBody').innerHTML = `
    <div class="page-header"><h1>Attendance</h1><p>${term?.name || 'Current Term'}</p></div>
    <div class="filter-bar">
      <select class="form-control" id="childSel" onchange="load()" style="max-width:260px;">
        <option value="">Select child…</option>
        ${children.map(c => `<option value="${c.id}" ${c.id===preselect?'selected':''}>${c.full_name}</option>`).join('')}
      </select>
    </div>
    <div id="attContent">
      <div class="et-empty"><div class="et-empty__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg></span></div><p>Select your child to view attendance.</p></div>
    </div>
  `;
  if (preselect) load();
})();

async function load() {
  const studentId = document.getElementById('childSel').value;
  if (!studentId || !currentTerm) return;
  showLoader('#attContent');

  const child = children.find(c => c.id === studentId);
  const { data: recs } = await db.from('attendance')
    .select('status, date').eq('student_id', studentId).eq('term_id', currentTerm.id)
    .order('date', {ascending: false});

  const allDays = new Set((recs || []).map(a => a.date)).size;
  const present = (recs || []).filter(a => a.status === 'P').length;
  const late    = (recs || []).filter(a => a.status === 'L').length;
  const absent  = (recs || []).filter(a => a.status === 'A').length;
  const excused = (recs || []).filter(a => a.status === 'E').length;
  const attPct  = allDays > 0 ? Math.round((present + late) / allDays * 100) : null;
  const barCol  = !attPct ? '' : attPct >= 75 ? '' : attPct >= 50 ? 'warn' : 'danger';

  document.getElementById('attContent').innerHTML = `
    <div class="card" style="margin-bottom:20px;">
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
        <div class="avatar avatar--lg">${child?.full_name?.charAt(0)}</div>
        <div style="flex:1;">
          <div style="font-size:18px;font-weight:700;">${child?.full_name}</div>
          <div style="font-size:13px;color:var(--ink-3);">${child?.enrollments?.[0]?.classes?.name || '—'} · ${currentTerm?.name}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:20px;">
        <div style="text-align:center;padding:12px;background:var(--success-light);border-radius:var(--radius-sm);">
          <div style="font-size:24px;font-weight:800;color:var(--success);">${present}</div>
          <div style="font-size:12px;color:var(--success);">Present</div>
        </div>
        <div style="text-align:center;padding:12px;background:var(--danger-light);border-radius:var(--radius-sm);">
          <div style="font-size:24px;font-weight:800;color:var(--danger);">${absent}</div>
          <div style="font-size:12px;color:var(--danger);">Absent</div>
        </div>
        <div style="text-align:center;padding:12px;background:var(--accent-light);border-radius:var(--radius-sm);">
          <div style="font-size:24px;font-weight:800;color:var(--warning);">${late}</div>
          <div style="font-size:12px;color:var(--warning);">Late</div>
        </div>
        <div style="text-align:center;padding:12px;background:var(--info-light);border-radius:var(--radius-sm);">
          <div style="font-size:24px;font-weight:800;color:var(--info);">${excused}</div>
          <div style="font-size:12px;color:var(--info);">Excused</div>
        </div>
      </div>
      <div style="margin-top:16px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
          <span style="font-size:13px;font-weight:600;">Attendance Rate</span>
          <span style="font-size:13px;font-weight:700;color:${attPct && attPct<75?'var(--danger)':'var(--success)'};">
            ${attPct !== null ? attPct + '%' : '—'}
          </span>
        </div>
        <div class="progress-bar"><div class="progress-bar__fill ${barCol}" style="width:${attPct||0}%;"></div></div>
        ${attPct !== null && attPct < 75 ? '<div style="color:var(--danger);font-size:12px;margin-top:6px;"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>️ Attendance below 75% — at risk</div>' : ''}
      </div>
    </div>

    <div class="card" style="padding:0;">
      <div style="padding:14px 20px;border-bottom:1px solid var(--border);font-weight:700;">Attendance Log</div>
      <div class="table-wrap" style="border:none;max-height:400px;overflow-y:auto;">
        <table>
          <thead><tr><th>Date</th><th>Status</th></tr></thead>
          <tbody>
            ${(recs || []).map(r => {
              const labels = {P:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span> Present',A:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span> Absent',L:'⏰ Late',E:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="12" cy="12" r="10"/></svg></span> Excused'};
              const badges = {P:'badge--green',A:'badge--red',L:'badge--yellow',E:'badge--blue'};
              return `<tr>
                <td style="font-size:14px;">${formatDate(r.date)}</td>
                <td><span class="badge ${badges[r.status]||'badge--gray'}">${labels[r.status]||r.status}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}
</script>
<script src="../../js/pwa.js"></script>

<script src="../../js/ai-assistant.js" defer></script>
</body>
</html>
