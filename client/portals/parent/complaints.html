<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a6e3f">
  <title>EduTrack NG — Send Message</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .form-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px;}
    .form-group{margin-bottom:16px;}
    .form-group label{font-size:12px;font-weight:700;color:var(--ink-2);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
    .msg-history{display:flex;flex-direction:column;gap:10px;}
    .msg-item{border:1px solid var(--border);border-radius:var(--radius);padding:14px;background:var(--surface);}
    .msg-item__header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
    .msg-item__to{font-size:12px;font-weight:700;color:var(--primary);}
    .msg-item__time{font-size:11px;color:var(--ink-4);}
    .msg-item__subject{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px;}
    .msg-item__body{font-size:13px;color:var(--ink-3);line-height:1.45;}
    .sent-badge{padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;background:#dcfce7;color:#15803d;}
  </style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../../js/config.js"></script>
<script src="../../api/database.js"></script>
<script src="../../api/auth.js"></script>
<script src="../../api/calculations.js"></script>
<script src="../../assets/js/sidebar.js"></script>
<script>
let user, staffList = [], sentMessages = [];

(async () => {
  user = await initPage(['parent'], 'Send Message', 'complaints');
  if (!user) return;

  // Load staff who can receive messages
  const { data: staff } = await db.from('users')
    .select('id,full_name,role')
    .eq('school_id', user.school_id)
    .eq('is_active', true)
    .in('role', ['admin','teacher','exam_officer','vp_academic','vp_admin'])
    .order('full_name');
  staffList = staff || [];

  // Load previously sent messages
  const { data: sent } = await db.from('notifications')
    .select('id,title,body,created_at,user_id,type')
    .eq('school_id', user.school_id)
    .eq('sender_role', 'parent')
    .eq('sender_name', user.full_name)
    .order('created_at', { ascending: false })
    .limit(20);
  sentMessages = sent || [];

  renderPage();
})();

function renderPage() {
  const body = document.getElementById('pageBody');
  if (!body) return;

  body.innerHTML =
    '<div class="page-header">' +
      '<h1><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22 6 12 13 2 6"/></svg></span>️ Send a Message</h1>' +
      '<p>Contact a teacher or the school administration directly.</p>' +
    '</div>' +

    '<div class="form-card">' +
      '<div class="form-group">' +
        '<label>Send To</label>' +
        '<select class="form-control" id="cmpRecipient">' +
          '<option value="broadcast"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></span> School Administration (All Admins)</option>' +
          staffList.map(s =>
            '<option value="' + s.id + '">' + escHtml(s.full_name) + ' — ' + s.role.replace(/_/g,' ') + '</option>'
          ).join('') +
        '</select>' +
      '</div>' +
      '<div class="form-group">' +
        '<label>Subject *</label>' +
        '<input type="text" class="form-control" id="cmpSubject" placeholder="Brief subject line…" maxlength="120">' +
      '</div>' +
      '<div class="form-group">' +
        '<label>Your Message *</label>' +
        '<textarea class="form-control" id="cmpBody" rows="5" placeholder="Describe your concern, question, or request…" maxlength="800"></textarea>' +
      '</div>' +
      '<button class="btn btn--primary" onclick="sendMessage()" style="width:100%;"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></span> Send Message</button>' +
    '</div>' +

    (sentMessages.length > 0 ?
      '<div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--ink-2);"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></span> Previously Sent (' + sentMessages.length + ')</div>' +
      '<div class="msg-history">' +
        sentMessages.map(m =>
          '<div class="msg-item">' +
            '<div class="msg-item__header">' +
              '<span class="msg-item__to">' + (m.user_id ? 'Specific Staff' : 'School Admin') + '</span>' +
              '<span class="sent-badge">Sent</span>' +
            '</div>' +
            '<div class="msg-item__subject">' + escHtml(m.title) + '</div>' +
            '<div class="msg-item__body">' + escHtml(m.body.replace(/^\[From Parent:.*?\] /,'')) + '</div>' +
            '<div class="msg-item__time">' + timeAgo(m.created_at) + '</div>' +
          '</div>'
        ).join('') +
      '</div>'
    : '');
}

async function sendMessage() {
  const recipientId = document.getElementById('cmpRecipient')?.value;
  const subject     = document.getElementById('cmpSubject')?.value.trim();
  const body        = document.getElementById('cmpBody')?.value.trim();
  if (!subject) { toast('Please enter a subject.', 'error'); return; }
  if (!body)    { toast('Please enter a message.', 'error'); return; }

  const row = {
    school_id:   user.school_id,
    user_id:     recipientId === 'broadcast' ? null : recipientId,
    staff_id:    recipientId === 'broadcast' ? null : recipientId,
    title:       subject,
    body:        '[From Parent: ' + user.full_name + '] ' + body,
    type:        'complaint',
    sender_role: 'parent',
    sender_name: user.full_name,
    is_read:     false
  };

  const { error } = await db.from('notifications').insert(row);
  if (error) { toast('Failed to send: ' + error.message, 'error'); return; }

  toast('<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span> Message sent successfully!', 'success');
  sentMessages.unshift({ ...row, created_at: new Date().toISOString(), id: 'new' });
  document.getElementById('cmpSubject').value = '';
  document.getElementById('cmpBody').value = '';
  renderPage();
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function timeAgo(d) {
  const diff = Date.now() - new Date(d).getTime(), m = Math.floor(diff/60000);
  if (m < 1) return 'Just now'; if (m < 60) return m+'m ago';
  const h = Math.floor(m/60); if (h < 24) return h+'h ago';
  return Math.floor(h/24)+'d ago';
}
</script>
<script src="../../js/pwa.js"></script>

<script src="../../js/ai-assistant.js" defer></script>
</body>
</html>
