<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a6e3f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EduTrack NG">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>EduTrack NG — Parent Dashboard</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../../js/config.js"></script>
<script src="../../api/database.js"></script>
<script src="../../api/auth.js"></script>
<script src="../../api/calculations.js"></script>
<script src="../../assets/js/sidebar.js"></script>
<script>
(async () => {
  const user = await initPage(['parent'], 'Home', 'dashboard');
  if (!user) return;
  const body = document.getElementById('pageBody');

  const [{ data: links }, { data: term }] = await Promise.all([
    db.from('parent_students')
      .select('relationship, students(id,full_name,admission_no,enrollments(classes(name)))')
      .eq('parent_id', user.id),
    db.from('terms').select('*').eq('school_id', user.school_id).eq('is_current',true).maybeSingle()
  ]);

  const children = (links || []).map(l => ({ ...l.students, relationship: l.relationship })).filter(Boolean);

  body.innerHTML = `
    <div class="page-header">
      <h1>Welcome, ${user.full_name.split(' ')[0]}! <span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span></h1>
      <p>${term ? term.name + ' Term' : ''} · ${user.schools?.name || ''}</p>
    </div>

    ${children.length === 0 ? `
      <div class="card">
        <div class="et-empty">
          <div class="et-empty__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span></div>
          <p>No children linked to your account yet.<br>Please contact the school admin.</p>
        </div>
      </div>
    ` : `
      <div style="margin-bottom:20px;">
        <div class="card__header" style="margin-bottom:12px;"><span style="font-size:15px;font-weight:700;">My Children (${children.length})</span></div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;">
          ${children.map(c => {
            const className = c.enrollments?.[0]?.classes?.name || 'Not enrolled';
            return `
              <div class="card" style="padding:20px;">
                <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;">
                  <div class="avatar avatar--lg">${c.full_name.charAt(0)}</div>
                  <div>
                    <div style="font-size:17px;font-weight:700;">${c.full_name}</div>
                    <div style="font-size:13px;color:var(--ink-3);">${c.relationship}</div>
                    <span class="chip" style="margin-top:4px;">${className}</span>
                  </div>
                </div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                  <a href="results.html?student=${c.id}" class="btn btn--primary btn--sm"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></span> Results</a>
                  <a href="attendance.html?student=${c.id}" class="btn btn--secondary btn--sm"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg></span> Attendance</a>
                  <a href="fees.html?student=${c.id}" class="btn btn--secondary btn--sm"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span> Fees</a>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `}
  `;
})();
</script>
<script src="../../js/pwa.js"></script>

<script src="../../js/ai-assistant.js" defer></script>
</body>
</html>
