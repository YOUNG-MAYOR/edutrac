<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTrack NG — Notifications</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .notif-filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
    .notif-filter-btn{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--ink-3);transition:var(--transition);}
    .notif-filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
    .notif-item{display:flex;gap:14px;padding:16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;align-items:flex-start;}
    .notif-item:hover{background:var(--surface-2);}
    .notif-item.unread{background:var(--primary-light);}
    .notif-item.unread .notif-title{font-weight:800;}
    .notif-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .notif-content{flex:1;min-width:0;}
    .notif-title{font-size:14px;font-weight:600;margin-bottom:3px;color:var(--ink);}
    .notif-body{font-size:13px;color:var(--ink-3);line-height:1.45;}
    .notif-meta{font-size:11px;color:var(--ink-4);margin-top:5px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
    .notif-badge{padding:2px 8px;border-radius:100px;font-size:10px;font-weight:700;}
    .badge-info{background:#dbeafe;color:#1d4ed8;}
    .badge-urgent{background:#fee2e2;color:#dc2626;}
    .badge-score_submitted{background:#dcfce7;color:#15803d;}
    .badge-attendance{background:#f3e8ff;color:#7c3aed;}
    .badge-complaint{background:#fff7ed;color:#c2410c;}
    .badge-fee{background:#fef9c3;color:#a16207;}
    .notif-unread-dot{width:10px;height:10px;background:var(--primary);border-radius:50%;flex-shrink:0;margin-top:4px;}
    .empty-state{text-align:center;padding:60px 20px;color:var(--ink-3);}
    .empty-state__icon{font-size:48px;margin-bottom:12px;}
    .mark-all-btn{font-size:12px;color:var(--primary);cursor:pointer;background:none;border:none;font-weight:600;padding:0;}
    .mark-all-btn:hover{text-decoration:underline;}

    /* Complaint modal */
    .complaint-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s;}
    .complaint-modal.open{opacity:1;pointer-events:all;}
    .complaint-box{background:var(--surface);border-radius:var(--radius);width:100%;max-width:500px;padding:24px;}
    .complaint-box h3{font-size:17px;font-weight:800;margin-bottom:4px;}
    .complaint-box p{font-size:13px;color:var(--ink-3);margin-bottom:16px;}
    .form-group{margin-bottom:14px;}
    .form-group label{font-size:12px;font-weight:700;color:var(--ink-2);display:block;margin-bottom:5px;}
    .form-group select,.form-group textarea,.form-group input{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:14px;background:var(--surface);color:var(--ink);outline:none;font-family:inherit;}
    .form-group select:focus,.form-group textarea:focus{border-color:var(--primary);}
    .form-group textarea{resize:vertical;min-height:90px;}
  </style>
</head>
<body>
<div id="app"></div>

<div class="complaint-modal" id="complaintModal">
  <div class="complaint-box">
    <h3><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22 6 12 13 2 6"/></svg></span>️ Send Message / Complaint</h3>
    <p>Send a message directly to admin or a staff member's dashboard.</p>
    <div class="form-group">
      <label>Send To</label>
      <select id="cmpRecipient">
        <option value="">Loading staff…</option>
      </select>
    </div>
    <div class="form-group">
      <label>Subject</label>
      <input type="text" id="cmpSubject" placeholder="Brief subject line…">
    </div>
    <div class="form-group">
      <label>Message</label>
      <textarea id="cmpBody" placeholder="Type your message or complaint here…"></textarea>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px;">
      <button class="btn btn--ghost" onclick="closeComplaintModal()">Cancel</button>
      <button class="btn btn--primary" onclick="sendComplaint()"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></span> Send Message</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../../js/config.js"></script>
<script src="../../api/database.js"></script>
<script src="../../api/auth.js"></script>
<script src="../../api/calculations.js"></script>
<script src="../../assets/js/sidebar.js"></script>
<script>
let user, allNotifs = [], currentFilter = 'all';

const TYPE_ICONS = {
  info:'ℹ️', warning:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>️', success:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>', urgent:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>',
  result:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></span>', fee:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span>', attendance:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg></span>',
  score_submitted:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg></span>', complaint:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22 6 12 13 2 6"/></svg></span>️'
};

(async () => {
  user = await initPage(['teacher','admin','exam_officer','vp_academic','registrar','vp_admin','accountant'], 'Notifications', 'notifications');
  if (!user) return;

  document.getElementById('topbarActions').innerHTML =
    `<button class="btn btn--primary btn--sm" onclick="openComplaintModal()"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22 6 12 13 2 6"/></svg></span>️ Send Message</button>`;

  await loadNotifications();
  await loadStaffForComplaint();
})();

async function loadNotifications() {
  const body = document.getElementById('pageBody');
  body.innerHTML = `<div class="et-loader"><div class="et-spinner"></div></div>`;

  const { data, error } = await db.from('notifications')
    .select('*')
    .eq('school_id', user.school_id)
    .or(`user_id.eq.${user.id},staff_id.eq.${user.id},user_id.is.null`)
    .order('created_at', { ascending: false })
    .limit(100);

  if (error) { body.innerHTML = `<div class="card"><p style="color:var(--danger)">Error: ${error.message}</p></div>`; return; }

  allNotifs = data || [];
  renderPage();
}

function renderPage() {
  const body = document.getElementById('pageBody');
  const unread = allNotifs.filter(n => !n.is_read).length;

  const filtered = currentFilter === 'all'
    ? allNotifs
    : currentFilter === 'unread'
      ? allNotifs.filter(n => !n.is_read)
      : allNotifs.filter(n => n.type === currentFilter);

  const filters = [
    {key:'all', label:`All (${allNotifs.length})`},
    {key:'unread', label:`Unread (${unread})`},
    {key:'score_submitted', label:'Scores'},
    {key:'complaint', label:'Messages'},
    {key:'urgent', label:'Urgent'},
    {key:'attendance', label:'Attendance'},
  ];

  body.innerHTML = `
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
      <div>
        <h1><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span> Notifications</h1>
        <p>${unread > 0 ? `<strong>${unread}</strong> unread notification${unread!==1?'s':''}` : 'All caught up!'}</p>
      </div>
      ${unread > 0 ? `<button class="mark-all-btn" onclick="markAllRead()"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span> Mark all as read</button>` : ''}
    </div>

    <div class="notif-filter-bar">
      ${filters.map(f => `
        <button class="notif-filter-btn ${currentFilter===f.key?'active':''}" onclick="setFilter('${f.key}')">${f.label}</button>
      `).join('')}
    </div>

    <div class="card" style="padding:0;overflow:hidden;">
      ${filtered.length === 0
        ? `<div class="empty-state"><div class="empty-state__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/><line x1="1" y1="1" x2="23" y2="23"/></svg></span></div><p>No notifications here yet.</p></div>`
        : filtered.map(n => renderNotifItem(n)).join('')
      }
    </div>
  `;
}

function renderNotifItem(n) {
  const icon = TYPE_ICONS[n.type] || 'ℹ️';
  const ago = timeAgo(n.created_at);
  const badgeClass = `badge-${n.type||'info'}`;
  return `
    <div class="notif-item ${!n.is_read?'unread':''}" onclick="markRead('${n.id}',this)">
      <div class="notif-icon" style="background:var(--surface-3)">${icon}</div>
      <div class="notif-content">
        <div class="notif-title">${escHtml(n.title)}</div>
        <div class="notif-body">${escHtml(n.body)}</div>
        <div class="notif-meta">
          <span class="notif-badge ${badgeClass}">${n.type||'info'}</span>
          ${n.sender_name ? `<span>From: <strong>${escHtml(n.sender_name)}</strong></span>` : ''}
          <span>${ago}</span>
        </div>
      </div>
      ${!n.is_read ? `<div class="notif-unread-dot"></div>` : ''}
    </div>
  `;
}

async function markRead(id, el) {
  if (!el.classList.contains('unread')) return;
  el.classList.remove('unread');
  el.querySelector('.notif-unread-dot')?.remove();
  const n = allNotifs.find(x => x.id === id);
  if (n) n.is_read = true;
  await db.from('notifications').update({ is_read: true }).eq('id', id);
  // refresh unread count in header
  renderPage();
}

async function markAllRead() {
  await db.from('notifications')
    .update({ is_read: true })
    .eq('school_id', user.school_id)
    .or(`user_id.eq.${user.id},staff_id.eq.${user.id},user_id.is.null`)
    .eq('is_read', false);
  allNotifs.forEach(n => n.is_read = true);
  renderPage();
}

function setFilter(key) {
  currentFilter = key;
  renderPage();
}

// ── Complaint / Message modal ────────────────────────────────────
let staffList = [];
async function loadStaffForComplaint() {
  const { data } = await db.from('users')
    .select('id,full_name,role')
    .eq('school_id', user.school_id)
    .eq('is_active', true)
    .in('role', ['admin','exam_officer','vp_academic','vp_admin','registrar','teacher'])
    .order('full_name');
  staffList = data || [];
}

function openComplaintModal() {
  const sel = document.getElementById('cmpRecipient');
  sel.innerHTML = `<option value="broadcast"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></span> All Admins (Broadcast)</option>` +
    staffList.filter(s => s.id !== user.id).map(s =>
      `<option value="${s.id}">${s.full_name} (${s.role.replace('_',' ')})</option>`
    ).join('');
  document.getElementById('cmpSubject').value = '';
  document.getElementById('cmpBody').value = '';
  document.getElementById('complaintModal').classList.add('open');
}

function closeComplaintModal() {
  document.getElementById('complaintModal').classList.remove('open');
}

async function sendComplaint() {
  const recipientId = document.getElementById('cmpRecipient').value;
  const subject     = document.getElementById('cmpSubject').value.trim();
  const body        = document.getElementById('cmpBody').value.trim();
  if (!subject || !body) { toast('Please fill in subject and message.', 'error'); return; }

  const row = {
    school_id:   user.school_id,
    user_id:     recipientId === 'broadcast' ? null : recipientId,
    staff_id:    recipientId === 'broadcast' ? null : recipientId,
    title:       subject,
    body:        body,
    type:        'complaint',
    sender_role: user.role,
    sender_name: user.full_name,
    is_read:     false
  };

  const { error } = await db.from('notifications').insert(row);
  if (error) { toast('Failed to send: ' + error.message, 'error'); return; }
  toast('<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span> Message sent successfully!', 'success');
  closeComplaintModal();
}

// ── Helpers ────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function timeAgo(d) {
  const diff = Date.now() - new Date(d).getTime(), m = Math.floor(diff/60000);
  if (m < 1) return 'Just now'; if (m < 60) return m+'m ago';
  const h = Math.floor(m/60); if (h < 24) return h+'h ago';
  const dy = Math.floor(h/24); if (dy < 7) return dy+'d ago';
  return new Date(d).toLocaleDateString('en-NG',{day:'numeric',month:'short'});
}
</script>
<script src="../../js/pwa.js"></script>

<script src="../../js/ai-assistant.js" defer></script>
</body>
</html>
