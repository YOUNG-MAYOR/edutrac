<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a6e3f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EduTrack NG">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>EduTrack NG — My Students</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../../js/config.js"></script>
<script src="../../api/database.js"></script>
<script src="../../api/auth.js"></script>
<script src="../../api/calculations.js"></script>
<script src="../../assets/js/sidebar.js"></script>
<script>
let currentUser, currentTerm, myClasses = [], students = [];

(async () => {
  currentUser = await initPage(['teacher', 'admin'], 'My Students', 'students');
  if (!currentUser) return;

  const { data: term } = await db.from('terms').select('*').eq('school_id', currentUser.school_id).eq('is_current', true).maybeSingle();
  currentTerm = term;

  // SOURCE 1: Form teacher classes (classes.teacher_id)
  const { data: formClasses } = await db.from('classes')
    .select('id, name')
    .eq('teacher_id', currentUser.id)
    .eq('school_id', currentUser.school_id);

  // SOURCE 2: Subject assignments (class_subjects.teacher_id)
  const { data: allAssignments } = await db.from('class_subjects')
    .select('class_id, term_id, classes(id,name)')
    .eq('teacher_id', currentUser.id)
    .eq('school_id', currentUser.school_id);

  // Filter subject assignments by current term
  let assignments = allAssignments || [];
  if (currentTerm) {
    assignments = assignments.filter(a => a.term_id === currentTerm.id);
  } else {
    assignments = assignments.filter((a, idx, arr) => arr.findIndex(x => x.class_id === a.class_id) === idx);
  }

  // Merge both sources — deduplicate by class id
  const classById = {};
  (formClasses || []).forEach(c => { classById[c.id] = c; });
  assignments.forEach(a => { if (a.classes && !classById[a.class_id]) classById[a.class_id] = a.classes; });
  myClasses = Object.values(classById);

  document.getElementById('pageBody').innerHTML = `
    <div class="page-header"><h1>My Students</h1><p>${currentTerm ? currentTerm.name + ' Term' : 'All Assigned Classes'}</p></div>
    <div class="filter-bar">
      <select class="form-control" id="classFilter" onchange="loadStudents()" style="max-width:220px;">
        <option value="">All My Classes</option>
        ${myClasses.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
      </select>
      <div class="search-box" style="flex:1;max-width:280px;">
        <input type="text" class="form-control" id="search" placeholder="Search…" oninput="filterStudents()">
      </div>
    </div>
    <div class="card" style="padding:0;">
      <div class="table-wrap" id="table" style="border:none;"></div>
    </div>
  `;
  await loadStudents();
})();

async function loadStudents() {
  showLoader('#table');
  const classId = document.getElementById('classFilter').value;
  const classIds = classId ? [classId] : myClasses.map(c => c.id);
  if (!classIds.length) { 
    showEmpty('#table', 'No classes assigned.'); 
    return; 
  }

  // Build the query - if there's a current term, filter by it, otherwise get all enrollments for these classes
  let query = db.from('enrollments')
    .select('class_id, classes(name), students(id,full_name,admission_no,gender,date_of_birth)')
    .in('class_id', classIds);
  
  if (currentTerm) {
    query = query.eq('term_id', currentTerm.id);
  }

  const { data, error } = await query;
  if (error) { 
    showError('#table', error.message); 
    return; 
  }

  students = (data || [])
    .map(e => ({ ...e.students, className: e.classes?.name }))
    .filter(Boolean)
    .sort((a, b) => (a.full_name || '').localeCompare(b.full_name || ''));
  
  if (!students.length) {
    showEmpty('#table', currentTerm ? 'No students enrolled in these classes this term.' : 'No students found.', '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></span>');
    return;
  }
  
  filterStudents();
}

function filterStudents() {
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  const f = students.filter(s => s.full_name.toLowerCase().includes(q) || s.admission_no?.toLowerCase().includes(q));
  if (!f.length) { showEmpty('#table', 'No students found.', '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></span>'); return; }
  document.getElementById('table').innerHTML = `
    <table>
      <thead><tr><th>#</th><th>Student</th><th>Admission No.</th><th>Class</th><th>Gender</th></tr></thead>
      <tbody>
        ${f.map((s,i) => `
          <tr>
            <td style="color:var(--ink-3);">${i+1}</td>
            <td><div class="student-cell">
              <div class="avatar avatar--sm">${s.full_name.charAt(0)}</div>
              <div class="info"><div class="name">${s.full_name}</div><div class="sub">${formatDate(s.date_of_birth)}</div></div>
            </div></td>
            <td style="font-family:var(--mono);font-size:13px;">${s.admission_no || '—'}</td>
            <td><span class="chip">${s.className || '—'}</span></td>
            <td>${s.gender === 'M' ? '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="14" r="6"/><line x1="19" y1="5" x2="14" y2="10"/><polyline points="15 5 19 5 19 9"/></svg></span> Male' : s.gender === 'F' ? '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="6"/><line x1="12" y1="15" x2="12" y2="23"/><line x1="8" y1="20" x2="16" y2="20"/></svg></span> Female' : '—'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}
</script>
<script src="../../js/pwa.js"></script>

<script src="../../js/ai-assistant.js" defer></script>
</body>
</html>
