<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a6e3f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EduTrack NG">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>EduTrack NG — My Attendance</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;font-family:sans-serif;color:#666;">
    <div style="width:36px;height:36px;border:4px solid #e5e7eb;border-top-color:#0a6e3f;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
    <p style="margin:0;font-size:14px;">Loading attendance…</p>
  </div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../../js/config.js"></script>
  <script src="../../js/supabase.js"></script>
<script src="layout.js"></script>
<script>
(async () => {
  try {
  const ctx = await initStudentLayout('attendance', 'My Attendance');
  if (!ctx) return;
  const { session } = ctx;

  // Initial load via RPC
  async function load(termId) {
    var data, error;
    try {
      var r = await db.rpc('get_student_attendance', {
        p_student_id: session.id,
        p_school_id:  session.school_id,
        p_term_id:    termId || null
      });
      data = r.data; error = r.error;
    } catch(ex) { error = { message: ex && ex.message || String(ex) }; }

    if (error || !data || !data.ok) {
      document.getElementById('pageBody').innerHTML =
        '<div style="padding:2rem;color:red;">Failed to load attendance. Please try again.</div>';
      return;
    }

    const terms      = data.terms      || [];
    const currentTerm = data.term      || {};
    const recs       = data.attendance || [];

    if (!document.getElementById('termSel')) {
      document.getElementById('pageBody').innerHTML = `
        <div class="page-header"><h1>My Attendance</h1></div>
        <div class="filter-bar">
          <select class="form-control" id="termSel" onchange="load(this.value)" style="max-width:220px;">
            ${terms.map(t => `<option value="${t.id}" ${t.id === currentTerm.id ? 'selected' : ''}>${t.name}</option>`).join('')}
          </select>
        </div>
        <div id="content"></div>
      `;
    }

    document.getElementById('content').innerHTML = '<div class="et-empty"><div class="et-empty__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg></span></div><p>Loading…</p></div>';

    const totalDays = (recs || []).length;
    const present = (recs || []).filter(a => a.status === 'P').length;
    const late    = (recs || []).filter(a => a.status === 'L').length;
    const absent  = (recs || []).filter(a => a.status === 'A').length;
    const excused = (recs || []).filter(a => a.status === 'E').length;
    const attPct  = totalDays > 0 ? Math.round((present + late) / totalDays * 100) : null;
    const barCol  = !attPct ? '' : attPct >= 75 ? '' : attPct >= 50 ? 'warn' : 'danger';

    document.getElementById('content').innerHTML = `
      <div class="card" style="margin-bottom:20px;">
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;">
          <div style="text-align:center;padding:14px;background:var(--success-light);border-radius:var(--radius-sm);">
            <div style="font-size:28px;font-weight:800;color:var(--success);">${present}</div>
            <div style="font-size:12px;color:var(--success);font-weight:600;">Present</div>
          </div>
          <div style="text-align:center;padding:14px;background:var(--danger-light);border-radius:var(--radius-sm);">
            <div style="font-size:28px;font-weight:800;color:var(--danger);">${absent}</div>
            <div style="font-size:12px;color:var(--danger);font-weight:600;">Absent</div>
          </div>
          <div style="text-align:center;padding:14px;background:var(--accent-light);border-radius:var(--radius-sm);">
            <div style="font-size:28px;font-weight:800;color:var(--warning);">${late}</div>
            <div style="font-size:12px;color:var(--warning);font-weight:600;">Late</div>
          </div>
          <div style="text-align:center;padding:14px;background:var(--info-light);border-radius:var(--radius-sm);">
            <div style="font-size:28px;font-weight:800;color:var(--info);">${excused}</div>
            <div style="font-size:12px;color:var(--info);font-weight:600;">Excused</div>
          </div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
            <span style="font-size:14px;font-weight:600;">Attendance Rate</span>
            <strong style="color:${attPct&&attPct<75?'var(--danger)':'var(--success)'};">${attPct !== null ? attPct + '%' : '—'}</strong>
          </div>
          <div class="progress-bar" style="height:12px;">
            <div class="progress-bar__fill ${barCol}" style="width:${attPct||0}%;"></div>
          </div>
          ${attPct !== null && attPct < 75 ? `
          <div style="margin-top:8px;padding:10px 12px;background:var(--danger-light);border-radius:var(--radius-sm);font-size:13px;color:var(--danger);">
            <span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>️ Your attendance is below 75%. Please speak with your class teacher.
          </div>` : ''}
        </div>
      </div>

      <div class="card" style="padding:0;">
        <div style="padding:14px 20px;border-bottom:1px solid var(--border);font-weight:700;">Attendance Log (${totalDays} days)</div>
        ${recs?.length ? `
          <div class="table-wrap" style="border:none;max-height:420px;overflow-y:auto;">
            <table>
              <thead><tr><th>Date</th><th>Day</th><th>Status</th></tr></thead>
              <tbody>
                ${recs.map(r => {
                  const labels = {P:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span> Present',A:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span> Absent',L:'⏰ Late',E:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="12" cy="12" r="10"/></svg></span> Excused'};
                  const badges = {P:'badge--green',A:'badge--red',L:'badge--yellow',E:'badge--blue'};
                  const d = new Date(r.date);
                  return `<tr>
                    <td style="font-size:14px;">${formatDate(r.date)}</td>
                    <td style="font-size:13px;color:var(--ink-3);">${d.toLocaleDateString('en-NG',{weekday:'long'})}</td>
                    <td><span class="badge ${badges[r.status]||'badge--gray'}">${labels[r.status]||r.status}</span></td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        ` : '<div class="et-empty" style="padding:30px;"><div class="et-empty__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg></span></div><p>No attendance records yet.</p></div>'}
      </div>
    `;
  }
  await load(); // initial load
  } catch(err) {
    var el = document.getElementById('pageBody') || document.getElementById('app');
    if (el) el.innerHTML = '<div style="padding:2rem;color:red;font-family:sans-serif;"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>️ Attendance failed to load. <a href="login.html">Log in again</a>.<br><small>' + (err && err.message || '') + '</small></div>';
    console.error('[EduTrack] Attendance error:', err);
  }
})();
</script>
<script src="../../js/pwa.js"></script>

<script src="../../js/ai-assistant.js" defer></script>
</body>
</html>
