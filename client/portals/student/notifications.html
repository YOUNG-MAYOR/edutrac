<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a6e3f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>EduTrack NG — Notifications</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
  <style>
    .notif-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px;gap:0;}
    .notif-tab{padding:10px 20px;font-size:14px;font-weight:600;color:var(--ink-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:var(--transition);}
    .notif-tab:hover{color:var(--ink);}
    .notif-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
    .notif-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;transition:var(--transition);cursor:pointer;}
    .notif-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
    .notif-card--unread{border-left:4px solid var(--primary);}
    .notif-card--warning{border-left:4px solid var(--warning);}
    .notif-card--urgent{border-left:4px solid var(--danger);}
    .notif-card--result{border-left:4px solid var(--success);}
    .notif-card--fee{border-left:4px solid var(--accent);}
    .notif-card__head{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;}
    .notif-card__icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .notif-card__body{flex:1;min-width:0;}
    .notif-card__title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:3px;}
    .notif-card__text{font-size:13px;color:var(--ink-2);line-height:1.5;}
    .notif-card__footer{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 12px 70px;}
    .notif-card__time{font-size:11px;color:var(--ink-4);}
    .notif-card__type-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px;}
    .unread-dot{width:9px;height:9px;background:var(--primary);border-radius:50%;flex-shrink:0;margin-top:5px;}
    .mark-read-btn{background:none;border:none;font-size:12px;color:var(--primary);cursor:pointer;font-weight:600;padding:0;}
    .mark-read-btn:hover{text-decoration:underline;}
    .filter-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
    .filter-pill{padding:5px 14px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--ink-2);transition:var(--transition);}
    .filter-pill:hover{border-color:var(--primary);color:var(--primary);}
    .filter-pill.active{background:var(--primary);color:white;border-color:var(--primary);}
    .empty-notif{text-align:center;padding:60px 20px;}
    .empty-notif__icon{font-size:56px;margin-bottom:12px;}
    .empty-notif__text{font-size:15px;color:var(--ink-3);}
  </style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../../js/config.js"></script>
  <script src="../../js/supabase.js"></script>
<script src="layout.js"></script>
<script>
let ctx, allNotifs=[], activeFilter='all', activeTab='all';

(async()=>{
  ctx = await initStudentLayout('notifications','Notifications');
  if(!ctx) return;
  const {session} = ctx;

  document.getElementById('topbarActions').innerHTML=`
    <button class="btn btn--ghost btn--sm" onclick="markAllRead()" id="markAllBtn" style="display:none;"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span> Mark all read</button>
  `;
  document.getElementById('pageBody').innerHTML=`
    <div class="page-header">
      <div><h1 class="page-title"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span> Notifications</h1>
      <p class="page-subtitle" id="notifSubtitle">Loading…</p></div>
    </div>
    <div class="notif-tabs">
      <div class="notif-tab active" onclick="setTab('all',this)">All</div>
      <div class="notif-tab" onclick="setTab('unread',this)">Unread</div>
      <div class="notif-tab" onclick="setTab('announcement',this)">Announcements</div>
      <div class="notif-tab" onclick="setTab('result',this)">Results</div>
    </div>
    <div class="filter-pills" id="filterPills">
      <div class="filter-pill active" onclick="setFilter('all',this)">All Types</div>
      <div class="filter-pill" onclick="setFilter('urgent',this)"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span> Urgent</div>
      <div class="filter-pill" onclick="setFilter('warning',this)"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>️ Warning</div>
      <div class="filter-pill" onclick="setFilter('result',this)"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></span> Results</div>
      <div class="filter-pill" onclick="setFilter('fee',this)"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span> Fees</div>
      <div class="filter-pill" onclick="setFilter('attendance',this)"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg></span> Attendance</div>
      <div class="filter-pill" onclick="setFilter('info',this)">ℹ️ Info</div>
    </div>
    <div id="notifList"><div class="et-loader"><div class="et-spinner"></div><p>Loading notifications…</p></div></div>
  `;

  await loadNotifications();
})();

async function loadNotifications(){
  const {session} = ctx;
  const { data: notifResp, error } = await db.rpc('get_student_notifications', {
    p_student_id: session.id,
    p_school_id:  session.school_id
  });

  if (error || !notifResp || !notifResp.ok) {
    allNotifs = [];
    document.getElementById('notifList').innerHTML =
      '<div style="padding:2rem;color:red;">Failed to load notifications.</div>';
    return;
  }

  allNotifs = notifResp.notifs || [];
  const unread = allNotifs.filter(n=>!n.is_read).length;

  document.getElementById('notifSubtitle').textContent =
    allNotifs.length===0?'No notifications yet':
    unread>0?`${unread} unread of ${allNotifs.length} total`:`${allNotifs.length} notifications · All read`;

  const markBtn=document.getElementById('markAllBtn');
  if(markBtn) markBtn.style.display = unread>0?'inline-flex':'none';

  renderList();
}

function setTab(tab, el){
  activeTab=tab;
  document.querySelectorAll('.notif-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function setFilter(filter, el){
  activeFilter=filter;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList(){
  let list=allNotifs;
  if(activeTab==='unread')   list=list.filter(n=>!n.is_read);
  if(activeTab==='announcement') list=list.filter(n=>n.type==='info'||n.type==='urgent'||n.type==='warning');
  if(activeTab==='result')   list=list.filter(n=>n.type==='result');
  if(activeFilter!=='all')   list=list.filter(n=>n.type===activeFilter);

  const container=document.getElementById('notifList');
  if(!list.length){
    container.innerHTML=`<div class="empty-notif"><div class="empty-notif__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22 6 12 13 2 6"/></svg></span></div><div class="empty-notif__text">${activeTab==='unread'?'No unread notifications':'No notifications in this category'}</div></div>`;
    return;
  }

  container.innerHTML=list.map(n=>{
    const s=notifStyle(n.type);
    const borderClass=!n.is_read?'notif-card--unread':(n.type==='urgent'?'notif-card--urgent':n.type==='warning'?'notif-card--warning':n.type==='result'?'notif-card--result':n.type==='fee'?'notif-card--fee':'');
    return `
      <div class="notif-card ${borderClass}" id="nc-${n.id}" onclick="expandNotif('${n.id}')">
        <div class="notif-card__head">
          ${!n.is_read?'<div class="unread-dot"></div>':'<div style="width:9px;"></div>'}
          <div class="notif-card__icon" style="background:${s.bg};">${s.icon}</div>
          <div class="notif-card__body">
            <div class="notif-card__title">${escHtml(n.title)}</div>
            <div class="notif-card__text" id="body-${n.id}" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">
              ${escHtml(n.body||'')}
            </div>
          </div>
        </div>
        <div class="notif-card__footer">
          <span class="notif-card__time">${timeAgo(n.created_at)} · <span class="notif-card__type-badge" style="background:${s.bg};color:${s.color};">${n.type}</span></span>
          ${!n.is_read?`<button class="mark-read-btn" onclick="event.stopPropagation();markRead('${n.id}')">Mark read</button>`:'<span style="font-size:11px;color:var(--ink-4);"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span> Read</span>'}
        </div>
      </div>`;
  }).join('');
}

function expandNotif(id){
  const n=allNotifs.find(x=>x.id===id);
  if(!n) return;
  const bodyEl=document.getElementById('body-'+id);
  if(bodyEl){
    const isExpanded=bodyEl.style.display==='block';
    bodyEl.style.cssText=isExpanded?'display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;':'display:block;';
  }
  if(!n.is_read) markRead(id);
}

async function markRead(id){
  const n=allNotifs.find(x=>x.id===id);
  if(!n||n.is_read) return;
  await db.rpc('mark_notification_read', {
    p_student_id:      ctx.session.id,
    p_school_id:       ctx.session.school_id,
    p_notification_id: id
  });
  n.is_read=true;
  // Update UI
  const card=document.getElementById('nc-'+id);
  if(card){
    card.classList.remove('notif-card--unread');
    card.querySelector('.unread-dot')?.replaceWith(Object.assign(document.createElement('div'),{style:'width:9px;'}));
    const btn=card.querySelector('.mark-read-btn');
    if(btn) btn.outerHTML='<span style="font-size:11px;color:var(--ink-4);"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span> Read</span>';
  }
  const unread=allNotifs.filter(n=>!n.is_read).length;
  document.getElementById('notifSubtitle').textContent=`${allNotifs.length} notifications${unread>0?' · '+unread+' unread':'· All read'}`;
  const markBtn=document.getElementById('markAllBtn');
  if(markBtn) markBtn.style.display=unread>0?'inline-flex':'none';
}

async function markAllRead(){
  const unread=allNotifs.filter(n=>!n.is_read);
  if(!unread.length) return;
  await db.rpc('mark_all_notifications_read', {
    p_student_id: ctx.session.id,
    p_school_id:  ctx.session.school_id
  });
  unread.forEach(n=>n.is_read=true);
  document.getElementById('notifSubtitle').textContent=`${allNotifs.length} notifications · All read`;
  document.getElementById('markAllBtn').style.display='none';
  renderList();
  toast('All notifications marked as read','success');
}

function notifStyle(type){
  const map={
    info:       {bg:'#dbeafe',color:'#1d4ed8',icon:'ℹ️'},
    warning:    {bg:'#fef9c3',color:'#854d0e',icon:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>️'},
    urgent:     {bg:'#fee2e2',color:'#991b1b',icon:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>'},
    result:     {bg:'#dcfce7',color:'#166534',icon:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></span>'},
    fee:        {bg:'#fef3c7',color:'#92400e',icon:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span>'},
    attendance: {bg:'#ede9fe',color:'#5b21b6',icon:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg></span>'},
    success:    {bg:'#dcfce7',color:'#166534',icon:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>'},
  };
  return map[type]||{bg:'#f3f4f6',color:'#374151',icon:'<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></span>'};
}

function timeAgo(d){
  const diff=Date.now()-new Date(d).getTime(), m=Math.floor(diff/60000);
  if(m<1)return'Just now';if(m<60)return m+'m ago';
  const h=Math.floor(m/60);if(h<24)return h+'h ago';
  const dy=Math.floor(h/24);if(dy<7)return dy+'d ago';
  return new Date(d).toLocaleDateString('en-NG',{day:'numeric',month:'short',year:'numeric'});
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
<script src="../../js/pwa.js"></script>

<script src="../../js/ai-assistant.js" defer></script>
</body>
</html>
