<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a6e3f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EduTrack NG">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>EduTrack NG — My Profile</title>
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../../js/config.js"></script>
  <script src="../../js/supabase.js"></script>
<script src="layout.js"></script>
<script>
(async () => {
  const ctx = await initStudentLayout('profile', 'My Profile');
  if (!ctx) return;
  const { session, student } = ctx;

  const className = student?.enrollments?.[0]?.classes?.name || '—';

  document.getElementById('pageBody').innerHTML = `
    <div style="max-width:540px;">
      <div class="card" style="margin-bottom:20px;">
        <div style="display:flex;align-items:center;gap:20px;margin-bottom:20px;">
          <div class="avatar avatar--xl" style="font-size:30px;">${session.full_name.charAt(0)}</div>
          <div>
            <h2 style="font-size:22px;font-weight:800;">${session.full_name}</h2>
            <div style="font-size:14px;color:var(--ink-3);margin-top:4px;">${className}</div>
            <div style="font-size:13px;color:var(--ink-3);">Adm. No: <strong>${session.admission_no}</strong></div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div style="background:var(--surface-2);padding:12px;border-radius:var(--radius-sm);">
            <div style="font-size:11px;color:var(--ink-3);margin-bottom:4px;">Date of Birth</div>
            <div style="font-weight:600;">${formatDate(student?.date_of_birth)}</div>
          </div>
          <div style="background:var(--surface-2);padding:12px;border-radius:var(--radius-sm);">
            <div style="font-size:11px;color:var(--ink-3);margin-bottom:4px;">Gender</div>
            <div style="font-weight:600;">${student?.gender === 'M' ? '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="14" r="6"/><line x1="19" y1="5" x2="14" y2="10"/><polyline points="15 5 19 5 19 9"/></svg></span> Male' : student?.gender === 'F' ? '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="6"/><line x1="12" y1="15" x2="12" y2="23"/><line x1="8" y1="20" x2="16" y2="20"/></svg></span> Female' : '—'}</div>
          </div>
          <div style="background:var(--surface-2);padding:12px;border-radius:var(--radius-sm);grid-column:1/-1;">
            <div style="font-size:11px;color:var(--ink-3);margin-bottom:4px;">Address</div>
            <div style="font-weight:600;">${student?.address || '—'}</div>
          </div>
        </div>
      </div>

      <!-- Change PIN -->
      <div class="card">
        <div class="card__header"><span class="card__title"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><line x1="12" y1="16" x2="12" y2="16"/></svg></span> Change Login PIN</span></div>
        <div class="form-group">
          <label class="form-label">Current PIN</label>
          <input type="password" id="currentPin" class="form-control" placeholder="Enter current PIN" maxlength="8">
        </div>
        <div class="form-group">
          <label class="form-label">New PIN (4–8 characters)</label>
          <input type="password" id="newPin" class="form-control" placeholder="Enter new PIN" maxlength="8">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm New PIN</label>
          <input type="password" id="confirmPin" class="form-control" placeholder="Confirm new PIN" maxlength="8">
        </div>
        <div id="pinErr" class="form-error" style="display:none;"></div>
        <div id="pinOk" class="form-hint" style="display:none;color:var(--success);"></div>
        <button class="btn btn--primary" onclick="changePin()">Update PIN</button>
      </div>
    </div>
  `;
})();

async function changePin() {
  const session = getStudentSession();
  const currentPin = document.getElementById('currentPin').value;
  const newPin = document.getElementById('newPin').value;
  const confirmPin = document.getElementById('confirmPin').value;
  const errEl = document.getElementById('pinErr');
  const okEl = document.getElementById('pinOk');
  errEl.style.display = 'none'; okEl.style.display = 'none';

  if (!currentPin || !newPin || !confirmPin) {
    errEl.textContent = 'Fill all fields.'; errEl.style.display = 'block'; return;
  }
  if (newPin.length < 4) {
    errEl.textContent = 'PIN must be at least 4 characters.'; errEl.style.display = 'block'; return;
  }
  if (newPin !== confirmPin) {
    errEl.textContent = 'New PINs do not match.'; errEl.style.display = 'block'; return;
  }

  const { data, error } = await db.rpc('change_student_pin', {
    p_student_id:  session.id,
    p_school_id:   session.school_id,
    p_current_pin: currentPin,
    p_new_pin:     newPin
  });

  if (error || !data || !data.ok) {
    errEl.textContent = (data && data.error) || 'Could not update PIN. Please try again.';
    errEl.style.display = 'block';
    return;
  }

  okEl.innerHTML = '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span> PIN updated successfully!'; okEl.style.display = 'block';
  document.getElementById('currentPin').value = '';
  document.getElementById('newPin').value = '';
  document.getElementById('confirmPin').value = '';
}
</script>
<script src="../../js/pwa.js"></script>

<script src="../../js/ai-assistant.js" defer></script>
</body>
</html>
