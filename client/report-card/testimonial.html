<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Leaving Testimonial</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../js/config.js"></script>
<script src="../js/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1e3a1e;font-family:'Poppins',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}

/* ── ORIENTATION MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px);}
.modal{background:white;border-radius:12px;padding:36px 40px;max-width:460px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.modal-logo{font-size:40px;margin-bottom:14px;}
.modal h2{font-family:'Cinzel',serif;font-size:20px;color:#1e3a1e;margin-bottom:8px;}
.modal p{font-size:13px;color:#666;margin-bottom:24px;line-height:1.6;}
.orient-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.orient-btn{border:2px solid #e0e0e0;border-radius:10px;padding:18px 12px;cursor:pointer;background:white;transition:all .2s;}
.orient-btn:hover{border-color:#2d7a2d;background:#f0faf0;}
.orient-btn.selected{border-color:#2d7a2d;background:linear-gradient(135deg,#f0faf0,#e8f5e9);box-shadow:0 0 0 3px rgba(45,122,45,.15);}
.orient-preview{margin:0 auto 10px;border:2px solid #ddd;background:#f5f5f5;position:relative;}
.orient-preview.land{width:80px;height:56px;}
.orient-preview.port{width:56px;height:80px;}
.orient-preview::after{content:'T';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:#ccc;}
.orient-label{font-family:'Cinzel',serif;font-size:12px;color:#333;font-weight:700;letter-spacing:1px;}
.orient-sub{font-size:10px;color:#888;margin-top:3px;}
.modal-gen-btn{width:100%;padding:12px;background:linear-gradient(135deg,#1e3a1e,#2d7a2d);border:none;border-radius:8px;font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:white;cursor:pointer;letter-spacing:.5px;transition:filter .2s;}
.modal-gen-btn:hover{filter:brightness(1.1);}
.modal-back{display:block;margin-top:12px;font-size:12px;color:#999;cursor:pointer;text-decoration:underline;}

/* ── CONTROL BAR ── */
.ctrl{background:#0f1f0f;color:white;width:100%;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ctrl-title{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;color:#4ade80;flex:1;}
.ctrl-btn{padding:7px 16px;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:.4px;display:flex;align-items:center;gap:6px;}
.btn-print{background:linear-gradient(135deg,#1e6b1e,#2d9e2d);color:white;}
.btn-back{background:rgba(255,255,255,.1);color:white;border:1px solid rgba(255,255,255,.2);}
.btn-orient{background:rgba(255,255,255,.08);color:#4ade80;border:1px solid rgba(74,222,128,.3);}
.ctrl-badge{font-size:10px;background:rgba(45,122,45,.2);border:1px solid rgba(45,122,45,.4);color:#4ade80;padding:3px 10px;border-radius:20px;font-family:sans-serif;letter-spacing:.5px;}

.loading{color:#4ade80;font-family:'Cinzel',serif;font-size:16px;letter-spacing:2px;padding:60px;text-align:center;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

.test-page-wrap{padding:20px;width:100%;display:flex;justify-content:center;}

/* ═══════════════════════════════════════
   PORTRAIT TESTIMONIAL (Primary design — inspired by ref image 2)
   Green/white school formal letter
   ═══════════════════════════════════════ */
.test-portrait{
  width:210mm;min-height:297mm;
  background:white;position:relative;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.4);
  font-family:'Poppins',sans-serif;
}
/* Top green band */
.tp-top-band{
  height:12px;
  background:linear-gradient(90deg,#1e3a1e,#2d7a2d,#1e3a1e);
}
/* Gold line under top band */
.tp-gold-line{height:4px;background:linear-gradient(90deg,#c8860a,#f0c040,#c8860a);}

/* Header area */
.tp-header{
  display:flex;align-items:center;gap:16px;
  padding:16px 24px 12px;
  border-bottom:3px solid #1e3a1e;
  background:linear-gradient(135deg,#f0faf0 0%,#e8f5e9 100%);
}
.tp-shield{
  width:82px;height:96px;flex-shrink:0;
  background:linear-gradient(180deg,#1e3a1e 0%,#2d7a2d 100%);
  clip-path:polygon(50% 0%,100% 15%,100% 70%,50% 100%,0% 70%,0% 15%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.tp-shield::before{
  content:'';position:absolute;inset:5px;
  background:linear-gradient(180deg,#2d9e2d 0%,#1e5a1e 100%);
  clip-path:polygon(50% 0%,100% 15%,100% 70%,50% 100%,0% 70%,0% 15%);
}
.tp-shield-inner{
  position:relative;z-index:1;text-align:center;
}
.tp-shield-logo{width:44px;height:44px;border-radius:50%;background:white;overflow:hidden;display:flex;align-items:center;justify-content:center;margin:0 auto 3px;}
.tp-shield-logo img{width:100%;height:100%;object-fit:cover;}
.tp-shield-fb{font-family:'Cinzel',serif;font-size:6px;font-weight:700;color:white;text-align:center;line-height:1.2;}
.tp-hc{flex:1;text-align:center;}
.tp-school-name{font-family:'Cinzel',serif;font-size:clamp(13px,2.2vw,18px);font-weight:900;color:#1e3a1e;letter-spacing:.4px;line-height:1.2;}
.tp-school-sub{font-size:10px;color:#2d7a2d;font-weight:600;margin-top:2px;letter-spacing:.5px;text-transform:uppercase;}
.tp-school-meta{font-size:10px;color:#555;margin-top:2px;font-style:italic;}
.tp-school-motto{font-style:italic;color:#1e3a1e;font-size:11px;font-weight:700;margin-top:4px;letter-spacing:.5px;}
.tp-pp{
  width:80px;height:98px;flex-shrink:0;
  border:3px solid #1e3a1e;overflow:hidden;background:#f0faf0;
  display:flex;align-items:center;justify-content:center;
}
.tp-pp img{width:100%;height:100%;object-fit:cover;}
.tp-pp-ph{text-align:center;font-size:9px;color:#aaa;font-family:sans-serif;line-height:1.4;padding:4px;}

/* TESTIMONIALS title bar */
.tp-title-bar{
  background:linear-gradient(135deg,#1e3a1e,#2d7a2d);
  padding:10px 24px;text-align:center;
}
.tp-title-word{
  font-family:'Cinzel',serif;font-size:22px;font-weight:900;
  color:white;letter-spacing:4px;text-transform:uppercase;
}
.tp-title-sub{
  font-size:11px;color:#90ee90;letter-spacing:1.5px;margin-top:2px;font-style:italic;
}

/* Gold divider */
.tp-gold-div{height:3px;background:linear-gradient(90deg,#c8860a,#f0c040,#c8860a);}

/* Certify intro */
.tp-certify{
  padding:14px 24px 8px;text-align:center;
  font-family:'EB Garamond',Georgia,serif;font-size:14px;color:#333;font-style:italic;
}
.tp-certify strong{font-style:normal;font-weight:700;font-size:15px;color:#1e3a1e;}

/* Student name banner */
.tp-name-row{
  background:#f0faf0;border-top:2px solid #1e3a1e;border-bottom:2px solid #1e3a1e;
  padding:10px 24px;text-align:center;margin:4px 0;
}
.tp-student-name{
  font-family:'Playfair Display',serif;font-size:clamp(18px,3vw,26px);
  font-weight:700;font-style:italic;color:#1e3a1e;
}

/* Form fields */
.tp-form{padding:8px 24px;font-size:12px;}
.tp-form-row{
  display:flex;align-items:baseline;gap:8px;
  border-bottom:1px solid #cde8cd;padding:6px 0;
}
.tp-form-row:last-child{border-bottom:none;}
.tp-label{font-weight:700;color:#1e3a1e;white-space:nowrap;min-width:155px;font-size:11.5px;}
.tp-value{flex:1;border-bottom:1px dotted #888;min-height:16px;color:#222;padding-left:4px;font-family:'EB Garamond',Georgia,serif;font-size:13px;font-style:italic;padding-bottom:1px;}
.tp-form-2col{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.tp-form-2col .tp-form-row:nth-child(odd){border-right:1px solid #cde8cd;padding-right:12px;}
.tp-form-2col .tp-form-row:nth-child(even){padding-left:12px;}

/* Education level section */
.tp-edu-hdr{
  background:linear-gradient(90deg,#2d7a2d,#1e5a1e);
  color:white;font-family:'Cinzel',serif;font-size:10px;
  letter-spacing:2px;padding:5px 24px;text-transform:uppercase;font-weight:700;
  margin-top:6px;
}
.tp-edu-row{
  display:flex;align-items:center;gap:12px;padding:7px 24px;
  border-bottom:1px solid #e0f0e0;font-size:12px;background:#f8fff8;
}
.tp-edu-label{font-weight:700;color:#1e3a1e;min-width:155px;font-size:11.5px;}
.tp-edu-value{font-family:'EB Garamond',serif;font-size:13px;font-style:italic;color:#222;border-bottom:1px dotted #aaa;flex:1;min-height:14px;padding-left:2px;}

/* Conduct table */
.tp-conduct{
  margin:6px 24px;border:2px solid #1e3a1e;border-radius:3px;overflow:hidden;
}
.tp-conduct-hdr{
  background:linear-gradient(90deg,#1e3a1e,#2d7a2d);color:white;
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;
  padding:5px 14px;text-transform:uppercase;display:grid;grid-template-columns:repeat(4,1fr);text-align:center;
}
.tp-conduct-vals{display:grid;grid-template-columns:repeat(4,1fr);text-align:center;padding:8px 14px;gap:4px;}
.tp-conduct-item{text-align:center;}
.tp-conduct-label{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.5px;display:block;}
.tp-conduct-val{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:#1e3a1e;display:block;border-bottom:1px solid #cde8cd;min-height:20px;}

/* Recommendation */
.tp-rec-hdr{
  background:linear-gradient(90deg,#2d7a2d,#1e5a1e);color:white;
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;
  padding:5px 24px;text-transform:uppercase;font-weight:700;margin-top:6px;
}
.tp-rec-body{
  padding:10px 24px 6px;
  font-family:'EB Garamond',Georgia,serif;font-size:13px;color:#333;
  line-height:1.8;text-align:justify;
}

/* Signature area */
.tp-sig-area{
  padding:8px 24px;
  border-top:2px solid #1e3a1e;
  display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:end;
  margin-top:6px;
}
.tp-sig-blk{text-align:center;}
.tp-sig-img{min-height:38px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:3px;}
.tp-sig-img img{max-height:36px;max-width:90%;object-fit:contain;}
.tp-sig-line{border-top:1.5px solid #1e3a1e;width:85%;margin:0 auto 4px;}
.tp-sig-la{font-family:'Cinzel',serif;font-size:9px;color:#1e3a1e;letter-spacing:.5px;font-weight:700;}
.tp-sig-sl{font-size:8px;color:#888;margin-top:1px;}
.tp-sig-date{font-size:10px;color:#333;margin-top:4px;border-top:1px dotted #aaa;padding-top:2px;font-family:sans-serif;}
/* Red official stamp circle */
.tp-stamp{
  width:74px;height:74px;border-radius:50%;
  border:3px double #cc1111;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;font-family:'Cinzel',serif;font-size:6.5px;font-weight:700;
  color:#cc1111;letter-spacing:.4px;line-height:1.4;padding:8px;
  background:radial-gradient(circle,rgba(255,220,220,.3),white);
}

/* Ref number */
.tp-ref-row{
  background:#f0faf0;border-top:1px solid #cde8cd;
  padding:5px 24px;font-size:10px;color:#555;font-family:sans-serif;
  display:flex;justify-content:space-between;
}

/* Bottom band */
.tp-bot-band{
  position:absolute;bottom:0;left:0;right:0;
}
.tp-bot-green{height:5px;background:linear-gradient(90deg,#1e3a1e,#2d7a2d,#1e3a1e);}
.tp-bot-gold{height:3px;background:linear-gradient(90deg,#c8860a,#f0c040,#c8860a);}

/* ═══════════════════════════════════════
   LANDSCAPE TESTIMONIAL
   ═══════════════════════════════════════ */
.test-landscape{
  width:280mm;min-height:198mm;
  background:white;position:relative;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.4);
  font-family:'Poppins',sans-serif;
}
.tl-top-band{height:10px;background:linear-gradient(90deg,#1e3a1e,#2d7a2d,#1e3a1e);}
.tl-gold-line{height:3px;background:linear-gradient(90deg,#c8860a,#f0c040,#c8860a);}
.tl-header{
  display:flex;align-items:center;gap:14px;
  padding:14px 24px 10px;
  border-bottom:2px solid #1e3a1e;
  background:linear-gradient(135deg,#f0faf0,#e8f5e9);
}
.tl-shield{
  width:70px;height:82px;flex-shrink:0;
  background:linear-gradient(180deg,#1e3a1e,#2d7a2d);
  clip-path:polygon(50% 0%,100% 15%,100% 70%,50% 100%,0% 70%,0% 15%);
  display:flex;align-items:center;justify-content:center;position:relative;
}
.tl-shield::before{
  content:'';position:absolute;inset:5px;
  background:linear-gradient(180deg,#2d9e2d,#1e5a1e);
  clip-path:polygon(50% 0%,100% 15%,100% 70%,50% 100%,0% 70%,0% 15%);
}
.tl-shield-inner{position:relative;z-index:1;text-align:center;}
.tl-shield-logo{width:36px;height:36px;border-radius:50%;background:white;overflow:hidden;display:flex;align-items:center;justify-content:center;margin:0 auto 2px;}
.tl-shield-logo img{width:100%;height:100%;object-fit:cover;}
.tl-shield-fb{font-family:'Cinzel',serif;font-size:5.5px;font-weight:700;color:white;text-align:center;line-height:1.2;}
.tl-hc{flex:1;text-align:center;}
.tl-school-name{font-family:'Cinzel',serif;font-size:clamp(12px,2vw,17px);font-weight:900;color:#1e3a1e;letter-spacing:.4px;}
.tl-school-sub{font-size:9px;color:#2d7a2d;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-top:1px;}
.tl-school-meta{font-size:9px;color:#555;font-style:italic;margin-top:1px;}
.tl-motto{font-style:italic;color:#1e3a1e;font-size:10px;font-weight:700;margin-top:3px;}
.tl-pp{width:70px;height:85px;flex-shrink:0;border:2px solid #1e3a1e;overflow:hidden;background:#f0faf0;display:flex;align-items:center;justify-content:center;}
.tl-pp img{width:100%;height:100%;object-fit:cover;}
.tl-pp-ph{text-align:center;font-size:8px;color:#aaa;font-family:sans-serif;padding:3px;}
.tl-title-bar{background:linear-gradient(135deg,#1e3a1e,#2d7a2d);padding:7px 24px;text-align:center;}
.tl-title-word{font-family:'Cinzel',serif;font-size:17px;font-weight:900;color:white;letter-spacing:3px;}
.tl-title-sub{font-size:9px;color:#90ee90;letter-spacing:1px;margin-top:1px;font-style:italic;}
.tl-gold-div{height:3px;background:linear-gradient(90deg,#c8860a,#f0c040,#c8860a);}
.tl-body{display:grid;grid-template-columns:1fr 1fr;padding:10px 20px;gap:0;border-bottom:2px solid #1e3a1e;}
.tl-left{border-right:1.5px solid #cde8cd;padding-right:16px;}
.tl-right{padding-left:16px;}
.tl-certify{font-family:'EB Garamond',Georgia,serif;font-size:12.5px;color:#333;font-style:italic;margin-bottom:5px;text-align:center;}
.tl-certify strong{font-style:normal;font-weight:700;color:#1e3a1e;}
.tl-name{font-family:'Playfair Display',serif;font-size:clamp(16px,2.5vw,22px);font-weight:700;font-style:italic;color:#1e3a1e;text-align:center;margin-bottom:5px;}
.tl-name-line{width:90%;height:1px;background:linear-gradient(90deg,transparent,#1e3a1e,transparent);margin:0 auto 8px;}
.tl-fr{display:flex;align-items:baseline;gap:5px;border-bottom:1px solid #e0f0e0;padding:4px 0;font-size:11px;}
.tl-fl{font-weight:700;color:#1e3a1e;min-width:110px;font-size:10.5px;}
.tl-fv{flex:1;border-bottom:1px dotted #888;min-height:13px;font-family:'EB Garamond',serif;font-size:12px;font-style:italic;color:#222;padding-left:2px;}
.tl-sec-hdr{font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:2px;color:#1e3a1e;text-transform:uppercase;font-weight:700;margin:8px 0 4px;border-bottom:1px solid #cde8cd;padding-bottom:3px;}
.tl-conduct-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.tl-ci{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #e8f5e8;font-size:10.5px;}
.tl-cl{color:#555;}
.tl-cv{font-weight:700;color:#1e3a1e;border-bottom:1px solid #888;min-width:40px;text-align:center;font-family:'EB Garamond',serif;font-size:12px;font-style:italic;}
.tl-rec{font-family:'EB Garamond',Georgia,serif;font-size:12px;color:#333;line-height:1.7;text-align:justify;}
.tl-sig-area{
  padding:8px 20px;
  display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:end;
}
.tl-sig-blk{text-align:center;}
.tl-sig-img{min-height:32px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:2px;}
.tl-sig-img img{max-height:30px;max-width:90%;object-fit:contain;}
.tl-sig-line{border-top:1.5px solid #1e3a1e;width:85%;margin:0 auto 3px;}
.tl-sig-la{font-family:'Cinzel',serif;font-size:8.5px;color:#1e3a1e;letter-spacing:.5px;font-weight:700;}
.tl-sig-sl{font-size:7.5px;color:#888;margin-top:1px;}
.tl-stamp{
  width:60px;height:60px;border-radius:50%;
  border:2.5px double #cc1111;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;font-family:'Cinzel',serif;font-size:6px;font-weight:700;
  color:#cc1111;letter-spacing:.3px;line-height:1.3;padding:6px;
  background:radial-gradient(circle,rgba(255,220,220,.3),white);
}
.tl-ref{background:#f0faf0;border-top:1px solid #cde8cd;padding:4px 20px;font-size:9px;color:#555;font-family:sans-serif;display:flex;justify-content:space-between;}
.tl-bot-band{position:absolute;bottom:0;left:0;right:0;}
.tl-bot-green{height:5px;background:linear-gradient(90deg,#1e3a1e,#2d7a2d,#1e3a1e);}
.tl-bot-gold{height:3px;background:linear-gradient(90deg,#c8860a,#f0c040,#c8860a);}

@media print{
  body{background:white;}
  .ctrl{display:none!important;}
  .test-page-wrap{padding:0;}
  .test-portrait,.test-landscape{box-shadow:none!important;}
  @page{margin:0;}
}
@media screen and (max-width:600px){
  .test-landscape{width:100%;min-height:auto;}
  .test-portrait{width:100%;min-height:auto;}
}
</style>
</head>
<body>

<!-- ORIENTATION MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-logo">📜</div>
    <h2>School Leaving Testimonial</h2>
    <p>Choose your preferred orientation for the testimonial document.</p>
    <div class="orient-grid">
      <div class="orient-btn selected" id="btnPort" onclick="selectOrient('portrait')">
        <div class="orient-preview port"></div>
        <div class="orient-label">PORTRAIT</div>
        <div class="orient-sub">210mm × 297mm<br>Recommended</div>
      </div>
      <div class="orient-btn" id="btnLand" onclick="selectOrient('landscape')">
        <div class="orient-preview land"></div>
        <div class="orient-label">LANDSCAPE</div>
        <div class="orient-sub">297mm × 210mm<br>A4 Horizontal</div>
      </div>
    </div>
    <button class="modal-gen-btn" id="genBtn" onclick="generateTest()">✦ Generate Testimonial</button>
    <span class="modal-back" onclick="history.back()">← Go back</span>
  </div>
</div>

<!-- CONTROL BAR -->
<div class="ctrl" id="ctrlBar" style="display:none">
  <span class="ctrl-title">📜 School Leaving Testimonial</span>
  <span class="ctrl-badge" id="orientBadge">PORTRAIT</span>
  <button class="ctrl-btn btn-orient" onclick="changeOrient()">⟳ Change Orientation</button>
  <button class="ctrl-btn btn-print" onclick="window.print()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    Print / Save PDF
  </button>

  <div class="loading">Loading testimonial data…</div>
</div>

<script>
const p = new URLSearchParams(location.search);
const STUDENT_ID = p.get('student_id');
const TERM_ID    = p.get('term_id');

let _orient = 'portrait';
let _data   = null;

function selectOrient(o) {
  _orient = o;
  document.getElementById('btnLand').classList.toggle('selected', o === 'landscape');
  document.getElementById('btnPort').classList.toggle('selected', o === 'portrait');
}
function changeOrient() {
  document.getElementById('ctrlBar').style.display = 'none';
  document.getElementById('modalBg').style.display = 'flex';
  document.getElementById('mainContent').innerHTML = '<div class="loading">Ready to regenerate…</div>';
}
async function generateTest() {
  document.getElementById('modalBg').style.display = 'none';
  document.getElementById('ctrlBar').style.display = 'flex';
  document.getElementById('orientBadge').textContent = _orient.toUpperCase();
  if (_data) { renderTest(_data); return; }
  document.getElementById('mainContent').innerHTML = '<div class="loading">Fetching student data…</div>';
  await loadData();
}

async function sq(label, query) {
  try {
    const { data, error } = await query;
    if (error) { console.warn(label, error.message); return null; }
    return data;
  } catch(e) { console.warn(label, e); return null; }
}
function gradeFromScale(score, scale) {
  if (score === null || score === undefined || !scale?.length) return { grade: '—', remark: '' };
  const g = scale.find(s => score >= s.min_score && score <= s.max_score);
  return g ? { grade: g.grade, remark: g.remark || '' } : { grade: '—', remark: '' };
}
function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' }); }
  catch { return d; }
}

async function loadData() {
  if (!STUDENT_ID || !TERM_ID) {
    await showStudentPicker('testimonial');
    return;
  }
  try {
    const student = await sq('Student', db.from('students').select('*').eq('id', STUDENT_ID).single());
    if (!student) throw new Error('Student not found');
    const schoolId = student.school_id;

    const [school, scale, term, results, affective] = await Promise.all([
      sq('School', db.from('schools').select('name,logo_url,address,state,lga,phone,email,motto,principal_signature_url,class_teacher_signature_url').eq('id', schoolId).single()),
      sq('Scale',  db.from('grading_scales').select('*').eq('school_id', schoolId).order('min_score', { ascending: false })),
      sq('Term',   db.from('terms').select('*,academic_years(label)').eq('id', TERM_ID).single()),
      sq('Results', db.from('results').select('score,subject_id,subjects(name),exams(max_score,weight)').eq('student_id', STUDENT_ID).eq('term_id', TERM_ID)),
      sq('Affective', db.from('affective_domain').select('*').eq('student_id', STUDENT_ID).eq('term_id', TERM_ID).maybeSingle()),
    ]);

    // Build unique subjects
    const subMap = new Map();
    (results || []).forEach(r => {
      if (!subMap.has(r.subject_id)) subMap.set(r.subject_id, { name: r.subjects?.name || '—', rows: [] });
      subMap.get(r.subject_id).rows.push(r);
    });
    const subRows = [...subMap.values()].map(sub => {
      const tw = sub.rows.reduce((s, r) => s + (r.exams?.weight || 1), 0);
      const ws = sub.rows.reduce((s, r) => s + (r.score / (r.exams?.max_score || 100)) * 100 * (r.exams?.weight || 1), 0);
      const total = tw > 0 ? Math.round(ws / tw * 10) / 10 : null;
      const g = gradeFromScale(total, scale || []);
      return { name: sub.name, total, grade: g.grade };
    });
    const ws2 = subRows.filter(s => s.total !== null);
    const avg = ws2.length ? Math.round(ws2.reduce((s, r) => s + r.total, 0) / ws2.length * 10) / 10 : null;
    const passedSubjects = subRows.filter(s => s.grade && s.grade !== 'F' && s.grade !== '—').length;
    const og = gradeFromScale(avg, scale || []);
    const sessLabel = (term?.academic_years?.label || term?.name) || 'Current Session';
    const enr = await sq('Enrollment', db.from('enrollments').select('class_id,classes(id,name,level,section)').eq('student_id', STUDENT_ID).eq('term_id', TERM_ID).maybeSingle());
    const className = enr?.classes?.name || '—';

    _data = { student, school, scale, term, subRows, avg, passedSubjects, og, sessLabel, affective, className };
    renderTest(_data);
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `<div class="loading" style="color:#f87171">Error: ${e.message}</div>`;
  }
}

async function showStudentPicker(pageType) {
  document.getElementById('modalBg').style.display = 'none';
  document.getElementById('ctrlBar').style.display = 'flex';
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '<div class="loading">Loading classes…</div>';
  try {
    const userData = await getCurrentUser();
    const schoolId = userData?.school_id || userData?.schools?.id;
    if (!schoolId) { window.location.href = '/login.html'; return; }
    const {data:classes} = await db.from('classes').select('id,name,level,section').eq('school_id',schoolId).order('name');
    const {data:terms}   = await db.from('terms').select('*,academic_years(label)').eq('school_id',schoolId).order('start_date',{ascending:false});
    if (!classes?.length || !terms?.length) {
      mc.innerHTML = '<div class="loading" style="color:#f87171">⚠ No classes or terms found.</div>'; return;
    }
    const classOpts = classes.map(c => {
      const sec=(c.section||c.level||'').toUpperCase();
      return `<option value="${c.id}">${c.name}${sec ? ' — '+sec : ''}</option>`;
    }).join('');
    const termOpts = terms.map(t => {
      const label = t.academic_years?.label ? `${t.name} — ${t.academic_years.label}` : t.name;
      return `<option value="${t.id}"${t.is_current?' selected':''}>${label}</option>`;
    }).join('');
    mc.innerHTML = `
      <div style="max-width:560px;margin:40px auto;background:rgba(255,255,255,.06);border:1px solid rgba(74,222,128,.2);border-radius:12px;padding:32px;">
        <h2 style="font-family:'Cinzel',serif;color:#4ade80;font-size:18px;margin-bottom:6px">📜 Generate Testimonial</h2>
        <p style="font-size:13px;color:#aaa;margin-bottom:24px">Select a class and term, then choose a student to generate their testimonial / leaving certificate.</p>
        <label style="display:block;font-size:12px;color:#4ade80;margin-bottom:6px">Class</label>
        <select id="pickerClass" style="width:100%;padding:10px;border-radius:7px;border:1px solid #333;background:#0a1f0a;color:white;font-size:13px;margin-bottom:14px">${classOpts}</select>
        <label style="display:block;font-size:12px;color:#4ade80;margin-bottom:6px">Term</label>
        <select id="pickerTerm" style="width:100%;padding:10px;border-radius:7px;border:1px solid #333;background:#0a1f0a;color:white;font-size:13px;margin-bottom:14px">${termOpts}</select>
        <label style="display:block;font-size:12px;color:#4ade80;margin-bottom:6px">Student</label>
        <select id="pickerStudent" style="width:100%;padding:10px;border-radius:7px;border:1px solid #333;background:#0a1f0a;color:white;font-size:13px;margin-bottom:20px"><option value="">-- Select class and term first --</option></select>
        <button onclick="pickerLoadStudents()" style="padding:9px 20px;background:rgba(74,222,128,.15);color:#4ade80;border:1px solid #4ade80;border-radius:7px;cursor:pointer;font-size:13px;margin-bottom:10px;margin-right:10px">Load Students</button>
        <button onclick="pickerGo('testimonial')" style="padding:9px 22px;background:linear-gradient(135deg,#166534,#4ade80);color:#0a1f0a;border:none;border-radius:7px;cursor:pointer;font-weight:700;font-size:13px">Generate →</button>
      </div>`;
  } catch(e) {
    mc.innerHTML = `<div class="loading" style="color:#f87171">⚠ Error: ${e.message}</div>`;
  }
}
async function pickerLoadStudents() {
  const classId = document.getElementById('pickerClass')?.value;
  const termId  = document.getElementById('pickerTerm')?.value;
  const sel     = document.getElementById('pickerStudent');
  if (!classId || !termId || !sel) return;
  sel.innerHTML = '<option>Loading…</option>';
  const {data:enr} = await db.from('enrollments').select('student_id').eq('class_id',classId).eq('term_id',termId);
  if (!enr?.length) {
    const {data:enr2} = await db.from('enrollments').select('student_id').eq('class_id',classId);
    if (!enr2?.length) { sel.innerHTML='<option>No students enrolled</option>'; return; }
    const ids = enr2.map(e=>e.student_id);
    const {data:studs} = await db.from('students').select('id,full_name,admission_no').in('id',ids).order('full_name');
    sel.innerHTML = (studs||[]).map(s=>`<option value="${s.id}">${s.full_name}${s.admission_no?' ('+s.admission_no+')':''}</option>`).join('');
    return;
  }
  const ids = enr.map(e=>e.student_id);
  const {data:studs} = await db.from('students').select('id,full_name,admission_no').in('id',ids).order('full_name');
  sel.innerHTML = (studs||[]).map(s=>`<option value="${s.id}">${s.full_name}${s.admission_no?' ('+s.admission_no+')':''}</option>`).join('');
}
function pickerGo(pageType) {
  const studentId = document.getElementById('pickerStudent')?.value;
  const termId    = document.getElementById('pickerTerm')?.value;
  if (!studentId || !termId) { alert('Please select a student and term.'); return; }
  const target = pageType === 'certificate' ? 'certificate.html' : 'testimonial.html';
  location.href = `${target}?student_id=${encodeURIComponent(studentId)}&term_id=${encodeURIComponent(termId)}`;
}

window.addEventListener('DOMContentLoaded', () => {
  if (!STUDENT_ID || !TERM_ID) {
    document.getElementById('modalBg').style.display = 'none';
    document.getElementById('ctrlBar').style.display = 'flex';
    showStudentPicker('testimonial');
  }
});
