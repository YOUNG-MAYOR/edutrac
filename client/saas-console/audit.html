<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTrack NG — Audit Log</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <style>
    :root { --primary: #6d28d9; --primary-light: #ede9fe; --primary-dark: #5b21b6; }
    .log-row { display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--border); }
    .log-row:last-child { border-bottom:none; }
    .log-icon { width:38px;height:38px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0; }
    .log-action { font-size:14px;font-weight:600;color:var(--ink); }
    .log-meta { font-size:12px;color:var(--ink-3);margin-top:3px; }
    .log-time { font-size:11px;color:var(--ink-3);margin-left:auto;flex-shrink:0;padding-top:2px; }
    .action-tag { display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700; }
    .action-tag.school_created    { background:#dcfce7;color:#166534; }
    .action-tag.plan_changed      { background:#dbeafe;color:#1e40af; }
    .action-tag.school_suspended  { background:#fee2e2;color:#991b1b; }
    .action-tag.school_activated  { background:#d1fae5;color:#065f46; }
    .action-tag.user_created      { background:#fef9c3;color:#854d0e; }
    .action-tag.default           { background:#f1f5f9;color:#64748b; }
    .filter-bar { display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center; }
    .filter-bar input, .filter-bar select { font-size:14px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:white;color:var(--ink); }
    .filter-bar input { flex:1;min-width:180px; }
    .empty-audit { text-align:center;padding:48px;color:var(--ink-3); }
    .empty-audit__icon { font-size:48px;margin-bottom:12px; }
    .empty-audit p { font-size:14px; }
    .empty-audit small { font-size:12px;opacity:.7; }
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>
<script src="../js/layout.js"></script>
<script>
let allLogs = [];

const ACTION_ICONS = {
  school_created:   '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg></span>',
  plan_changed:     '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></span>',
  school_suspended: '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg></span>',
  school_activated: '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>',
  user_created:     '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>',
};
const ACTION_LABELS = {
  school_created:   'New school registered',
  plan_changed:     'Subscription plan changed',
  school_suspended: 'School suspended',
  school_activated: 'School reactivated',
  user_created:     'New platform user created',
};

(async () => {
  const user = await initSaasLayout('audit', 'Audit Log');
  if (!user) return;
  const body = document.getElementById('pageBody');

  body.innerHTML = `
    <div class="page-header">
      <h1>Audit Log</h1>
      <p style="color:var(--ink-3)">A record of all actions taken on the EduTrack NG platform</p>
    </div>

    <div class="filter-bar">
      <input type="search" id="searchInput" placeholder="<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>  Search actions, schools…" oninput="renderLogs()">
      <select id="actionFilter" onchange="renderLogs()">
        <option value="">All Actions</option>
        <option value="school_created">School Created</option>
        <option value="plan_changed">Plan Changed</option>
        <option value="school_suspended">School Suspended</option>
        <option value="school_activated">School Activated</option>
        <option value="user_created">User Created</option>
      </select>
      <select id="dateFilter" onchange="renderLogs()">
        <option value="">All Time</option>
        <option value="today">Today</option>
        <option value="week">This Week</option>
        <option value="month">This Month</option>
      </select>
      <button class="btn btn--ghost btn--sm" onclick="exportCSV()">⬇ Export CSV</button>
    </div>

    <div class="card" id="logCard">
      <div class="et-loader"><div class="et-spinner"></div></div>
    </div>
  `;

  const { data: logs, error } = await db.from('saas_audit_log')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(500);

  if (error) { document.getElementById('logCard').innerHTML = `<div class="et-empty"><div class="et-empty__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>️</div><p>Failed to load audit log</p></div>`; return; }
  allLogs = logs || [];
  renderLogs();
})();

function renderLogs() {
  const q      = document.getElementById('searchInput').value.toLowerCase();
  const action = document.getElementById('actionFilter').value;
  const dateF  = document.getElementById('dateFilter').value;
  const now    = new Date();

  const filtered = allLogs.filter(log => {
    const metaStr = JSON.stringify(log.meta || {}).toLowerCase();
    const matchQ  = !q || [log.action, metaStr].some(v => v.includes(q));
    const matchA  = !action || log.action === action;
    const d       = new Date(log.created_at);
    let matchD    = true;
    if (dateF === 'today') {
      matchD = d.toDateString() === now.toDateString();
    } else if (dateF === 'week') {
      const weekAgo = new Date(now); weekAgo.setDate(weekAgo.getDate() - 7);
      matchD = d >= weekAgo;
    } else if (dateF === 'month') {
      matchD = d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    }
    return matchQ && matchA && matchD;
  });

  const card = document.getElementById('logCard');
  if (!allLogs.length) {
    card.innerHTML = `
      <div class="empty-audit">
        <div class="empty-audit__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg></span></div>
        <p>No audit entries yet</p>
        <small>Actions you take — suspending schools, changing plans, creating users — will appear here automatically.</small>
      </div>
    `;
    return;
  }

  if (!filtered.length) {
    card.innerHTML = `<div class="et-empty"><div class="et-empty__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span></div><p>No logs match your filters</p></div>`;
    return;
  }

  // Group by date
  const groups = {};
  filtered.forEach(log => {
    const dateKey = new Date(log.created_at).toDateString();
    if (!groups[dateKey]) groups[dateKey] = [];
    groups[dateKey].push(log);
  });

  let html = '';
  Object.entries(groups).forEach(([dateKey, logs]) => {
    const d = new Date(dateKey);
    const label = d.toDateString() === new Date().toDateString()
      ? 'Today'
      : d.toLocaleDateString('en-NG', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    html += `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-3);padding:12px 0 6px">${label}</div>`;
    html += logs.map(log => {
      const icon  = ACTION_ICONS[log.action]  || '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg></span>';
      const label = ACTION_LABELS[log.action] || log.action;
      const meta  = log.meta || {};
      const metaSummary = formatMeta(log.action, meta);
      const tagClass = Object.keys(ACTION_ICONS).includes(log.action) ? log.action : 'default';
      const time = new Date(log.created_at).toLocaleTimeString('en-NG', { hour:'2-digit', minute:'2-digit' });
      return `
        <div class="log-row">
          <div class="log-icon">${icon}</div>
          <div style="flex:1;min-width:0">
            <div class="log-action">${label}</div>
            <div class="log-meta">${metaSummary}</div>
            <span class="action-tag ${tagClass}" style="margin-top:4px">${log.action.replace(/_/g,' ')}</span>
          </div>
          <div class="log-time">${time}</div>
        </div>
      `;
    }).join('');
  });

  card.innerHTML = html;
}

function formatMeta(action, meta) {
  if (!meta || !Object.keys(meta).length) return '—';
  if (action === 'plan_changed')     return `${meta.name || 'School'}: ${meta.old_plan} → ${meta.new_plan}`;
  if (action === 'school_created')   return `${meta.name || 'New school'} · Plan: ${meta.plan || 'free'}`;
  if (action === 'school_suspended') return `${meta.name || 'School'} suspended`;
  if (action === 'school_activated') return `${meta.name || 'School'} reactivated`;
  if (action === 'user_created')     return `${meta.name || 'User'} · Role: ${meta.role || '—'}`;
  // Fallback: show meta as readable text
  return Object.entries(meta).map(([k,v]) => `${k}: ${v}`).join(' · ');
}

function exportCSV() {
  if (!allLogs.length) { toast('No logs to export', 'error'); return; }
  const rows = [['Date','Action','Details','Target ID']];
  allLogs.forEach(log => {
    rows.push([
      new Date(log.created_at).toISOString(),
      log.action,
      formatMeta(log.action, log.meta || {}),
      log.target_id || ''
    ]);
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `edutrack-audit-${Date.now()}.csv`;
  a.click(); URL.revokeObjectURL(url);
  toast('CSV exported');
}
</script>

<script src="../js/ai-assistant.js" defer></script>
</body>
</html>
