<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTrack NG — Card History</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <style>
    .school-card { cursor:pointer; transition:all .15s; }
    .school-card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.1); }
    .batch-row { display:flex; align-items:center; gap:12px; padding:11px 16px;
      border-bottom:1px solid var(--border); flex-wrap:wrap; }
    .batch-row:last-child { border-bottom:none; }
    .batch-name { flex:1; font-size:14px; font-weight:700; }
    .batch-meta { font-size:12px; color:var(--ink-3); }
    .pill { display:inline-block; padding:2px 10px; border-radius:100px; font-size:11px; font-weight:700; }
    .pill-green  { background:#dcfce7; color:#166534; }
    .pill-amber  { background:#fef3c7; color:#92400e; }
    .pill-gray   { background:#f3f4f6; color:#374151; }
    @media print {
      .no-print { display:none!important; }
      @page { margin:15mm; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../js/config.js"></script>
<script src="../api/database.js"></script>
<script src="../api/auth.js"></script>
<script src="../api/calculations.js"></script>
<script src="../assets/js/sidebar.js"></script>
<script>
let user, schools = [], allCards = [], selectedSchool = null;

(async () => {
  user = await initPage(['saas_owner'], 'Card History', 'card-history');
  if (!user) return;
  document.getElementById('topbarActions').innerHTML =
    `<button class="btn btn--secondary no-print" onclick="window.print()"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg></span> Print Report</button>`;

  const [{ data: sc }, { data: cards }] = await Promise.all([
    db.from('schools').select('id,name,lga,state,logo_url').eq('is_active', true).order('name'),
    db.from('scratch_cards').select('id,school_id,pin,batch_id,is_used,used_at,uses_count,max_uses,created_at,student_id').order('created_at', { ascending: false })
  ]);
  schools = sc || [];
  allCards = cards || [];
  renderPage();
})();

function renderPage() {
  const bySchool = {};
  schools.forEach(s => { bySchool[s.id] = { ...s, total: 0, expired: 0, partial: 0, batches: {} }; });
  allCards.forEach(c => {
    if (!bySchool[c.school_id]) return;
    bySchool[c.school_id].total++;
    const maxU  = c.max_uses   ?? 5;
    const usedU = c.uses_count ?? 0;
    const isExpired = c.is_used || usedU >= maxU;
    const isPartial = !isExpired && usedU > 0;
    if (isExpired) bySchool[c.school_id].expired++;
    else if (isPartial) bySchool[c.school_id].partial++;
    const b = c.batch_id || 'Ungrouped';
    if (!bySchool[c.school_id].batches[b])
      bySchool[c.school_id].batches[b] = { name: b, total: 0, expired: 0, partial: 0, date: c.created_at, cards: [] };
    bySchool[c.school_id].batches[b].total++;
    if (isExpired) bySchool[c.school_id].batches[b].expired++;
    else if (isPartial) bySchool[c.school_id].batches[b].partial++;
    bySchool[c.school_id].batches[b].cards.push(c);
  });

  const schoolList = Object.values(bySchool).sort((a, b) => b.total - a.total);
  const grandTotal   = allCards.length;
  const grandExpired = allCards.filter(c => c.is_used || (c.uses_count ?? 0) >= (c.max_uses ?? 5)).length;
  const grandPartial = allCards.filter(c => !c.is_used && (c.uses_count ?? 0) > 0 && (c.uses_count ?? 0) < (c.max_uses ?? 5)).length;
  const grandUnused  = grandTotal - grandExpired - grandPartial;

  document.getElementById('pageBody').innerHTML = `
    <div class="page-header"><h1><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/><line x1="9" y1="12" x2="15" y2="12"/></svg></span> Scratch Card History</h1><p>All batches ever generated — per school</p></div>

    <!-- Platform totals -->
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:24px;">
      <div class="card" style="text-align:center;padding:18px;">
        <div style="font-size:26px;font-weight:800;color:var(--primary);">${schools.length}</div>
        <div style="font-size:11px;color:var(--ink-3);margin-top:2px;">Schools</div>
      </div>
      <div class="card" style="text-align:center;padding:18px;">
        <div style="font-size:26px;font-weight:800;color:var(--primary);">${grandTotal.toLocaleString()}</div>
        <div style="font-size:11px;color:var(--ink-3);margin-top:2px;">Total Cards</div>
      </div>
      <div class="card" style="text-align:center;padding:18px;">
        <div style="font-size:26px;font-weight:800;color:var(--success);">${grandUnused.toLocaleString()}</div>
        <div style="font-size:11px;color:var(--ink-3);margin-top:2px;">Unused</div>
      </div>
      <div class="card" style="text-align:center;padding:18px;">
        <div style="font-size:26px;font-weight:800;color:var(--info);">${grandPartial.toLocaleString()}</div>
        <div style="font-size:11px;color:var(--ink-3);margin-top:2px;">In Use</div>
      </div>
      <div class="card" style="text-align:center;padding:18px;">
        <div style="font-size:26px;font-weight:800;color:var(--warning);">${grandExpired.toLocaleString()}</div>
        <div style="font-size:11px;color:var(--ink-3);margin-top:2px;">Expired</div>
      </div>
    </div>

    <!-- Search -->
    <div class="filter-bar no-print" style="margin-bottom:16px;">
      <input type="text" class="form-control" id="schoolSearch" placeholder="Search school…"
        oninput="filterSchools()" style="max-width:300px;">
    </div>

    <!-- School cards -->
    <div id="schoolGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;">
      ${schoolList.map(s => renderSchoolCard(s, bySchool)).join('')}
    </div>

    <!-- Batch detail panel -->
    <div id="batchPanel" style="display:none;margin-top:24px;"></div>
  `;
}

function renderSchoolCard(s, bySchool) {
  const unused  = s.total - (s.expired || 0) - (s.partial || 0);
  const pct     = s.total > 0 ? Math.round((s.expired || 0) / s.total * 100) : 0;
  const batchCount = Object.keys(s.batches).length;
  return `
    <div class="card school-card" onclick="showBatches('${s.id}')">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
        <div style="width:42px;height:42px;border-radius:10px;background:var(--primary-light);
          display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;flex-shrink:0;">
          ${s.logo_url ? `<img src="${s.logo_url}" style="width:100%;height:100%;object-fit:cover;">` : '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg></span>'}
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${s.name}</div>
          <div style="font-size:11px;color:var(--ink-3);">${[s.lga, s.state].filter(Boolean).join(', ') || 'Nigeria'}</div>
        </div>
        <span class="pill ${unused > 0 ? 'pill-green' : 'pill-gray'}">${unused > 0 ? unused + ' unused' : 'Exhausted'}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--ink-3);margin-bottom:8px;">
        <span>Total: <strong style="color:var(--ink);">${s.total}</strong></span>
        <span style="color:var(--info);">In use: <strong>${s.partial || 0}</strong></span>
        <span style="color:var(--warning);">Expired: <strong>${s.expired || 0}</strong></span>
        <span>Batches: <strong style="color:var(--ink);">${batchCount}</strong></span>
      </div>
      <div class="progress-bar"><div class="progress-bar__fill ${pct>80?'danger':pct>50?'warn':''}" style="width:${pct}%;"></div></div>
      <div style="text-align:right;font-size:10px;color:var(--ink-3);margin-top:4px;">${pct}% expired</div>
      <div style="text-align:center;margin-top:10px;">
        <span style="font-size:11px;color:var(--primary);font-weight:600;">Click to view batches →</span>
      </div>
    </div>
  `;
}

function filterSchools() {
  const q = document.getElementById('schoolSearch')?.value?.toLowerCase() || '';
  document.querySelectorAll('#schoolGrid .card').forEach(el => {
    const name = el.querySelector('[style*="font-weight:700"]')?.textContent?.toLowerCase() || '';
    el.style.display = name.includes(q) ? '' : 'none';
  });
}

function showBatches(schoolId) {
  const bySchool = {};
  schools.forEach(s => { bySchool[s.id] = { ...s, total: 0, expired: 0, partial: 0, batches: {} }; });
  allCards.forEach(c => {
    if (!bySchool[c.school_id]) return;
    bySchool[c.school_id].total++;
    const maxU  = c.max_uses   ?? 5;
    const usedU = c.uses_count ?? 0;
    const isExpired = c.is_used || usedU >= maxU;
    const isPartial = !isExpired && usedU > 0;
    if (isExpired) bySchool[c.school_id].expired++;
    else if (isPartial) bySchool[c.school_id].partial++;
    const b = c.batch_id || 'Ungrouped';
    if (!bySchool[c.school_id].batches[b])
      bySchool[c.school_id].batches[b] = { name: b, total: 0, expired: 0, partial: 0, date: c.created_at, cards: [] };
    bySchool[c.school_id].batches[b].total++;
    if (isExpired) bySchool[c.school_id].batches[b].expired++;
    else if (isPartial) bySchool[c.school_id].batches[b].partial++;
    bySchool[c.school_id].batches[b].cards.push(c);
  });

  const s = bySchool[schoolId];
  if (!s) return;
  const batches = Object.values(s.batches).sort((a, b) => new Date(b.date) - new Date(a.date));
  const panel = document.getElementById('batchPanel');
  panel.style.display = '';
  panel.innerHTML = `
    <div class="card">
      <div class="card__header">
        <span class="card__title"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span> Batches — ${s.name}</span>
        <button class="btn btn--ghost btn--sm" onclick="document.getElementById('batchPanel').style.display='none'"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span> Close</button>
      </div>
      <div style="padding:0 16px 8px;">
        ${batches.map(b => {
          const unused = b.total - b.expired - b.partial;
          return `
          <div class="batch-row">
            <div style="flex:1;">
              <div class="batch-name">${b.name}</div>
              <div class="batch-meta">${new Date(b.date).toLocaleDateString('en-NG',{day:'numeric',month:'short',year:'numeric'})}</div>
            </div>
            <span class="pill pill-gray">${b.total} cards</span>
            <span class="pill pill-green">${unused} unused</span>
            <span class="pill" style="background:#dbeafe;color:#1e40af;">${b.partial} in use</span>
            <span class="pill pill-amber">${b.expired} expired</span>
            <div style="display:flex;gap:6px;">
              <button class="btn btn--secondary btn--sm no-print" onclick="resendBatch('${schoolId}','${b.name.replace(/'/g,"\\'")}')"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></span> Resend</button>
              <button class="btn btn--ghost btn--sm no-print" onclick="printBatchPins('${schoolId}','${b.name.replace(/'/g,"\\'")}')"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg></span> Print</button>
            </div>
          </div>
        `}).join('')}
      </div>
    </div>
  `;
  panel.scrollIntoView({ behavior: 'smooth' });
}

function resendBatch(schoolId, batchName) {
  const batchCards = allCards.filter(c => c.school_id === schoolId && (c.batch_id || 'Ungrouped') === batchName);
  const school = schools.find(s => s.id === schoolId);
  const pins = batchCards.map((c, i) => {
    const maxU  = c.max_uses   ?? 5;
    const usedU = c.uses_count ?? 0;
    const isExpired = c.is_used || usedU >= maxU;
    const status = isExpired ? '[EXPIRED]' : usedU > 0 ? `[IN USE — ${usedU}/${maxU}]` : '[UNUSED]';
    return `${String(i+1).padStart(3,'0')}. ${formatPin(c.pin)}  ${status}`;
  }).join('\n');
  const msg = `EduTrack NG — Scratch Card PINs\nSchool: ${school?.name}\nBatch: ${batchName}\nGenerated: ${batchCards.length} cards\n\n${pins}\n\nHow to use:\n1. Visit your school result portal\n2. Enter Admission No. and PIN\n3. Each PIN is valid for 5 checks — one student & term only`;
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;';
  modal.innerHTML = `
    <div style="background:white;border-radius:12px;padding:24px;max-width:560px;width:100%;max-height:80vh;display:flex;flex-direction:column;gap:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <strong style="font-size:16px;"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></span> Resend: ${batchName}</strong>
        <button onclick="this.closest('[style*=fixed]').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span></button>
      </div>
      <p style="font-size:13px;color:#666;">Copy these PINs and share via SMS, WhatsApp, or email with the school admin.</p>
      <textarea style="flex:1;min-height:240px;font-family:monospace;font-size:12px;padding:12px;border:1.5px solid #ddd;border-radius:8px;resize:none;">${msg}</textarea>
      <div style="display:flex;gap:8px;">
        <button class="btn btn--primary" style="flex:1;" onclick="navigator.clipboard.writeText(this.closest('[style*=fixed]').querySelector('textarea').value).then(()=>toast('Copied!'))"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg></span> Copy All</button>
        <button class="btn btn--secondary" onclick="this.closest('[style*=fixed]').remove()">Close</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function formatPin(pin) {
  if (!pin) return '—';
  return pin.length === 10 ? pin.slice(0,4)+' '+pin.slice(4,7)+' '+pin.slice(7) : pin.match(/.{1,4}/g).join(' ');
}

function printBatchPins(schoolId, batchName) {
  const batchCards = allCards.filter(c => c.school_id === schoolId && (c.batch_id || 'Ungrouped') === batchName);
  const school = schools.find(s => s.id === schoolId);
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
    body{font-family:Arial,sans-serif;padding:20mm;font-size:12px;}
    h2{font-size:16px;margin-bottom:4px;}h3{font-size:13px;color:#555;margin-bottom:16px;font-weight:normal;}
    table{width:100%;border-collapse:collapse;}
    th{background:#1a2e6e;color:white;padding:8px 10px;text-align:left;font-size:11px;}
    td{padding:7px 10px;border-bottom:1px solid #eee;font-size:11px;}
    .used{color:#dc2626;font-weight:700;}.avail{color:#166534;font-weight:700;}.partial{color:#d97706;font-weight:700;}
    @page{margin:15mm;}
  </style></head><body>
    <h2>${school?.name} — Scratch Card PINs</h2>
    <h3>Batch: ${batchName} · ${batchCards.length} cards · Printed ${new Date().toLocaleDateString('en-NG')}</h3>
    <table>
      <thead><tr><th>#</th><th>PIN</th><th>Checks Used</th><th>Status</th><th>Last Used</th></tr></thead>
      <tbody>
        ${batchCards.map((c,i) => {
          const maxU  = c.max_uses   ?? 5;
          const usedU = c.uses_count ?? 0;
          const isExpired = c.is_used || usedU >= maxU;
          const statusLabel = isExpired ? 'EXPIRED' : usedU > 0 ? 'IN USE' : 'UNUSED';
          const statusClass = isExpired ? 'used' : usedU > 0 ? 'partial' : 'avail';
          return `
          <tr>
            <td>${i+1}</td>
            <td style="font-family:monospace;font-size:13px;font-weight:700;letter-spacing:2px;">${formatPin(c.pin)}</td>
            <td style="text-align:center;">${usedU} / ${maxU}</td>
            <td class="${statusClass}">${statusLabel}</td>
            <td>${c.used_at ? new Date(c.used_at).toLocaleDateString('en-NG') : '—'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  
<script src="../js/ai-assistant.js" defer></script>
</body></html>`;
  const blob = new Blob([html], { type:'text/html' });
  const url  = URL.createObjectURL(blob);
  const w    = window.open(url, '_blank', 'width=900,height=700');
  setTimeout(() => { w?.print(); URL.revokeObjectURL(url); }, 600);
}
</script>
</body>
</html>
