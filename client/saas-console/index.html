<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTrack NG — Platform Dashboard</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <style>
    :root { --primary: #6d28d9; --primary-light: #ede9fe; --primary-dark: #5b21b6; }
    .saas-badge { background:#6d28d9;color:#fff;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px; }
    .school-row-link { color: var(--primary); text-decoration:none; font-weight:600; }
    .school-row-link:hover { text-decoration: underline; }
    .plan-chip { padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase; }
    .plan-chip.free    { background:#f1f5f9;color:#64748b; }
    .plan-chip.basic   { background:#dbeafe;color:#1d4ed8; }
    .plan-chip.pro     { background:#ede9fe;color:#6d28d9; }
    .status-dot { width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px; }
    .status-dot.active   { background:#10b981; }
    .status-dot.inactive { background:#ef4444; }
    .growth-badge { font-size:12px;font-weight:700;padding:2px 7px;border-radius:20px; }
    .growth-badge.up   { background:#d1fae5;color:#065f46; }
    .growth-badge.down { background:#fee2e2;color:#991b1b; }
    .metric-trend { font-size:12px;color:var(--ink-3);margin-top:4px; }
    .saas-header-banner {
      background: linear-gradient(135deg, #6d28d9 0%, #4f46e5 100%);
      border-radius: var(--radius);
      padding: 24px 28px;
      color: white;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .saas-header-banner h2 { font-size:22px;margin:0 0 4px; }
    .saas-header-banner p  { margin:0;opacity:.85;font-size:14px; }
    .banner-stats { display:flex;gap:24px;flex-wrap:wrap; }
    .banner-stat { text-align:center; }
    .banner-stat__value { font-size:28px;font-weight:800;line-height:1; }
    .banner-stat__label { font-size:11px;opacity:.8;text-transform:uppercase;letter-spacing:.5px; }
    .activity-item { display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border); }
    .activity-item:last-child { border-bottom:none; }
    .activity-icon { width:36px;height:36px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0; }
    .activity-meta { font-size:12px;color:var(--ink-3);margin-top:2px; }
    .revenue-bar-wrap { display:flex;align-items:center;gap:10px;margin-bottom:10px; }
    .revenue-bar-label { font-size:12px;color:var(--ink-2);width:60px;flex-shrink:0; }
    .revenue-bar-track { flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden; }
    .revenue-bar-fill  { height:8px;border-radius:4px;background:linear-gradient(90deg,#6d28d9,#818cf8); }
    .revenue-bar-val   { font-size:12px;font-weight:700;color:var(--ink-2);width:70px;text-align:right;flex-shrink:0; }
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>
<script src="../js/layout.js"></script>
<script>
(async () => {
  const user = await initSaasLayout('dashboard', 'Platform Overview');
  if (!user) return;
  const body = document.getElementById('pageBody');

  body.innerHTML = `
    <div class="saas-header-banner">
      <div>
        <h2><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></span> EduTrack NG Platform</h2>
        <p>Real-time overview of all schools on your platform</p>
      </div>
      <div class="banner-stats" id="bannerStats">
        <div class="banner-stat"><div class="banner-stat__value" id="bTotal">—</div><div class="banner-stat__label">Total Schools</div></div>
        <div class="banner-stat"><div class="banner-stat__value" id="bActive">—</div><div class="banner-stat__label">Active</div></div>
        <div class="banner-stat"><div class="banner-stat__value" id="bPro">—</div><div class="banner-stat__label">Pro Plan</div></div>
      </div>
    </div>

    <div class="stat-grid" id="statGrid">
      ${[1,2,3,4].map(()=>`<div class="stat-card"><div class="et-spinner" style="margin:auto"></div></div>`).join('')}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;" id="midGrid">
      <div class="card" id="recentSchools">
        <div class="card__header"><span class="card__title">Recently Joined Schools</span><a href="schools.html" class="btn btn--ghost btn--sm">All Schools →</a></div>
        <div class="et-loader"><div class="et-spinner"></div></div>
      </div>
      <div class="card" id="planBreakdown">
        <div class="card__header"><span class="card__title">Revenue by Plan</span></div>
        <div class="et-loader"><div class="et-spinner"></div></div>
      </div>
    </div>

    <div class="card" id="recentActivity">
      <div class="card__header"><span class="card__title">Recent Platform Activity</span><a href="audit.html" class="btn btn--ghost btn--sm">Full Log →</a></div>
      <div class="et-loader"><div class="et-spinner"></div></div>
    </div>
  `;

  if (window.innerWidth < 768) document.getElementById('midGrid').style.gridTemplateColumns = '1fr';

  // Fetch platform-wide data
  const [schoolsRes, usersRes, studentsRes, paymentsRes] = await Promise.all([
    db.from('schools').select('*').order('created_at', { ascending: false }),
    db.from('users').select('id, role, school_id, created_at'),
    db.from('students').select('id', { count: 'exact', head: true }),
    db.from('payments').select('amount_paid, created_at'),
  ]);

  const schools   = schoolsRes.data   || [];
  const users     = usersRes.data     || [];
  const payments  = paymentsRes.data  || [];

  const totalSchools = schools.length;
  const activeSchools = schools.filter(s => s.is_active).length;
  const proSchools    = schools.filter(s => s.plan === 'pro').length;
  const totalStudents = studentsRes.count ?? 0;
  const totalRevenue  = payments.reduce((s, p) => s + Number(p.amount_paid), 0);
  const totalUsers    = users.length;

  // Banner
  document.getElementById('bTotal').textContent = totalSchools;
  document.getElementById('bActive').textContent = activeSchools;
  document.getElementById('bPro').textContent = proSchools;

  // This month
  const now = new Date();
  const thisMonth = now.getMonth();
  const thisYear  = now.getFullYear();
  const newSchoolsThisMonth = schools.filter(s => {
    const d = new Date(s.created_at);
    return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
  }).length;
  const revenueThisMonth = payments.filter(p => {
    const d = new Date(p.created_at);
    return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
  }).reduce((s, p) => s + Number(p.amount_paid), 0);

  document.getElementById('statGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-card__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg></span></div>
      <div class="stat-card__value" style="color:#6d28d9">${totalSchools}</div>
      <div class="stat-card__label">Total Schools</div>
      <div class="metric-trend">+${newSchoolsThisMonth} this month</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></span></div>
      <div class="stat-card__value" style="color:var(--info)">${totalStudents.toLocaleString()}</div>
      <div class="stat-card__label">Total Students</div>
      <div class="metric-trend">Across all schools</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span></div>
      <div class="stat-card__value" style="color:var(--success)">${totalUsers.toLocaleString()}</div>
      <div class="stat-card__label">Platform Users</div>
      <div class="metric-trend">Admins, Teachers, Parents</div>
    </div>
    <div class="stat-card">
      <div class="stat-card__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span></div>
      <div class="stat-card__value" style="color:var(--success);font-size:18px">${formatMoney(revenueThisMonth)}</div>
      <div class="stat-card__label">Revenue This Month</div>
      <div class="metric-trend">Total: ${formatMoney(totalRevenue)}</div>
    </div>
  `;

  // Recent schools
  const recent = schools.slice(0, 6);
  document.getElementById('recentSchools').innerHTML = `
    <div class="card__header">
      <span class="card__title">Recently Joined Schools</span>
      <a href="schools.html" class="btn btn--ghost btn--sm">All →</a>
    </div>
    <div class="table-wrap" style="border:none">
      <table>
        <tbody>
          ${recent.map(s => `
            <tr>
              <td>
                <a href="schools.html?id=${s.id}" class="school-row-link">${s.name}</a>
                <div style="font-size:11px;color:var(--ink-3)">${s.state || ''}${s.lga ? ' · ' + s.lga : ''}</div>
              </td>
              <td><span class="plan-chip ${s.plan}">${s.plan}</span></td>
              <td>
                <span class="status-dot ${s.is_active ? 'active' : 'inactive'}"></span>
                <span style="font-size:12px">${s.is_active ? 'Active' : 'Suspended'}</span>
              </td>
              <td style="font-size:11px;color:var(--ink-3)">${formatDate(s.created_at)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;

  // Plan breakdown
  const planCounts = { free: 0, basic: 0, pro: 0 };
  const planRevenue = { free: 0, basic: 0, pro: 0 };
  const PLAN_PRICE = { free: 0, basic: 15000, pro: 35000 };
  schools.forEach(s => {
    planCounts[s.plan] = (planCounts[s.plan] || 0) + 1;
    planRevenue[s.plan] = (planRevenue[s.plan] || 0) + (PLAN_PRICE[s.plan] || 0);
  });
  const maxRevenue = Math.max(...Object.values(planRevenue), 1);

  document.getElementById('planBreakdown').innerHTML = `
    <div class="card__header"><span class="card__title">Revenue by Plan</span></div>
    <div style="margin-bottom:20px;">
      ${['pro','basic','free'].map(plan => `
        <div class="revenue-bar-wrap">
          <div class="revenue-bar-label" style="text-transform:capitalize">${plan}</div>
          <div class="revenue-bar-track">
            <div class="revenue-bar-fill" style="width:${Math.round(planRevenue[plan]/maxRevenue*100)}%"></div>
          </div>
          <div class="revenue-bar-val">${formatMoney(planRevenue[plan])}</div>
        </div>
      `).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
      ${['free','basic','pro'].map(plan => `
        <div style="background:var(--bg);padding:10px;border-radius:var(--radius-sm);text-align:center;">
          <div style="font-size:20px;font-weight:800;color:#6d28d9">${planCounts[plan]}</div>
          <div style="font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.5px">${plan}</div>
        </div>
      `).join('')}
    </div>
  `;

  // Recent activity from audit log
  const { data: auditLogs } = await db.from('saas_audit_log')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(8);

  const ACTION_ICONS = {
    school_created: '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg></span>',
    plan_changed: '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></span>',
    school_suspended: '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg></span>',
    school_activated: '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>',
    user_created: '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>',
    default: '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg></span>'
  };
  const ACTION_LABELS = {
    school_created: 'New school registered',
    plan_changed: 'Plan changed',
    school_suspended: 'School suspended',
    school_activated: 'School reactivated',
    user_created: 'New user added',
  };

  document.getElementById('recentActivity').innerHTML = `
    <div class="card__header">
      <span class="card__title">Recent Platform Activity</span>
      <a href="audit.html" class="btn btn--ghost btn--sm">Full Log →</a>
    </div>
    ${auditLogs && auditLogs.length ? auditLogs.map(log => `
      <div class="activity-item">
        <div class="activity-icon">${ACTION_ICONS[log.action] || ACTION_ICONS.default}</div>
        <div>
          <div style="font-size:14px;font-weight:600">${ACTION_LABELS[log.action] || log.action}</div>
          <div class="activity-meta">${log.meta ? JSON.stringify(log.meta).replace(/[{}"]/g,'') : '—'} · ${formatDate(log.created_at)}</div>
        </div>
      </div>
    `).join('') : `
      <div class="et-empty">
        <div class="et-empty__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg></span></div>
        <p>No activity logged yet. Actions you take on schools will appear here.</p>
      </div>
    `}
  `;
})();
</script>

<script src="../js/ai-assistant.js" defer></script>
</body>
</html>
