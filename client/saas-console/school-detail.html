<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTrack NG — School Detail</title>
  <link rel="stylesheet" href="../assets/css/global.css">
  <style>
    :root { --primary: #6d28d9; --primary-light: #ede9fe; --primary-dark: #5b21b6; }
    .btn--purple { background:#6d28d9;color:white;border:none; }
    .btn--purple:hover { background:#5b21b6; }

    /* Hero */
    .school-hero { background:linear-gradient(135deg,#1e1b4b,#4c1d95);border-radius:var(--radius);padding:28px 32px;color:white;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px; }
    .school-hero__avatar { width:64px;height:64px;border-radius:16px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;border:2px solid rgba(255,255,255,.3); }
    .school-hero__info h2 { font-size:22px;margin:0 0 4px; }
    .school-hero__info p  { margin:0;opacity:.8;font-size:13px; }
    .hero-stats { display:flex;gap:24px;flex-wrap:wrap; }
    .hero-stat { text-align:center; }
    .hero-stat__val { font-size:26px;font-weight:800; }
    .hero-stat__lbl { font-size:11px;opacity:.7;text-transform:uppercase;letter-spacing:.4px; }

    /* Tabs */
    .detail-tabs { display:flex;gap:4px;margin-bottom:24px;border-bottom:2px solid var(--border);overflow-x:auto; }
    .dtab { padding:10px 18px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--ink-3);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap; }
    .dtab.active { color:#6d28d9;border-bottom-color:#6d28d9; }

    /* Info rows */
    .info-block { display:grid;grid-template-columns:1fr 1fr;gap:0; }
    .info-row { display:flex;flex-direction:column;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px; }
    .info-row:nth-child(odd)  { padding-right:16px; }
    .info-row:nth-child(even) { padding-left:16px;border-left:1px solid var(--border); }
    .info-label { font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-3);margin-bottom:4px; }
    .info-val { font-weight:600;color:var(--ink); }

    /* Plan */
    .plan-chip { padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase; }
    .plan-chip.free    { background:#f1f5f9;color:#64748b; }
    .plan-chip.basic   { background:#dbeafe;color:#1d4ed8; }
    .plan-chip.pro     { background:#ede9fe;color:#6d28d9; }
    .status-dot { width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px; }
    .status-dot.active   { background:#10b981; }
    .status-dot.inactive { background:#ef4444; }

    /* Progress bar */
    .prog-track { height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin-top:4px; }
    .prog-fill  { height:8px;border-radius:4px;background:linear-gradient(90deg,#6d28d9,#818cf8); }

    /* User list */
    .user-item { display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border); }
    .user-item:last-child { border-bottom:none; }
    .user-avatar { width:36px;height:36px;border-radius:50%;background:#6d28d9;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0; }
    .role-chip { padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;text-transform:capitalize; }
    .role-chip.admin { background:#dcfce7;color:#166534; }
    .role-chip.teacher { background:#dbeafe;color:#1e40af; }
    .role-chip.parent  { background:#fef9c3;color:#854d0e; }

    /* Empty */
    .tab-pane { display:none; }
    .tab-pane.active { display:block; }

    /* Mini chart */
    .mini-bars { display:flex;align-items:flex-end;gap:4px;height:60px;margin-top:8px; }
    .mini-bar  { flex:1;border-radius:3px 3px 0 0;background:linear-gradient(180deg,#818cf8,#6d28d9);min-height:2px; }
    .mini-bar-label { font-size:9px;text-align:center;color:var(--ink-3);margin-top:3px; }
    .danger-zone { border:1.5px solid var(--danger);border-radius:var(--radius);padding:20px;margin-top:8px;background:#fff5f5; }
    .danger-zone__title { font-size:13px;font-weight:700;color:var(--danger);margin-bottom:12px;display:flex;align-items:center;gap:6px; }
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
<script src="../js/config.js"></script>
  <script src="../js/supabase.js"></script>
<script src="../js/layout.js"></script>
<script>
let schoolData = null;
const params = new URLSearchParams(window.location.search);
const schoolId = params.get('id');

(async () => {
  const user = await initSaasLayout('schools', 'School Detail');
  if (!user) return;

  if (!schoolId) {
    document.getElementById('pageBody').innerHTML = `<div class="et-empty"><div class="et-empty__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg></span></div><p>No school selected. <a href="schools.html">Go to All Schools →</a></p></div>`;
    return;
  }

  await loadSchool();
})();

async function loadSchool() {
  const body = document.getElementById('pageBody');
  body.innerHTML = `<div class="et-loader"><div class="et-spinner"></div><p>Loading school data…</p></div>`;

  const [schoolRes, studRes, userRes, termRes, payRes, attRes] = await Promise.all([
    db.from('schools').select('*').eq('id', schoolId).single(),
    db.from('students').select('id, is_active, created_at').eq('school_id', schoolId),
    db.from('users').select('id, full_name, role, phone, is_active, created_at').eq('school_id', schoolId),
    db.from('terms').select('*').eq('school_id', schoolId).order('created_at', { ascending: false }).limit(5),
    db.from('payments').select('amount_paid, created_at').eq('school_id', schoolId),
    db.from('attendance').select('status, date').eq('school_id', schoolId).order('date', { ascending: false }).limit(200),
  ]);

  if (schoolRes.error || !schoolRes.data) {
    body.innerHTML = `<div class="et-empty"><div class="et-empty__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>️</div><p>School not found. <a href="schools.html">← Back</a></p></div>`;
    return;
  }

  schoolData = schoolRes.data;
  const students   = studRes.data  || [];
  const users      = userRes.data  || [];
  const terms      = termRes.data  || [];
  const payments   = payRes.data   || [];
  const attendance = attRes.data   || [];

  const activeStudents = students.filter(s => s.is_active).length;
  const totalRevenue   = payments.reduce((s, p) => s + Number(p.amount_paid), 0);
  const teachers       = users.filter(u => u.role === 'teacher');
  const admins         = users.filter(u => u.role === 'admin');
  const parents        = users.filter(u => u.role === 'parent');
  const currentTerm    = terms.find(t => t.is_current);

  // Attendance rate
  const presentCount = attendance.filter(a => a.status === 'present').length;
  const attRate = attendance.length ? Math.round(presentCount / attendance.length * 100) : null;

  // Monthly payment chart (last 6 months)
  const now = new Date();
  const monthlyPay = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const rev = payments.filter(p => {
      const pd = new Date(p.created_at);
      return pd.getMonth() === d.getMonth() && pd.getFullYear() === d.getFullYear();
    }).reduce((s, p) => s + Number(p.amount_paid), 0);
    monthlyPay.push({ label: d.toLocaleDateString('en-NG', { month: 'short' }), rev });
  }
  const maxPay = Math.max(...monthlyPay.map(m => m.rev), 1);

  // Update page title with school name
  document.querySelector('.topbar__title').textContent = schoolData.name;

  body.innerHTML = `
    <!-- Back link -->
    <div style="margin-bottom:16px">
      <a href="schools.html" style="color:#6d28d9;font-size:13px;text-decoration:none;font-weight:600">← All Schools</a>
    </div>

    <!-- Hero -->
    <div class="school-hero">
      <div style="display:flex;align-items:center;gap:16px">
        <div class="school-hero__avatar">${schoolData.name.charAt(0)}</div>
        <div class="school-hero__info">
          <h2>${schoolData.name}</h2>
          <p>
            ${[schoolData.state, schoolData.lga].filter(Boolean).join(', ') || 'Location not set'}
            &nbsp;·&nbsp;
            <span style="background:rgba(255,255,255,.15);padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700;">${schoolData.plan.toUpperCase()}</span>
            &nbsp;·&nbsp;
            <span style="font-size:12px">${schoolData.is_active ? '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span> Active' : '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg></span> Suspended'}</span>
          </p>
        </div>
      </div>
      <div class="hero-stats">
        <div class="hero-stat"><div class="hero-stat__val">${activeStudents}</div><div class="hero-stat__lbl">Students</div></div>
        <div class="hero-stat"><div class="hero-stat__val">${teachers.length}</div><div class="hero-stat__lbl">Teachers</div></div>
        <div class="hero-stat"><div class="hero-stat__val">${formatMoney(totalRevenue)}</div><div class="hero-stat__lbl">Total Paid</div></div>
        ${attRate !== null ? `<div class="hero-stat"><div class="hero-stat__val">${attRate}%</div><div class="hero-stat__lbl">Att. Rate</div></div>` : ''}
      </div>
    </div>

    <!-- Tabs -->
    <div class="detail-tabs">
      <button class="dtab active" onclick="showTab('overview', this)">Overview</button>
      <button class="dtab"        onclick="showTab('users',    this)">Users (${users.length})</button>
      <button class="dtab"        onclick="showTab('terms',    this)">Terms (${terms.length})</button>
      <button class="dtab"        onclick="showTab('billing',  this)">Billing</button>
      <button class="dtab"        onclick="showTab('settings', this)">Actions</button>
    </div>

    <!-- Overview tab -->
    <div class="tab-pane active" id="tab-overview">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <!-- School info -->
        <div class="card">
          <div class="card__header"><span class="card__title">School Information</span></div>
          <div class="info-block">
            <div class="info-row"><div class="info-label">Phone</div><div class="info-val">${schoolData.phone || '—'}</div></div>
            <div class="info-row"><div class="info-label">Email</div><div class="info-val" style="word-break:break-all">${schoolData.email || '—'}</div></div>
            <div class="info-row"><div class="info-label">Address</div><div class="info-val">${schoolData.address || '—'}</div></div>
            <div class="info-row"><div class="info-label">Motto</div><div class="info-val">${schoolData.motto || '—'}</div></div>
            <div class="info-row"><div class="info-label">Joined</div><div class="info-val">${formatDate(schoolData.created_at)}</div></div>
            <div class="info-row"><div class="info-label">Current Term</div><div class="info-val">${currentTerm ? currentTerm.name : 'Not set'}</div></div>
          </div>
        </div>

        <!-- Stats -->
        <div>
          <div class="card" style="margin-bottom:16px">
            <div class="card__header"><span class="card__title">Student Activity</span></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
              <div style="background:var(--bg);padding:12px;border-radius:var(--radius-sm);text-align:center">
                <div style="font-size:22px;font-weight:800;color:#6d28d9">${activeStudents}</div>
                <div style="font-size:11px;color:var(--ink-3)">Active Students</div>
              </div>
              <div style="background:var(--bg);padding:12px;border-radius:var(--radius-sm);text-align:center">
                <div style="font-size:22px;font-weight:800;color:#6d28d9">${students.length - activeStudents}</div>
                <div style="font-size:11px;color:var(--ink-3)">Inactive / Left</div>
              </div>
            </div>
            ${attRate !== null ? `
              <div style="margin-top:14px">
                <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
                  <span>Attendance Rate</span><strong>${attRate}%</strong>
                </div>
                <div class="prog-track"><div class="prog-fill" style="width:${attRate}%"></div></div>
              </div>
            ` : ''}
          </div>
          <div class="card">
            <div class="card__header"><span class="card__title">Staff Breakdown</span></div>
            ${[
              { label: 'Admins',    count: admins.length,  color: '#10b981' },
              { label: 'Teachers',  count: teachers.length, color: '#3b82f6' },
              { label: 'Parents',   count: parents.length,  color: '#f59e0b' },
            ].map(r => `
              <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px">
                <span style="color:var(--ink-2)">${r.label}</span>
                <span style="font-weight:700;color:${r.color}">${r.count}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      <!-- Revenue mini chart -->
      <div class="card" style="margin-top:20px">
        <div class="card__header"><span class="card__title">Fee Collection — Last 6 Months</span></div>
        <div style="display:flex;align-items:flex-end;gap:8px;height:80px;padding-bottom:4px">
          ${monthlyPay.map(m => `
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
              <div style="font-size:9px;color:var(--ink-3)">${m.rev > 0 ? (m.rev/1000).toFixed(0)+'k' : ''}</div>
              <div style="width:100%;border-radius:3px 3px 0 0;background:linear-gradient(180deg,#818cf8,#6d28d9);min-height:2px;height:${Math.max(2, Math.round(m.rev/maxPay*60))}px"></div>
              <div style="font-size:10px;color:var(--ink-3)">${m.label}</div>
            </div>
          `).join('')}
        </div>
        <div style="margin-top:12px;display:flex;justify-content:space-between;font-size:14px;border-top:1px solid var(--border);padding-top:12px">
          <span style="color:var(--ink-3)">Total Collected</span>
          <strong style="color:var(--success)">${formatMoney(totalRevenue)}</strong>
        </div>
      </div>
    </div>

    <!-- Users tab -->
    <div class="tab-pane" id="tab-users">
      <div class="card">
        <div class="card__header">
          <span class="card__title">All Users (${users.length})</span>
          <div style="display:flex;gap:6px">
            <span style="background:#dcfce7;color:#166534;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700">${admins.length} Admin</span>
            <span style="background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700">${teachers.length} Teacher</span>
            <span style="background:#fef9c3;color:#854d0e;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700">${parents.length} Parent</span>
          </div>
        </div>
        ${users.length ? users.map(u => `
          <div class="user-item">
            <div class="user-avatar">${u.full_name.charAt(0)}</div>
            <div style="flex:1">
              <div style="font-weight:600;font-size:14px">${u.full_name}</div>
              <div style="font-size:12px;color:var(--ink-3)">${u.phone || '—'}</div>
            </div>
            <span class="role-chip ${u.role}">${u.role}</span>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
              <span style="font-size:11px;color:var(--ink-3)">${formatDate(u.created_at)}</span>
              <span class="status-dot ${u.is_active ? 'active' : 'inactive'}" style="width:8px;height:8px"></span>
            </div>
          </div>
        `).join('') : `<div class="et-empty"><div class="et-empty__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span></div><p>No users yet</p></div>`}
      </div>
    </div>

    <!-- Terms tab -->
    <div class="tab-pane" id="tab-terms">
      <div class="card">
        <div class="card__header"><span class="card__title">Academic Terms</span></div>
        ${terms.length ? terms.map(t => `
          <div class="user-item">
            <div style="flex:1">
              <div style="font-weight:600">${t.name}</div>
              <div style="font-size:12px;color:var(--ink-3)">${t.start_date ? formatDate(t.start_date) + ' → ' + formatDate(t.end_date) : 'Dates not set'}</div>
            </div>
            ${t.is_current ? '<span style="background:#dcfce7;color:#166534;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700">Current</span>' : ''}
          </div>
        `).join('') : `<div class="et-empty"><div class="et-empty__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span></div><p>No terms configured yet</p></div>`}
      </div>
    </div>

    <!-- Billing tab -->
    <div class="tab-pane" id="tab-billing">
      <div class="card" style="margin-bottom:16px">
        <div class="card__header"><span class="card__title">Subscription</span></div>
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px">
          <div>
            <div style="font-size:28px;font-weight:800;color:#6d28d9">${schoolData.plan.charAt(0).toUpperCase() + schoolData.plan.slice(1)} Plan</div>
            <div style="font-size:13px;color:var(--ink-3)">Joined ${formatDate(schoolData.created_at)}</div>
          </div>
          <div>
            <label style="font-size:12px;color:var(--ink-3);display:block;margin-bottom:4px">Change Plan</label>
            <select class="form-input" id="planEditSelect" onchange="updatePlan(this.value)" style="font-size:13px;padding:8px 12px;border-color:#6d28d9;color:#6d28d9;font-weight:700">
              <option value="free"  ${schoolData.plan==='free'  ?'selected':''}>Free — ₦0/mo</option>
              <option value="basic" ${schoolData.plan==='basic' ?'selected':''}>Basic — ₦15,000/mo</option>
              <option value="pro"   ${schoolData.plan==='pro'   ?'selected':''}>Pro — ₦35,000/mo</option>
            </select>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
          <div style="background:var(--bg);padding:14px;border-radius:var(--radius-sm);text-align:center">
            <div style="font-size:20px;font-weight:800;color:var(--success)">${formatMoney(totalRevenue)}</div>
            <div style="font-size:11px;color:var(--ink-3)">Total Paid</div>
          </div>
          <div style="background:var(--bg);padding:14px;border-radius:var(--radius-sm);text-align:center">
            <div style="font-size:20px;font-weight:800;color:#6d28d9">${payments.length}</div>
            <div style="font-size:11px;color:var(--ink-3)">Payment Records</div>
          </div>
          <div style="background:var(--bg);padding:14px;border-radius:var(--radius-sm);text-align:center">
            <div style="font-size:20px;font-weight:800;color:var(--info)">${payments.length > 0 ? formatMoney(totalRevenue / payments.length) : '—'}</div>
            <div style="font-size:11px;color:var(--ink-3)">Avg per Payment</div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card__header"><span class="card__title">Recent Payments</span></div>
        ${payments.slice(0, 10).map(p => `
          <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px">
            <span style="color:var(--ink-3)">${formatDate(p.created_at)}</span>
            <strong style="color:var(--success)">${formatMoney(p.amount_paid)}</strong>
          </div>
        `).join('')}
        ${!payments.length ? `<div class="et-empty"><div class="et-empty__icon"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span></div><p>No payment records yet</p></div>` : ''}
      </div>
    </div>

    <!-- Actions tab -->
    <div class="tab-pane" id="tab-settings">
      <div class="card" style="margin-bottom:16px">
        <div class="card__header"><span class="card__title">Quick Actions</span></div>
        <div style="display:flex;flex-direction:column;gap:12px">
          <button class="btn btn--secondary" onclick="impersonateLink()">
            <span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></span> Copy Admin Login Link (Impersonate)
          </button>
          <button class="btn ${schoolData.is_active ? 'btn--danger' : 'btn--success'}"
            onclick="toggleStatus()">
            ${schoolData.is_active ? '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg></span> Suspend School' : '<span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span> Reactivate School'}
          </button>
        </div>
      </div>
      <div class="danger-zone">
        <div class="danger-zone__title"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>️ Danger Zone</div>
        <p style="font-size:13px;color:var(--ink-2);margin-bottom:14px">
          Deleting a school permanently removes ALL data — students, staff, results, payments, everything. This is irreversible.
        </p>
        <button class="btn btn--danger" onclick="deleteSchool()"><span class="icon-svg" style="display:inline-flex;align-items:center;vertical-align:middle;line-height:1;"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></span>️ Permanently Delete School</button>
      </div>
    </div>
  `;

  if (window.innerWidth < 768) {
    document.querySelectorAll('.info-block').forEach(el => el.style.gridTemplateColumns = '1fr');
    document.querySelector('#tab-overview > div').style.gridTemplateColumns = '1fr';
  }
}

function showTab(tab, el) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.dtab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  el.classList.add('active');
}

async function updatePlan(newPlan) {
  if (!schoolData || newPlan === schoolData.plan) return;
  const oldPlan = schoolData.plan;
  const { error } = await db.from('schools').update({ plan: newPlan }).eq('id', schoolData.id);
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  await db.from('saas_audit_log').insert({
    action: 'plan_changed', target_id: schoolData.id, target_type: 'school',
    meta: { name: schoolData.name, old_plan: oldPlan, new_plan: newPlan }
  });
  schoolData.plan = newPlan;
  toast(`Plan changed to ${newPlan}`);
}

async function toggleStatus() {
  const newStatus = !schoolData.is_active;
  if (!confirm(`${newStatus ? 'Reactivate' : 'Suspend'} ${schoolData.name}?`)) return;
  const { error } = await db.from('schools').update({ is_active: newStatus }).eq('id', schoolData.id);
  if (error) { toast('Error: ' + error.message, 'error'); return; }
  await db.from('saas_audit_log').insert({
    action: newStatus ? 'school_activated' : 'school_suspended',
    target_id: schoolData.id, target_type: 'school',
    meta: { name: schoolData.name }
  });
  toast(`School ${newStatus ? 'activated' : 'suspended'}`);
  setTimeout(() => loadSchool(), 800);
}

async function deleteSchool() {
  if (!confirm(`PERMANENTLY delete "${schoolData.name}"?\n\nAll data will be lost forever.`)) return;
  const { error } = await db.from('schools').delete().eq('id', schoolData.id);
  if (error) { toast('Delete failed: ' + error.message, 'error'); return; }
  toast('School deleted');
  setTimeout(() => window.location.href = 'schools.html', 1000);
}

function impersonateLink() {
  // Copies the school admin portal URL with a note to use their own credentials
  const url = `${window.location.origin}/admin/index.html`;
  navigator.clipboard.writeText(url).then(() => {
    toast('Admin portal link copied! Share with school admin: ' + url);
  }).catch(() => {
    prompt('Copy this link and share with the school admin:', url);
  });
}
</script>

<script src="../js/ai-assistant.js" defer></script>
</body>
</html>
